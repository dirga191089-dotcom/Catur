<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#E6E7DF">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RTGM Pantau">
<title>RTGM · Pantau</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#E6E7DF; --card:#F1F2EB; --ink:#1B2130; --soft:#5D6473; --rule:#C3C7BA;
    --carbon:#5B4E8C; --ok:#2F8055; --warn:#C98A1E; --no:#BE4032;
    --teal:#1E8C7F; --coral:#E2673B; --gold:#D4A017; --sky:#3A78C2;
    --accent:var(--carbon);
    --mono:"Space Mono",ui-monospace,Menlo,monospace;
    --sans:"Archivo",system-ui,-apple-system,sans-serif;
    --dur:.45s;
  }
  /* Tema per peran: warna membawa arti, bukan hiasan. */
  body[data-role="anak"]   { --accent:var(--coral); --paper:#F0EBE2; }
  body[data-role="ortu"]   { --accent:var(--sky); }
  body[data-role="pelatih"]{ --accent:var(--carbon); }

  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--paper);color:var(--ink);font-family:var(--sans);
    touch-action:manipulation;-webkit-tap-highlight-color:transparent;
    padding:18px 14px 50px;transition:background var(--dur);
    background-image:linear-gradient(var(--rule) 1px,transparent 1px);
    background-size:100% 28px;background-position:0 -1px;
  }
  .sheet{max-width:1080px;margin:0 auto}

  header{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;
    border-bottom:2px solid var(--ink);padding-bottom:8px;margin-bottom:16px;background:var(--paper)}
  .brand{font-family:var(--mono);font-weight:700;font-size:19px;letter-spacing:.14em}
  .brand span{color:var(--accent);transition:color var(--dur)}
  .tagline{font-family:var(--mono);font-size:10px;color:var(--soft);letter-spacing:.14em;margin-top:2px}
  .who{display:flex;font-family:var(--mono);font-size:10px;letter-spacing:.1em}
  .who button{background:var(--card);border:1px solid var(--ink);border-right:0;padding:8px 13px;cursor:pointer;
    text-transform:uppercase;font-family:inherit;font-size:inherit;color:var(--ink);
    transition:background .18s,color .18s;min-height:40px}
  .who button:last-child{border-right:1px solid var(--ink)}
  .who button.on{background:var(--ink);color:var(--card)}
  body[data-role="anak"] .who button.on{background:var(--coral);border-color:var(--coral);color:#fff}
  body[data-role="ortu"] .who button.on{background:var(--sky);border-color:var(--sky);color:#fff}

  nav{display:flex;margin-bottom:18px;flex-wrap:wrap}
  nav button{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    background:none;border:0;border-bottom:3px solid transparent;padding:9px 14px;cursor:pointer;color:var(--soft);
    transition:color .18s,border-color .18s;min-height:42px}
  nav button.on{color:var(--ink);border-bottom-color:var(--accent)}

  section.box{background:var(--card);border:1px solid var(--ink);margin-bottom:16px;
    animation:rise var(--dur) both}
  section.box>h2{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;font-weight:700;text-transform:uppercase;
    padding:8px 12px;background:var(--ink);color:var(--card);display:flex;justify-content:space-between;
    align-items:center;gap:8px}
  section.box>h2 em{font-style:normal;font-size:9px;opacity:.72;letter-spacing:.06em;text-align:right}
  .pad{padding:12px}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .st1{animation-delay:.04s} .st2{animation-delay:.09s} .st3{animation-delay:.14s} .st4{animation-delay:.19s}

  /* ══ KPI ══ */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--ink);padding:10px 12px;position:relative;overflow:hidden;
    animation:rise var(--dur) both}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--tone,var(--rule))}
  .kpi b{display:block;font-family:var(--mono);font-size:24px;line-height:1.15;font-weight:700;color:var(--tone,var(--ink))}
  .kpi i{font-style:normal;font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft)}
  .kpi small{display:block;font-family:var(--mono);font-size:10px;color:var(--soft);margin-top:3px}

  /* ══ cincin progres (tampilan anak) ══ */
  .rings{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:12px;padding:14px 12px}
  .ring{text-align:center;animation:rise var(--dur) both}
  .ring svg{width:96px;height:96px;transform:rotate(-90deg)}
  .ring circle{fill:none;stroke-width:9;stroke-linecap:round}
  .ring .bg{stroke:var(--rule)}
  .ring .fg{stroke:var(--tone);stroke-dasharray:264;stroke-dashoffset:264;
    transition:stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)}
  .ring .num{position:relative;margin-top:-62px;margin-bottom:26px;
    font-family:var(--mono);font-weight:700;font-size:19px;color:var(--tone)}
  .ring .num span{display:block;font-size:9px;color:var(--soft);letter-spacing:.08em}
  .ring p{font-size:12px;font-weight:600;line-height:1.3}
  .ring.done .lbl::after{content:" \u2713";color:var(--ok);font-weight:800}

  /* ══ misi anak ══ */
  .mission{border:2px solid var(--ink);background:var(--card);padding:0;margin-bottom:16px;overflow:hidden}
  .mission .top{background:var(--coral);color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
  .mission .top b{font-family:var(--mono);font-size:13px;letter-spacing:.14em}
  .mission .top .pct{font-family:var(--mono);font-weight:700;font-size:26px}
  .mission .track{height:8px;background:rgba(0,0,0,.14)}
  .mission .track i{display:block;height:100%;background:#fff;width:0;transition:width 1.1s cubic-bezier(.2,.8,.2,1)}
  .flame{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-weight:700}
  .flame svg{width:17px;height:17px;animation:flick 1.6s ease-in-out infinite}
  @keyframes flick{0%,100%{transform:scale(1) rotate(-2deg)}50%{transform:scale(1.14) rotate(2deg)}}

  .todo{display:grid;grid-template-columns:30px 1fr auto;gap:11px;align-items:center;
    padding:13px 14px;border-bottom:1px solid var(--rule);animation:rise .4s both}
  .todo:last-child{border-bottom:0}
  .todo .mark{width:30px;height:30px;border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:16px;font-weight:700;background:var(--card);cursor:pointer;
    transition:background .25s,transform .25s,border-color .25s}
  .todo .mark[aria-disabled="true"]{cursor:default}
  .todo.done .mark{background:var(--ok);border-color:var(--ok);color:#fff;animation:pop .35s}
  .todo.auto.done .mark{background:var(--teal);border-color:var(--teal)}
  @keyframes pop{0%{transform:scale(.6)}55%{transform:scale(1.25)}100%{transform:scale(1)}}
  .todo .t{font-size:14px;line-height:1.35}
  .todo .t small{display:block;font-family:var(--mono);font-size:10px;color:var(--soft);margin-top:2px}
  .todo .t small.src{color:var(--accent)}
  .todo.done .t{opacity:.6;text-decoration:line-through;text-decoration-thickness:1px}
  .todo .prog{font-family:var(--mono);font-size:12px;font-weight:700;white-space:nowrap}
  .bar{height:5px;background:var(--rule);margin-top:6px;max-width:190px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--accent);width:0;transition:width .9s cubic-bezier(.2,.8,.2,1)}

  .golinks{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:12px}
  a.go{display:block;text-decoration:none;color:#fff;padding:14px;border:2px solid var(--ink);
    box-shadow:4px 4px 0 var(--ink);transition:transform .08s,box-shadow .08s}
  a.go:active{transform:translate(4px,4px);box-shadow:0 0 0}
  a.go b{display:block;font-family:var(--mono);font-size:13px;letter-spacing:.06em}
  a.go span{font-size:11.5px;opacity:.9}
  a.go.p{background:var(--teal)} a.go.g{background:var(--sky)} a.go.d{background:var(--carbon)}

  /* ══ kolom platform ══ */
  .plats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .plat{background:var(--card);border:1px solid var(--ink);animation:rise var(--dur) both;overflow:hidden}
  .plat > h3{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;font-weight:700;text-transform:uppercase;
    padding:9px 12px;color:#fff;display:flex;justify-content:space-between;align-items:center}
  .plat.li > h3{background:var(--carbon)}
  .plat.cc > h3{background:var(--teal)}
  .plat > h3 em{font-style:normal;font-size:9px;opacity:.85;letter-spacing:.06em}
  .plat .hero{padding:12px;border-bottom:1px solid var(--rule);display:flex;gap:14px;align-items:baseline}
  .plat .hero b{font-family:var(--mono);font-size:30px;font-weight:700;line-height:1}
  .plat .hero span{font-family:var(--mono);font-size:10px;color:var(--soft);letter-spacing:.08em;text-transform:uppercase}
  .plat .hero .sub{margin-left:auto;text-align:right;font-family:var(--mono);font-size:11px;color:var(--soft)}
  .plat dl{margin:0}
  .plat .r{display:flex;justify-content:space-between;align-items:baseline;gap:8px;
    padding:7px 12px;border-bottom:1px solid var(--rule);font-size:12.5px}
  .plat .r:last-child{border-bottom:0}
  .plat .r dt{font-family:var(--sans);color:var(--ink)}
  .plat .r dd{font-family:var(--mono);font-weight:700;text-align:right;white-space:nowrap}
  .plat .r dd small{display:block;font-weight:400;font-size:9.5px;color:var(--soft);letter-spacing:.04em}
  .plat .r.dim dd{color:var(--soft);font-weight:400}
  .plat .r.no dd{color:var(--no)}
  .plat .r.ok dd{color:var(--ok)}
  .plat .foot{padding:9px 12px;font-family:var(--mono);font-size:9.5px;line-height:1.5;color:var(--soft);
    background:rgba(27,33,48,.04);border-top:1px solid var(--rule)}
  @media(max-width:700px){ .plats{grid-template-columns:1fr;gap:10px} }

  .filt{display:flex;gap:0;padding:10px 12px;border-bottom:1px solid var(--rule)}
  .filt button{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    padding:7px 12px;border:1px solid var(--ink);border-right:0;background:var(--card);cursor:pointer;
    color:var(--ink);min-height:36px}
  .filt button:last-child{border-right:1px solid var(--ink)}
  .filt button.on{background:var(--ink);color:var(--card)}

  /* ══ peringatan ══ */
  .alert-row{display:flex;gap:9px;padding:10px 12px;border-bottom:1px solid var(--rule);font-size:13px;
    align-items:flex-start;animation:rise .4s both}
  .alert-row:last-child{border-bottom:0}
  .alert-row b{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;padding:3px 7px;white-space:nowrap;
    border:1px solid currentColor;flex:0 0 auto}
  .alert-row.no{background:rgba(190,64,50,.07)} .alert-row.no b{color:var(--no)}
  .alert-row.warn{background:rgba(201,138,30,.07)} .alert-row.warn b{color:var(--warn)}
  .alert-row.ok b{color:var(--ok)}
  .alert-row.no b{animation:blink 1.4s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}

  /* ══ rapor mingguan ══ */
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:12px}
  .week div{text-align:center;font-family:var(--mono);font-size:9px;color:var(--soft)}
  .week .box{height:46px;border:1px solid var(--rule);margin-bottom:4px;display:flex;flex-direction:column;
    justify-content:flex-end;background:#fff;position:relative;overflow:hidden}
  .week .box i{display:block;background:var(--tone);width:100%;height:0;
    transition:height .8s cubic-bezier(.2,.8,.2,1)}
  .week .box em{position:absolute;top:2px;left:0;right:0;font-style:normal;font-size:8.5px;font-weight:700;color:var(--ink)}
  .talk{border-left:3px solid var(--accent);background:rgba(58,120,194,.07);padding:10px 12px;font-size:13.5px;
    line-height:1.5;margin:0 12px 10px;animation:rise .4s both}
  .talk b{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--soft);
    text-transform:uppercase;margin-bottom:4px}

  /* ══ tabel ══ */
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);
    text-align:left;padding:7px 12px;border-bottom:1px solid var(--ink)}
  td{padding:7px 12px;border-bottom:1px solid var(--rule);font-family:var(--mono);font-size:12px}
  td.w{color:var(--ok);font-weight:700} td.l{color:var(--no);font-weight:700} td.d{color:var(--soft);font-weight:700}
  tr:last-child td{border-bottom:0}
  .empty{padding:16px 12px;font-family:var(--mono);font-size:11px;color:var(--soft);line-height:1.7}

  /* ══ batang analisis pelatih ══ */
  .hbars{padding:12px}
  .hbar{display:grid;grid-template-columns:110px 1fr 46px;gap:9px;align-items:center;margin-bottom:7px;font-size:12px}
  .hbar .n{font-family:var(--mono);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hbar .t{height:16px;background:var(--rule)}
  .hbar .t i{display:block;height:100%;background:var(--tone,var(--carbon));width:0;
    transition:width .8s cubic-bezier(.2,.8,.2,1)}
  .hbar .v{font-family:var(--mono);font-size:11px;font-weight:700;text-align:right}

  /* ══ formulir ══ */
  input,select,textarea{font-family:var(--mono);font-size:12px;padding:8px 9px;border:1px solid var(--ink);
    background:#fff;color:var(--ink);width:100%}
  textarea{font-family:var(--sans);font-size:13px;min-height:70px;resize:vertical}
  label{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--soft);margin:10px 0 4px}
  .fields{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
  .btn{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    padding:10px 14px;cursor:pointer;background:var(--card);color:var(--ink);border:1px solid var(--ink);
    box-shadow:2px 2px 0 var(--ink);width:auto;min-height:42px;transition:transform .07s,box-shadow .07s}
  .btn:active{transform:translate(2px,2px);box-shadow:none}
  .btn.go{background:var(--ink);color:var(--card)}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

  .chart{width:100%;height:200px;display:block}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-family:var(--mono);font-size:10px;padding:0 12px 10px}
  .legend i{display:inline-block;width:14px;height:3px;margin-right:5px;vertical-align:middle}
  .strip{display:flex;gap:3px;padding:12px;overflow-x:auto}
  .strip div{flex:0 0 auto;width:26px;text-align:center;font-family:var(--mono);font-size:9px;color:var(--soft)}
  .strip .cell{width:26px;height:26px;border:1px solid var(--rule);margin-bottom:3px;background:#fff;
    transition:background .5s}
  .strip .cell.l1{background:#CFE3DC} .strip .cell.l2{background:#8FC7B8}
  .strip .cell.l3{background:#4EA893} .strip .cell.l4{background:var(--teal)}

  .note{border-left:3px solid var(--accent);background:rgba(91,78,140,.07);padding:10px 12px;font-size:13.5px;
    line-height:1.5;margin-bottom:8px;animation:rise .4s both}
  .note b{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;display:block;color:var(--soft);margin-bottom:3px}
  .warnbox{border:2px dashed var(--warn);background:rgba(201,138,30,.09);padding:11px 13px;font-size:12.5px;
    line-height:1.55;margin-bottom:16px}
  .warnbox b{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--warn);
    display:block;margin-bottom:4px}

  footer{margin-top:22px;border-top:1px solid var(--rule);padding-top:10px;
    font-family:var(--mono);font-size:10px;color:var(--soft);line-height:1.7}
  .hide{display:none!important}
  .spin{display:inline-block;width:9px;height:9px;border:2px solid var(--accent);border-top-color:transparent;
    border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ══ konfeti: hanya untuk anak, hanya saat semua misi selesai ══ */
  /* Di HP, tab Pengaturan bisa 4 ketukan jauhnya. Tarik-ulang harus selalu terjangkau. */
  #bRefresh{
    position:fixed;right:14px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:40;
    width:52px;height:52px;border-radius:50%;border:2px solid var(--ink);background:var(--card);
    color:var(--ink);font-size:22px;line-height:1;cursor:pointer;
    box-shadow:3px 3px 0 var(--ink);display:none}
  #bRefresh:active{transform:translate(3px,3px);box-shadow:none}
  #bRefresh.spin2{animation:sp 1s linear infinite}
  @media(max-width:700px){ #bRefresh{display:block} }

  .conf{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
  .conf i{position:absolute;width:9px;height:14px;opacity:0;animation:fall 1.9s ease-in forwards}
  @keyframes fall{
    0%{opacity:1;transform:translateY(-12vh) rotate(0)}
    100%{opacity:0;transform:translateY(104vh) rotate(680deg)}
  }

  @media(prefers-reduced-motion:reduce){
    *,*::before,*::after{animation:none!important;transition:none!important}
    .ring .fg{stroke-dashoffset:var(--off,0)!important}
  }

  /* ══════════ MOBILE ══════════ */
  @media(max-width:700px){
    body{padding:12px 10px calc(36px + env(safe-area-inset-bottom));background-size:100% 26px}
    .brand{font-size:17px}
    .who{width:100%}
    .who button{flex:1;min-height:46px;padding:10px 4px}
    nav{position:sticky;top:0;z-index:19;background:var(--paper);flex-wrap:nowrap;overflow-x:auto;
      -webkit-overflow-scrolling:touch;margin:0 -10px 14px;padding:0 10px;scrollbar-width:none}
    nav::-webkit-scrollbar{display:none}
    nav button{white-space:nowrap;min-height:46px;padding:11px 13px}
    .cards{grid-template-columns:1fr 1fr;gap:8px}
    .kpi b{font-size:20px}
    .rings{grid-template-columns:1fr 1fr;gap:6px}
    .ring svg{width:88px;height:88px}
    .ring .num{margin-top:-58px;margin-bottom:24px}
    .todo{padding:14px 12px}
    input,select,textarea{font-size:16px;padding:11px}
    .btn{min-height:46px;flex:1}
    .fields{grid-template-columns:1fr}
    #games,#gamesC{overflow-x:auto;-webkit-overflow-scrolling:touch}
    #games table,#gamesC table{min-width:560px}
    .hbar{grid-template-columns:88px 1fr 40px}
    .week{gap:3px}
    .week .box{height:40px}
  }
</style>
</head>
<body data-role="ortu">
<div class="sheet">

<header>
  <div>
    <div class="brand">RTGM <span>/</span> PANTAU</div>
    <div class="tagline" id="sub">MEMUAT…</div>
  </div>
  <div class="who">
    <button data-role="anak">Anak</button>
    <button data-role="ortu" class="on">Orang tua</button>
    <button data-role="pelatih">Pelatih</button>
  </div>
</header>

<nav id="nav"></nav>
<div id="view"></div>

<footer>
  <div>Data dari API publik Chess.com &amp; Lichess. Tidak ada server. Semua tersimpan di perangkat ini.</div>
  <div style="margin-top:6px">Anak tahu bahwa aktivitasnya dipantau — itu syaratnya, bukan pilihannya.</div>
</footer>
</div>
<button id="bRefresh" aria-label="Tarik data ulang">↻</button>
<div class="conf" id="conf"></div>

<script>
/* ═══════════ penyimpanan ═══════════ */
const KEY = "rtgm.pantau.v1";
const Store = {
  has: typeof window !== "undefined" && window.storage && window.storage.get,
  async load(){ try{
      if(this.has){ const r = await window.storage.get(KEY); return r&&r.value?JSON.parse(r.value):null; }
      const raw = localStorage.getItem(KEY); return raw?JSON.parse(raw):null;
    }catch(e){ return null; } },
  async save(o){ const s=JSON.stringify(o);
    try{ if(this.has){ await window.storage.set(KEY,s); return; } localStorage.setItem(KEY,s); }catch(e){} },

function url(u){ return S.cfg.proxy ? S.cfg.proxy + encodeURIComponent(u) : u; }

/* Jaringan seluler menggantung tanpa pernah menolak. Tanpa batas waktu,
   fetch menunggu selamanya dan aplikasi TAMPAK beku, bukan gagal.
   Ditambah 2x ulang-coba dengan jeda: kegagalan sesaat di HP itu normal. */
const BATAS_MS = 12000, ULANG = 2;
async function ambilMentah(u, accept){
  let galat;
  for(let i = 0; i <= ULANG; i++){
    const ac = new AbortController();
    const jam = setTimeout(() => ac.abort(), BATAS_MS);
    try{
      const r = await fetch(url(u), { headers:{ Accept: accept }, signal: ac.signal, cache:"no-store" });
      clearTimeout(jam);
      if(r.status === 429){ galat = new Error("HTTP 429"); await tidur(1500 * (i+1)); continue; }
      if(!r.ok) throw new Error("HTTP " + r.status);
      return r;
    }catch(e){
      clearTimeout(jam);
      galat = e.name === "AbortError"
        ? new Error("waktu habis setelah " + (BATAS_MS/1000) + " detik \u2014 jaringan lambat atau menggantung")
        : e;
      // 404 tidak akan berubah walau diulang
      if(/HTTP 4(0[0-9]|1[0-8])/.test(String(galat.message))) break;
      if(i < ULANG) await tidur(700 * (i+1));
    }
  }
  throw galat;
}
const tidur = ms2 => new Promise(r => setTimeout(r, ms2));
async function getJSON(u){ return (await ambilMentah(u, "application/json")).json(); }
/* Lichess mengirim daftar partai sebagai NDJSON: satu objek JSON per baris,
   bukan satu array. r.json() akan GAGAL di sini. */
async function getNDJSON(u){
  const t = await (await ambilMentah(u, "application/x-ndjson")).text();
  return t.split("\n").filter(Boolean).map(l => JSON.parse(l));
}

/* Menerjemahkan kegagalan jaringan jadi sebab yang bisa ditindak.
   "Failed to fetch" tidak memberi tahu apa pun kepada orang tua. */
function sebab(e, situs){
  const m = String(e && e.message || e);
  if(/^HTTP 404/.test(m)) return `username "${situs}" tidak ditemukan. Periksa ejaannya.`;
  if(/^HTTP 429/.test(m)) return "terlalu banyak permintaan (429). Tunggu satu menit.";
  if(/^HTTP 403/.test(m)) return "diblokir server (403).";
  if(/^HTTP 5\d\d/.test(m)) return m + " — server sedang bermasalah, bukan kesalahanmu.";
  if(/Failed to fetch|NetworkError|Load failed|TypeError/i.test(m))
    return "permintaan diblokir browser. Dua penyebab paling sering: (1) file dibuka lewat file:// — harus lewat http:// atau GitHub Pages; (2) CORS. Isi kolom Proxy CORS kalau (1) sudah benar.";
  return m;
}

/* Sheet yang diterbitkan lewat File > Share > Publish to web > CSV
   disajikan Google dengan header CORS terbuka. Ia TIDAK PERNAH diblokir browser,
   berbeda dengan endpoint /exec Apps Script yang mengalihkan ke halaman login
   kalau aksesnya bukan "Anyone".

   Pemetaan kolom memakai NAMA HEADER, bukan nomor kolom. Kalau saya menambah
   kolom baru di Kode.gs nanti, ini tidak akan diam-diam salah baca. */
function parseCSV(teks){
  const baris = [];
  let f = "", row = [], q = false;
  for(let i=0;i<teks.length;i++){
    const c = teks[i];
    if(q){
      if(c === '"'){ if(teks[i+1] === '"'){ f += '"'; i++; } else q = false; }
      else f += c;
    } else if(c === '"') q = true;
    else if(c === ","){ row.push(f); f = ""; }
    else if(c === "\n"){ row.push(f); baris.push(row); row = []; f = ""; }
    else if(c !== "\r") f += c;
  }
  if(f || row.length){ row.push(f); baris.push(row); }
  return baris.filter(r => r.some(x => x !== ""));
}
function snapsDariCSV(teks){
  const baris = parseCSV(teks);
  if(baris.length < 2) return {};
  const H = baris[0].map(x => x.trim().toLowerCase());
  const kol = nama => H.findIndex(h => h.indexOf(nama) === 0);
  const iTgl   = kol("tanggal"),
        iPz    = kol("puzzle (lichess)"), iTot = kol("puzzle total"),
        iRate  = kol("rating puzzle"),
        iRushA = kol("rush percobaan"), iRushS = kol("rush skor"),
        iTac   = kol("taktik tertinggi"), iRapid = kol("rating rapid"), iBlitz = kol("rating blitz"),
        iPatuh = kol("kepatuhan"), iLang = kol("pelanggaran"), iStat = kol("status");
  if(iTgl < 0) return {};
  const n = (r,i) => (i >= 0 && r[i] !== "" && r[i] != null) ? Number(r[i]) : null;
  const out = {};
  baris.slice(1).forEach(r => {
    const dk = (r[iTgl]||"").trim();
    if(!/^\d{4}-\d{2}-\d{2}$/.test(dk)) return;
    out[dk] = {
      puzzles: n(r,iPz) || 0, puzTotal: n(r,iTot), puzRating: n(r,iRate),
      rushAttempts: n(r,iRushA) || 0, rushScore: n(r,iRushS) || 0,
      tacticsHigh: n(r,iTac), rapid: n(r,iRapid), blitz: n(r,iBlitz),
      kepatuhan: n(r,iPatuh), langgar: iLang >= 0 ? r[iLang] : "",
      status: iStat >= 0 ? r[iStat] : "",
    };
  });
  return out;
}

  const lama = S.data || { chess:null, lichess:null, errors:[] };

/* Chess.com tidak menyimpan riwayat rating taktik maupun riwayat Puzzle Rush.
   Jadi aplikasi ini yang jadi pencatatnya: setiap kali data ditarik, keadaan
   hari itu difoto dan disimpan. Konsekuensinya jujur: hari yang aplikasinya
   tidak dibuka sama sekali TIDAK akan punya catatan. */
function recordSnapshot(out){
  const dk = todayKey();
  S.snaps[dk] = S.snaps[dk] || {};

  // Lichess: simpan penghitung kumulatif. Ini yang membuat jumlah puzzle
  // harian bisa dihitung walau feed aktivitas gagal total.
  const lp = out.lichess && out.lichess.prof && out.lichess.prof.perfs && out.lichess.prof.perfs.puzzle;
  if(lp){
    S.snaps[dk].puzTotal  = lp.games;
    S.snaps[dk].puzRating = lp.rating;
  }
  if(!out.chess || !out.chess.stats){ S.snaps[dk].at = Date.now(); return; }
  const st = out.chess.stats || {};
  const rush = st.puzzle_rush && st.puzzle_rush.daily ? st.puzzle_rush.daily : null;
  Object.assign(S.snaps[dk], {
    rushAttempts: rush ? (rush.total_attempts || 0) : 0,
    rushScore:    rush ? (rush.score || 0) : 0,
    tacticsHigh:  st.tactics && st.tactics.highest ? st.tactics.highest.rating : null,
    tacticsHighDate: st.tactics && st.tactics.highest ? st.tactics.highest.date : null,
    rapid: st.chess_rapid && st.chess_rapid.last ? st.chess_rapid.last.rating : null,
    blitz: st.chess_blitz && st.chess_blitz.last ? st.chess_blitz.last.rating : null,
    at: Date.now(),
  });
}
function rushToday(){
  const s = S.snaps[todayKey()];

}

function chessGamesOn(dk){
  const d = S.data && S.data.chess ? S.data.chess.games : [];
  return d.filter(g => dayKey(ms(g.end_time)) === dk);
}
function chessResultFor(g){
  const me = S.data.chess.user;
  const side = (g.white.username||"").toLowerCase() === me ? g.white : g.black;
  const opp  = (g.white.username||"").toLowerCase() === me ? g.black : g.white;
  const r = side.result;
  const res = r === "win" ? "M" : ["agreed","repetition","stalemate","insufficient","50move","timevsinsufficient"].includes(r) ? "R" : "K";
  return { side, opp, res, rating:side.rating, acc: g.accuracies ? (side===g.white?g.accuracies.white:g.accuracies.black) : null };
}
function lichessDay(dk){
  const act = (S.data && S.data.lichess) ? (S.data.lichess.act||[]) : [];
  // interval.end adalah akhir hari aktivitas (detik)
  // Interval Lichess {start,end} sering BERAKHIR di tengah malam berikutnya.
  // Mencocokkan pada `end` membuat aktivitas hari ini jatuh ke hari BESOK —
  // dan hari ini tampak kosong. Cocokkan pada hari MULAInya: satu entri = satu
  // hari, tidak pernah ganda, dan tidak pernah meleset satu hari ke depan.
  return act.find(a => a.interval && dayKey(ms(a.interval.start)) === dk) || null;
}
function puzzlesFromActivity(dk){
  const a = lichessDay(dk);
  if(!a || !a.puzzles || !a.puzzles.score) return 0;
  const s = a.puzzles.score;
  return (s.win||0) + (s.loss||0) + (s.draw||0);
}

/* JARING PENGAMAN.
   Feed aktivitas Lichess bisa kosong, terlambat, atau salah hari.
   Tapi profil menyimpan penghitung KUMULATIF `perfs.puzzle.games` —
   total puzzle yang pernah dikerjakan seumur hidup akun.
   Selisih antara foto hari ini dan foto terakhir sebelumnya ADALAH
   jumlah puzzle hari itu, dan angka ini tidak bergantung pada feed apa pun.

   Batasnya jujur: butuh foto pembanding. Hari pertama pemakaian aplikasi
   tidak punya pembanding, jadi selisihnya tidak bisa dihitung. */
function puzzlesFromCounter(dk){
  const kini = S.snaps[dk];
  if(!kini || kini.puzTotal == null) return null;
  const sebelum = Object.keys(S.snaps).filter(d => d < dk && S.snaps[d].puzTotal != null).sort().pop();
  if(!sebelum) return null;
  const d = kini.puzTotal - S.snaps[sebelum].puzTotal;
  return d >= 0 ? d : null;
}

function puzzlesOn(dk){
  const a = puzzlesFromActivity(dk);
  const c = puzzlesFromCounter(dk);
  // Ambil yang lebih besar. Feed yang kosong tidak boleh menghapus bukti
  // dari penghitung kumulatif, dan sebaliknya.
  return Math.max(a, c == null ? 0 : c);
}
function sumberPuzzle(dk){
  const a = puzzlesFromActivity(dk), c = puzzlesFromCounter(dk);
  if(a > 0 && c != null && c !== a) return `feed ${a} \u00b7 penghitung ${c}`;
  if(a > 0) return "feed aktivitas";
  if(c != null && c > 0) return "penghitung kumulatif";
  return null;
}
function lichessGamesOn(dk){
  const a = lichessDay(dk);
  if(!a || !a.games) return {total:0, byPerf:{}, win:0, loss:0};
  let total=0, win=0, loss=0; const byPerf={};
  for(const [perf,v] of Object.entries(a.games)){
    const n = (v.win||0)+(v.loss||0)+(v.draw||0);
    byPerf[perf]=n; total+=n; win+=(v.win||0); loss+=(v.loss||0);
  }
  return {total, byPerf, win, loss};
}
/* ═══════════ MODEL PARTAI TERSATU ═══════════
   BUG YANG DIPERBAIKI: sebelumnya partai Lichess hanya dihitung dari feed
   aktivitas (ringkasan yang bisa kosong/terlambat), dan deret kekalahan serta
   tabel partai hanya melihat Chess.com. Akibatnya partai rapid di Lichess
   tidak muncul di mana pun. Sekarang kedua situs dinormalkan ke satu bentuk. */

function ecoNama(pgn){
  const m = (pgn||"").match(/\[ECOUrl "https?:\/\/[^"]*\/openings\/([^"]+)"\]/);
  return m ? decodeURIComponent(m[1]).replace(/-/g," ").trim() : null;
}
/* Lichess memakai "ultraBullet"; Chess.com memakai "daily". Tanpa penyeragaman,
   pagar anti-bullet bisa dilewati hanya dengan bermain UltraBullet. */
function speedNorm(x){
  if(x === "ultraBullet") return "bullet";
  if(x === "daily") return "correspondence";
  return x;
}

let _ng = null, _ngAt = 0;
function normGames(){
  if(_ng && _ngAt === S.fetchedAt) return _ng;
  const out = [];
  const C = S.data && S.data.chess;
  if(C && C.games) C.games.forEach(g => {
    const r = chessResultFor(g);
    out.push({ t: ms(g.end_time), site:"Chess.com", speed: speedNorm(g.time_class), res:r.res,
      rating: r.rating, opp: r.opp.username, oppRating: r.opp.rating, acc: r.acc,
      url: g.url, opening: ecoNama(g.pgn) });
  });
  const L = S.data && S.data.lichess;
  if(L && L.games) L.games.forEach(g => {
    const me = (L.user||"").toLowerCase();
    const w = g.players && g.players.white, b = g.players && g.players.black;
    if(!w || !b) return;
    const idW = ((w.user && (w.user.id || w.user.name)) || "").toLowerCase();
    const isW = idW === me;
    const my = isW ? w : b, op = isW ? b : w;
    let res = "R";
    if(g.winner) res = (g.winner === (isW ? "white" : "black")) ? "M" : "K";
    out.push({ t: g.lastMoveAt || g.createdAt, site:"Lichess", speed: speedNorm(g.speed), res,
      rating: my.rating, opp: (op.user && op.user.name) || "Anonim", oppRating: op.rating,
      acc: my.analysis && my.analysis.accuracy != null ? my.analysis.accuracy : null,
      url: "https://lichess.org/" + g.id, opening: g.opening ? g.opening.name : null });
  });
  _ng = out.sort((a,b)=>b.t-a.t); _ngAt = S.fetchedAt;
  return _ng;
}

function gamesOn(dk){
  const list = normGames().filter(g => dayKey(g.t) === dk);
  const byClass = {};
  list.forEach(g => byClass[g.speed] = (byClass[g.speed]||0)+1);
  let total = list.length;
  // Cadangan: kalau daftar partai Lichess gagal ditarik, jangan buang datanya —
  // pakai feed aktivitas seperti dulu.
  const L = S.data && S.data.lichess;
  if(L && (!L.games || !L.games.length)){
    const a = lichessGamesOn(dk);
    for(const [p,n] of Object.entries(a.byPerf)){ const k = speedNorm(p); byClass[k] = (byClass[k]||0)+n; }
    total += a.total;
  }
  return { total, byClass, list };
}

/* Deret kekalahan kini melihat KEDUA situs. Anak yang kalah 2x di Chess.com
   lalu 2x di Lichess tetap sedang tilt — dan sebelumnya tidak terdeteksi. */
function losingStreakToday(){
  const dk = todayKey();
  const g = normGames().filter(x => dayKey(x.t) === dk).sort((a,b)=>a.t-b.t);
  let best = 0, cur = 0;
  g.forEach(x => { if(x.res === "K"){ cur++; best = Math.max(best, cur); } else cur = 0; });
  return best;
}

/* ═══════════ render: tugas harian ═══════════ */
function buildQuests(){
  const dk = todayKey(), T = targets();
  const g = gamesOn(dk);
  const pz = puzzlesOn(dk);
  const rapid = (g.byClass.rapid||0);
  const bullet = (g.byClass.bullet||0);
  const q = [];

  if(S.cfg.chess && T.rush > 0){
    const R = rushToday();
    q.push({ auto:true, ok: R.attempts >= T.rush, now:R.attempts, goal:T.rush,
      t:`Puzzle Rush: minimal ${T.rush} puzzle dicoba`,
      src:`Chess.com — terverifikasi otomatis. Skor hari ini: ${R.score || 0}${T.rushScore?` (target ${T.rushScore})`:""}` });
  }
  if(S.cfg.lichess && T.puzzle > 0) q.push({ auto:true, ok: pz >= T.puzzle, now:pz, goal:T.puzzle,
    t:`Selesaikan ${T.puzzle} puzzle`, src:"Lichess — terverifikasi otomatis" });

  if(T.rapid > 0) q.push({ auto:true, ok: rapid >= T.rapid, now:rapid, goal:T.rapid,
    t:`Main ${T.rapid} partai rapid`, src:"Chess.com + Lichess — terverifikasi otomatis" });

  q.push({ auto:true, ok: bullet <= T.bulletMax, now:bullet, goal:T.bulletMax, invert:true,
    t: T.bulletMax === 0 ? "Tidak main bullet" : `Bullet maksimal ${T.bulletMax} partai`,
    src:"Bullet merusak kalkulasi anak. Ini pagar, bukan target." });

  q.push({ auto:true, ok: g.total <= T.gameMax, now:g.total, goal:T.gameMax, invert:true,
    t:`Total partai maksimal ${T.gameMax}`, src:"Pagar anti-tilt: bermain berlebihan setelah kalah menurunkan rating." });

  manualTasks().forEach((m,i) => q.push({ auto:false, idx:i, ok: !!(S.checks[dk]||{})["m"+i], t:m,
    src:"Manual — dicentang pelatih atau orang tua" }));
  return q;
}

function countUp(el, to, suffix){
  if(matchMedia("(prefers-reduced-motion:reduce)").matches){ el.textContent = to + (suffix||""); return; }
  const t0 = performance.now(), dur = 700, from = 0;
  const step = t => {
    const k = Math.min(1, (t - t0) / dur);
    const e = 1 - Math.pow(1 - k, 3);
    el.textContent = Math.round(from + (to - from) * e) + (suffix || "");
    if(k < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}
function konfeti(){
  if(matchMedia("(prefers-reduced-motion:reduce)").matches) return;

/* ── analitik tambahan ── */
function last7(){
  const out = [];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const dk = dayKey(d);
    const g = gamesOn(dk), pz = puzzlesOn(dk);
    const T = targets();
    const cek = [];
    if(T.puzzle>0) cek.push(pz >= T.puzzle);
    cek.push((g.byClass.rapid||0) >= T.rapid);
    cek.push((g.byClass.bullet||0) <= T.bulletMax);
    cek.push(g.total <= T.gameMax);
    const patuh = Math.round(100*cek.filter(Boolean).length/cek.length);
    out.push({ dk, d, pz, games:g.total, bullet:g.byClass.bullet||0, patuh,
               aktif: pz>0 || g.total>0 || (S.snaps[dk]&&S.snaps[dk].rushAttempts>0) });
  }
  return out;
}
function streakHari(){
  let n = 0;
  for(let i=0;i<120;i++){
    const d = new Date(); d.setDate(d.getDate()-i);
    const dk = dayKey(d);
    const aktif = puzzlesOn(dk) > 0 || gamesOn(dk).total > 0;
    if(aktif) n++;
    else if(i > 0) break;      // hari ini boleh kosong, kemarin tidak
  }
  return n;
}
function bahanObrolan(){
  const W = last7(), T = targets(), out = [];
  const kurang = W.filter(w => T.puzzle>0 && w.pz < T.puzzle && w.aktif).length;
  if(kurang >= 3) out.push(["Target puzzle meleset " + kurang + " dari 7 hari",
    "Tanyakan apakah targetnya kebanyakan, atau ada yang mengganggu waktu latihannya. Target yang terus meleset bukan tanda anak malas — sering kali tandanya target itu salah."]);
  const sepi = W.filter(w => !w.aktif).length;
  if(sepi >= 3) out.push([sepi + " hari tanpa aktivitas sama sekali",
    "Sebelum menegur: cek apakah ia sakit, sibuk sekolah, atau justru sedang jenuh. Jenuh adalah masalah paling umum dan paling sering salah diobati dengan tambahan target."]);
  const bul = W.reduce((a,b)=>a+b.bullet,0);
  if(bul > 0) out.push([bul + " partai bullet minggu ini",
    "Bullet menyenangkan dan melatih refleks, tapi merusak kebiasaan kalkulasi. Sepakati batas bersama — jangan larang sepihak."]);
  const G = normGames().filter(x=>x.acc!=null).slice(0,10);
  if(G.length >= 5){
    const avg = G.reduce((a,b)=>a+b.acc,0)/G.length;
    if(avg < 70) out.push(["Akurasi 10 partai terakhir " + avg.toFixed(1) + "%",
      "Di bawah 70% biasanya berarti bermain terlalu cepat untuk kontrol waktunya. Tanyakan: apakah ia menghabiskan waktu berpikirnya, atau langsung menjawab?"]);
  }
  const s = streakHari();
  if(s >= 5) out.push([s + " hari berturut-turut aktif",
    "Puji konsistensinya, bukan hasilnya. Rating naik-turun; kebiasaan tidak."]);
  if(!out.length) out.push(["Belum cukup data",
    "Rapor ini butuh beberapa hari aktivitas sebelum bisa memberi bahan obrolan yang berguna."]);
  return out.slice(0,4);
}
function pembukaan(){
  const map = {};
  normGames().forEach(g => {
    const nama = g.opening;
    if(!nama) return;
    // 2 kata: "Scandinavian Defense Mieses Kotroc" dan "Scandinavian Defense"
    // adalah pembukaan yang sama. Memecahnya jadi baris terpisah menyesatkan pelatih.
    const kunci = nama.replace(/[:,].*$/,"").split(" ").slice(0,2).join(" ");
    (map[kunci] = map[kunci] || {n:0,m:0,k:0});
    map[kunci].n++;
    if(g.res==="M") map[kunci].m++;
    if(g.res==="K") map[kunci].k++;
  });
  return Object.entries(map).sort((a,b)=>b[1].n-a[1].n).slice(0,6);
}
/* HILANG dari versi sebelumnya — tab Perkembangan & Analisis crash karenanya.
   Versi baru: riwayat resmi Lichess + rekonstruksi dari rating tiap partai
   (Chess.com tidak menyediakan riwayat rating sama sekali). */
function ratingSeries(){
  const out = [];
  const L = S.data && S.data.lichess;
  if(L && L.hist){
    L.hist.filter(h => ["Rapid","Blitz","Puzzles"].includes(h.name) && h.points && h.points.length > 1)
      .forEach(h => out.push({
        name: "Lichess " + h.name,
        color: { Rapid:"#1E8C7F", Blitz:"#3A78C2", Puzzles:"#5B4E8C" }[h.name],
        pts: h.points.map(p => ({ t: Date.UTC(p[0], p[1], p[2]), v: p[3] })),
      }));
  }
  // Chess.com tidak menyediakan riwayat rating taktik. Satu-satunya sumbernya
  // adalah foto harian yang aplikasi ini simpan sendiri.
  const hari = Object.keys(S.snaps).sort();
  const tac = hari.filter(d => S.snaps[d].tacticsHigh).map(d => ({ t:new Date(d).getTime(), v:S.snaps[d].tacticsHigh }));
  if(tac.length > 1) out.push({ name:"Chess.com taktik (tertinggi)", color:"#D4A017", pts:tac });

  const bySrc = {};
  normGames().forEach(g => {
    if(!g.rating || !["rapid","blitz"].includes(g.speed)) return;
    (bySrc[`${g.site} ${g.speed}`] = bySrc[`${g.site} ${g.speed}`] || []).push({ t:g.t, v:g.rating });
  });
  const warna = { "Chess.com rapid":"#BE4032", "Chess.com blitz":"#C98A1E",
                  "Lichess rapid":"#1E8C7F", "Lichess blitz":"#3A78C2" };
  Object.entries(bySrc).filter(([,v]) => v.length > 1).forEach(([k,v]) => {
    // riwayat resmi Lichess lebih akurat — jangan gambar dua kali
    const speed = k.split(" ")[1];
    if(k.startsWith("Lichess") && out.some(o => o.name === "Lichess " + speed[0].toUpperCase() + speed.slice(1))) return;
    out.push({ name:k, color: warna[k] || "#5B4E8C", pts: v.sort((a,b)=>a.t-b.t) });
  });
  return out;
}

function akurasiTren(){

/* ═══════════ DIAGNOSIS ═══════════
   Menguji setiap endpoint sendiri-sendiri. "Lichess tidak bisa" bukan diagnosis —
   yang berguna adalah tahu endpoint MANA dan gagal KENAPA. */
async function ujiKoneksi(){
  const el = $("#testLog");
  el.innerHTML = `<div class="alert-row"><b>\u2026</b><span><span class="spin"></span> menguji\u2026</span></div>`;
  const hasil = [];
  const uji = async (nama, u, wajib) => {
    const t0 = performance.now();
    try{
      const r = await fetch(url(u), { headers:{ "Accept":"application/json" } });
      const ms2 = Math.round(performance.now()-t0);
      if(!r.ok){ hasil.push(["no", nama, `HTTP ${r.status} — ${sebab(new Error("HTTP "+r.status), "")}`]); return null; }
      const d = await r.json();
      const isi = Array.isArray(d) ? `${d.length} entri` : "objek JSON";
      hasil.push(["ok", nama, `${r.status} \u00b7 ${isi} \u00b7 ${ms2}ms`]);
      return d;
    }catch(e){
      const m = String(e && e.message || e);
      const diblokir = /Failed to fetch|NetworkError|Load failed/i.test(m);
      if(nama === "Apps Script" && diblokir){
        hasil.push(["no", nama,
          "Diblokir browser. Karena Lichess dan Chess.com BERHASIL, ini bukan file:// dan bukan CORS umum \u2014 " +
          "penyebabnya spesifik ke Apps Script. Hampir selalu: deployment-nya belum \"Anyone\". " +
          "Google mengalihkan permintaan ke halaman login, dan browser memblokir pengalihan lintas-domain itu. " +
          "Perbaiki: Deploy \u2192 Manage deployments \u2192 \u270f\ufe0f \u2192 Who has access: Anyone (BUKAN \"Anyone with Google account\"). " +
          "Atau lewati sama sekali: terbitkan Sheet sebagai CSV dan isi kolom URL Sheet CSV di atas. " +
          "CATATAN PENTING: trigger harian 23:00 dan email laporan TETAP BERJALAN walau ini gagal \u2014 " +
          "keduanya jalan di server Google, bukan di browser."]);
        return null;
      }
      if(nama === "Sheet CSV" && diblokir){
        hasil.push(["no", nama,
          "Diblokir. Pastikan Sheet benar-benar diterbitkan: File \u2192 Share \u2192 Publish to web \u2192 pilih sheet " +
          "\"Harian\" \u2192 format CSV \u2192 Publish. URL-nya harus mengandung /pub? dan output=csv."]);
        return null;
      }
      hasil.push([wajib?"no":"warn", nama, sebab(e, "")]);
      return null;
    }
  };

  if(S.cfg.lichess){
    const u = S.cfg.lichess.trim();
    const prof = await uji("Lichess / profil", `https://lichess.org/api/user/${u}`, true);
    await uji("Lichess / aktivitas", `https://lichess.org/api/user/${u}/activity`, false);
    await uji("Lichess / riwayat rating", `https://lichess.org/api/user/${u}/rating-history`, false);
    if(prof){
      const p = prof.perfs || {};
      const pz = p.puzzle ? `${p.puzzle.games} puzzle, rating ${p.puzzle.rating}` : "belum ada puzzle";
      const total = p.puzzle ? p.puzzle.games : 0;
      hasil.push([total ? "ok" : "warn", "Lichess / isi akun",
        `${prof.username} \u00b7 ${pz}. ` + (total ? "" :
        "Akun BERHASIL dibaca tapi kosong \u2014 belum ada satu puzzle pun tercatat di server Lichess.")]);
      const dk = todayKey();
      const kemarin = Object.keys(S.snaps).filter(d=>d<dk && S.snaps[d].puzTotal!=null).sort().pop();
      hasil.push([kemarin ? "ok" : "warn", "Penghitung kumulatif",
        kemarin
          ? `Foto terakhir ${kemarin}: ${S.snaps[kemarin].puzTotal} puzzle. Sekarang: ${total}. Selisih = ${total - S.snaps[kemarin].puzTotal} puzzle.`
          : `Total sekarang ${total} puzzle, tapi BELUM ADA foto pembanding dari hari sebelumnya. ` +
            `Jumlah puzzle harian baru bisa dihitung mulai besok. Ini batas nyata alat ini, bukan bug \u2014 ` +
            `Lichess tidak menyimpan "berapa puzzle hari ini", hanya total seumur hidup.`]);
      const feed = puzzlesFromActivity(dk);
      if(feed > total) hasil.push(["warn", "Angka tidak cocok",
        `Feed melaporkan ${feed} puzzle hari ini, tapi penghitung total profil hanya ${total} seumur hidup. ` +
        `Kedua angka ini jelas mengukur hal yang berbeda \u2014 kemungkinan besar penghitung profil hanya ` +
        `mencatat puzzle yang mengubah rating. Aplikasi memakai angka yang LEBIH BESAR (${Math.max(feed,total)}), ` +
        `jadi jumlah harian tetap benar. Tapi "total puzzle" di ringkasan akan terlihat terlalu kecil.`]);
      hasil.push([feed ? "ok" : "warn", "Feed aktivitas hari ini",
        feed ? `${feed} puzzle terbaca dari feed.` :
        "Feed melaporkan 0 puzzle hari ini. Lichess kadang terlambat memperbarui feed aktivitas \u2014 " +
        "karena itu penghitung kumulatif di atas dipakai sebagai cadangan."]);
    }
  } else hasil.push(["warn","Lichess","username kosong."]);

  if(S.cfg.chess){
    const u = S.cfg.chess.trim().toLowerCase();
    await uji("Chess.com / statistik", `https://api.chess.com/pub/player/${u}/stats`, true);

  } else hasil.push(["warn","Chess.com","username kosong."]);

  if(S.cfg.csv) await uji("Sheet CSV", S.cfg.csv.trim(), false);
  if(S.cfg.gs) await uji("Apps Script", S.cfg.gs.trim(), false);

  const gagalSemua = hasil.filter(h=>h[0]==="no").length === hasil.filter(h=>h[0]!=="warn").length && hasil.some(h=>h[0]==="no");
  if(gagalSemua) hasil.push(["no","KESIMPULAN",
    "SEMUA endpoint gagal \u2014 masalahnya bukan di Lichess atau Chess.com, tapi di cara file ini dibuka. " +
    "Kalau alamat di bilah browser dimulai dengan file:// , browser memblokir semua permintaan keluar. Sajikan lewat http:// atau GitHub Pages."]);

  el.innerHTML = hasil.map(([k,n,m])=>
    `<div class="alert-row ${k}"><b>${n}</b><span>${m}</span></div>`).join("");
}

/* ═══════════ KOLOM PER PLATFORM ═══════════
   Satu kolom untuk tiap situs. Yang TIDAK dipisah, dan alasannya:
     - kepatuhan  : target harian dipenuhi lintas situs, bukan per situs
     - deret kalah: kalah 2x di Lichess lalu 2x di Chess.com ADALAH 4 beruntun
     - batas volume: kalau per situs, pagar bisa dilewati dengan pindah situs
   Ketiganya tetap gabungan di kartu KPI dan peringatan. */

function siteDay(site, dk){
  const list = normGames().filter(g => g.site === site && dayKey(g.t) === dk);
  const by = {};
  list.forEach(g => by[g.speed] = (by[g.speed]||0)+1);
  const acc = list.filter(g => g.acc != null);
  return {
    n: list.length, by,
    m: list.filter(g=>g.res==="M").length,
    k: list.filter(g=>g.res==="K").length,
    r: list.filter(g=>g.res==="R").length,
    acc: acc.length ? acc.reduce((a,b)=>a+b.acc,0)/acc.length : null,
  };
}

  const rate = (p) => p && p.games ? p.rating + (p.prov ? "?" : "") : null;

          ${baris("Blitz", (L && rate(L.blitz)) || "\u2014", L && L.blitz && L.blitz.games ? `${L.blitz.games} partai` : "belum main")}
          ${baris("Bullet", (L && rate(L.bullet)) || "\u2014", L && L.bullet && L.bullet.games ? `${L.bullet.games} partai` : "belum main")}

/* ═══════════ RATING & TAKTIK: KEDUA SITUS BERDAMPINGAN ═══════════
   Rating antar-situs TIDAK setara. Rapid Lichess biasanya beberapa ratus poin
   di atas rapid Chess.com untuk pemain yang sama. Membandingkannya seolah satu
   skala adalah kesalahan yang akan membuat orang tua menyimpulkan hal yang salah.
   Karena itu keduanya ditampilkan terpisah, tidak pernah dijumlahkan atau dirata-rata. */
function renderRatings(){
  const el = $("#ratings"); if(!el) return;
  const L = (S.data && S.data.lichess && S.data.lichess.prof && S.data.lichess.prof.perfs) || {};
  const C = (S.data && S.data.chess && S.data.chess.stats) || {};

  const li = k => {
    const p = L[k];
    if(!p || p.games == null) return null;
    if(!p.games) return { v:"\u2014", s:"belum main" };
    return { v: p.rating + (p.prov ? "?" : ""), s: `${p.games} partai${p.prov ? " \u00b7 sementara" : ""}` };
  };
  const cc = k => {
    const p = C[k];
    if(!p || !p.last) return null;
    const r = p.record || {};
    return { v: p.last.rating, s: `${(r.win||0)}M / ${(r.draw||0)}R / ${(r.loss||0)}K` };
  };

  const baris = [];
  [["rapid","Rapid"],["blitz","Blitz"],["bullet","Bullet"],["classical","Klasik"]].forEach(([k,label])=>{
    const a = li(k), b = cc("chess_" + k);
    if(a || b) baris.push([label, a, b]);
  });

  // ── taktik / puzzle ──
  const lp = L.puzzle;
  const liPuz = lp && lp.games != null
    ? { v: lp.rating + (lp.prov ? "?" : ""), s: `${lp.games} puzzle \u00b7 terverifikasi harian` }
    : null;
  const tac = C.tactics;
  const ccPuz = tac && (tac.highest || tac.lowest)
    ? { v: tac.highest ? tac.highest.rating : "\u2014",
        s: `tertinggi${tac.lowest ? " \u00b7 terendah " + tac.lowest.rating : ""} \u00b7 rating kini TIDAK tersedia di API` }
    : null;
  if(liPuz || ccPuz) baris.push(["Puzzle / Taktik", liPuz, ccPuz]);

  const st = L.storm, rush = C.puzzle_rush;
  const liStorm = st ? { v: st.score, s: `${st.runs} kali main (Puzzle Storm)` } : null;
  const ccRush = rush && rush.best
    ? { v: rush.best.score,
        s: `terbaik${rush.daily ? " \u00b7 hari ini " + (rush.daily.score||0) + " dari " + (rush.daily.total_attempts||0) + " coba" : ""}` }
    : null;
  if(liStorm || ccRush) baris.push(["Puzzle Storm / Rush", liStorm, ccRush]);

  if(!baris.length){ el.innerHTML = `<div class="empty">Belum ada data rating dari kedua situs.</div>`; return; }

  const sel = x => x
    ? `<b style="font-family:var(--mono);font-size:15px">${x.v}</b><br><span style="font-family:var(--mono);font-size:9.5px;color:var(--soft)">${x.s}</span>`
    : `<span style="color:var(--rule)">\u2014</span>`;

  el.innerHTML = `<table>
    <tr><th></th>
      <th style="color:var(--carbon)">Lichess</th>
      <th style="color:var(--teal)">Chess.com</th></tr>
    ${baris.map(([n,a,b])=>`<tr>
      <td style="font-family:var(--sans);font-size:13px;font-weight:600">${n}</td>
      <td>${sel(a)}</td><td>${sel(b)}</td></tr>`).join("")}
  </table>
  <div class="empty" style="border-top:1px solid var(--rule)">
    Rating kedua situs BUKAN skala yang sama \u2014 rapid Lichess biasanya jauh di atas rapid
    Chess.com untuk pemain yang sama. Bandingkan naik-turunnya, bukan angkanya.
  </div>`;
}

function renderTodos(){
  const dk = todayKey();
  const el = $("#todos"); if(!el) return;
  const q = buildQuests();
  if(!S.cfg.chess && !S.cfg.lichess && !S.cfg.gs){ el.innerHTML = `<div class="empty">Sambungkan akun dulu di Pengaturan.</div>`; return; }
  el.innerHTML = q.map((x,i) => {
    const pct = x.goal ? Math.min(100, Math.round(100 * (x.invert ? (x.ok?1:0) : x.now/x.goal))) : 0;
    return `<div class="todo ${x.ok?"done":""} ${x.auto?"auto":""}" style="animation-delay:${.04*i}s">
      <span class="mark" role="checkbox" aria-checked="${x.ok}" aria-disabled="${x.auto || S.role==='anak'}"
        ${(x.auto || S.role==='anak')?"":`tabindex="0" data-toggle="${x.idx}"`}>${x.ok?"\u2713":""}</span>
      <span class="t">${x.t}<small class="${x.auto?"src":""}">${x.src}</small>
        ${x.auto && !x.invert ? `<span class="bar"><i data-w="${pct}%"></i></span>` : ""}</span>
      <span class="prog" style="color:${x.ok?"var(--ok)":"var(--soft)"}">${x.auto?`${x.now}/${x.goal}`:""}</span>
    </div>`;
  }).join("");
  $$("[data-toggle]").forEach(b => {
    const go = () => {
      S.checks[dk] = S.checks[dk] || {};
      S.checks[dk]["m"+b.dataset.toggle] = !S.checks[dk]["m"+b.dataset.toggle];
      persist(); render();
    };
    b.onclick = go;
    b.onkeydown = e => { if(e.key===" "||e.key==="Enter"){ e.preventDefault(); go(); } };
  });
}

function renderKPIs(){
  const el = $("#kpis"); if(!el) return;
  const dk = todayKey(), T = targets();
  const q = buildQuests(), done = q.filter(x=>x.ok).length;
  const pct = q.length ? Math.round(100*done/q.length) : 0;
  const pz = puzzlesOn(dk), g = gamesOn(dk), ls = losingStreakToday(), R = rushToday();
  const L = S.data && S.data.lichess ? S.data.lichess.prof : null;
  const C = S.data && S.data.chess ? S.data.chess.stats : null;
  const lpuz = L && L.perfs && L.perfs.puzzle ? L.perfs.puzzle.rating : null;
  const crapid = C && C.chess_rapid && C.chess_rapid.last ? C.chess_rapid.last.rating : null;
  const lrapid = L && L.perfs && L.perfs.rapid && L.perfs.rapid.games ? L.perfs.rapid.rating : null;
  const ctac   = C && C.tactics && C.tactics.highest ? C.tactics.highest.rating : null;

  const cards = [
    { v:pct, suf:"%", i:"kepatuhan hari ini", s:`${done}/${q.length} tugas`,
      tone: pct>=75?TONE.ok : pct>=40?TONE.warn : TONE.no },
    { v:pz, i:"puzzle hari ini",
      s: S.cfg.lichess ? (sumberPuzzle(dk) ? `target ${T.puzzle} \u00b7 ${sumberPuzzle(dk)}` : `target ${T.puzzle}`) : "butuh Lichess",
      tone: T.puzzle && pz>=T.puzzle ? TONE.ok : TONE.warn },
    { v:g.total, i:"partai hari ini", s: Object.entries(g.byClass).map(([k,v])=>`${k} ${v}`).join(" \u00b7 ") || "\u2014",
      tone: g.total>T.gameMax ? TONE.no : TONE.teal },
    { v:ls, i:"kalah beruntun", s: ls>=3?"HENTIKAN SESI":"aman", tone: ls>=3?TONE.no:TONE.ok },
    { v:lrapid||0, i:"rapid \u00b7 lichess", s:"skala Lichess", tone:TONE.carbon, raw:!lrapid },
    { v:crapid||0, i:"rapid \u00b7 chess.com", s:"skala Chess.com", tone:TONE.teal, raw:!crapid },
    { v:lpuz||0, i:"rating puzzle \u00b7 lichess", s:"terverifikasi harian", tone:TONE.carbon, raw:!lpuz },
    { v:ctac||0, i:"taktik tertinggi \u00b7 chess.com",
      s: newTacticsRecordToday() ? "REKOR BARU HARI INI" : "rating kini tak tersedia di API",
      tone:TONE.gold, raw:!ctac },
  ];
  if(T.rush > 0 || R.attempts > 0)
    cards.splice(2, 0, { v:R.attempts, i:"puzzle rush", s:R.attempts?`skor ${R.score}`:"belum", tone:TONE.gold });

  el.innerHTML = cards.map((c,i)=>`<div class="kpi" style="--tone:${c.tone};animation-delay:${.04*i}s">
    <b data-to="${c.v}" data-suf="${c.suf||""}">${c.raw?"\u2014":"0"}</b><i>${c.i}</i><small>${c.s}</small></div>`).join("");
  $$("#kpis b[data-to]").forEach(b => { if(b.textContent !== "\u2014") countUp(b, +b.dataset.to, b.dataset.suf); });
}

function renderAlerts(){
  const el = $("#alerts"); if(!el) return;
  const dk = todayKey(), T = targets();
  const g = gamesOn(dk), pz = puzzlesOn(dk), ls = losingStreakToday(), R = rushToday();
  const A = [];
  const jam = new Date().getHours();

  if(ls >= 3) A.push(["no","TILT",`Kalah ${ls} partai beruntun hari ini. Hentikan sesi. Bermain terus setelah tiga kekalahan hampir selalu memperburuk rating dan suasana hati.`]);
  if(g.byClass.bullet > T.bulletMax) A.push(["no","BULLET",`${g.byClass.bullet} partai bullet (batas ${T.bulletMax}). Bullet melatih refleks, bukan kalkulasi.`]);
  if(g.total > T.gameMax) A.push(["warn","VOLUME",`${g.total} partai hari ini, melewati batas ${T.gameMax}. Kuantitas tanpa analisis tidak menaikkan rating.`]);
  if(S.cfg.lichess && T.puzzle>0 && pz < T.puzzle && jam >= 19)
    A.push([pz===0?"no":"warn","PUZZLE",`Puzzle hari ini ${pz}/${T.puzzle} dan sudah lewat jam 19.`]);
  if(S.cfg.chess && T.rush>0 && R.attempts===0 && jam >= 19) A.push(["warn","RUSH","Puzzle Rush belum dikerjakan dan sudah lewat jam 19."]);
  if(newTacticsRecordToday()) A.push(["ok","REKOR","Rekor rating taktik baru tercatat hari ini."]);
  if(g.total===0 && pz===0 && R.attempts===0) A.push(["warn","SEPI","Tidak ada aktivitas terdeteksi hari ini."]);

  const G = normGames().filter(x=>x.acc!=null).slice(0,10);
  if(G.length >= 5){
    const avg = G.reduce((a,b)=>a+b.acc,0)/G.length;
    A.push([avg<70?"warn":"ok","AKURASI",`Rata-rata 10 partai terakhir: ${avg.toFixed(1)}%.` +
      (avg<70?" Di bawah 70% biasanya berarti bermain terlalu cepat untuk kontrol waktunya.":"")]);
  }
  if(!A.length) A.push(["ok","AMAN","Tidak ada tanda bahaya hari ini."]);
  el.innerHTML = A.map(([k,t,m],i)=>`<div class="alert-row ${k}" style="animation-delay:${.04*i}s">
    <b>${t}</b><span>${m}</span></div>`).join("");
}

function renderChart(id, series, sumbuPersen){
  const svg = $("#"+id); if(!svg) return;
  const H = 200, P = 36;
  const W = Math.max(300, Math.round(svg.getBoundingClientRect().width) || 700);
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
  if(!series.length){
    svg.innerHTML = `<text x="16" y="${H/2}" font-family="Space Mono" font-size="12" fill="#5D6473">Belum ada data.</text>`;
    const lg = $("#legend"); if(lg) lg.innerHTML = ""; return;
  }
  const all = series.flatMap(s=>s.pts);
  const t0 = Math.min(...all.map(p=>p.t)), t1 = Math.max(...all.map(p=>p.t));
  let v0 = Math.min(...all.map(p=>p.v)), v1 = Math.max(...all.map(p=>p.v));
  const pad = Math.max(15, (v1-v0)*0.15); v0 -= pad; v1 += pad;
  if(sumbuPersen){ v0 = Math.max(0, v0); v1 = Math.min(100, v1); }
  const X = t => P + (W-P-10) * (t1===t0 ? .5 : (t-t0)/(t1-t0));
  const Y = v => H-24 - (H-24-12) * (v1===v0 ? .5 : (v-v0)/(v1-v0));
  let g = "";
  for(let i=0;i<4;i++){
    const v = v0 + (v1-v0)*i/3;
    g += `<line x1="${P}" y1="${Y(v).toFixed(1)}" x2="${W-10}" y2="${Y(v).toFixed(1)}" stroke="#C3C7BA"/>
          <text x="2" y="${(Y(v)+3).toFixed(1)}" font-family="Space Mono" font-size="9" fill="#5D6473">${Math.round(v)}${sumbuPersen?"%":""}</text>`;
  }
  series.forEach((s,si)=>{
    const pts = s.pts.slice().sort((a,b)=>a.t-b.t);
    const d = pts.map((p,i)=>`${i?"L":"M"}${X(p.t).toFixed(1)},${Y(p.v).toFixed(1)}`).join(" ");
    const len = 3000;
    g += `<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"
            stroke-dasharray="${len}" stroke-dashoffset="${len}">
            <animate attributeName="stroke-dashoffset" from="${len}" to="0" dur="1.1s" begin="${si*.15}s" fill="freeze"/>
          </path>`;
    const last = pts[pts.length-1];
    g += `<circle cx="${X(last.t).toFixed(1)}" cy="${Y(last.v).toFixed(1)}" r="4" fill="${s.color}"/>`;
  });
  g += `<text x="${P}" y="${H-6}" font-family="Space Mono" font-size="9" fill="#5D6473">${new Date(t0).toLocaleDateString("id-ID",{day:"numeric",month:"short"})}</text>
        <text x="${W-10}" y="${H-6}" text-anchor="end" font-family="Space Mono" font-size="9" fill="#5D6473">${new Date(t1).toLocaleDateString("id-ID",{day:"numeric",month:"short"})}</text>`;
  svg.innerHTML = g;
  const lg = $("#legend");
  if(lg) lg.innerHTML = series.map(s=>`<span><i style="background:${s.color}"></i>${s.name}</span>`).join("");
}

function renderStrip(){

  const max = Math.max(1, ...vals);

    return `<div><div class="cell l${lv}" title="${dk}: ${puzzlesOn(dk)} puzzle, ${gamesOn(dk).total} partai"></div>${new Date(dk).getDate()}</div>`;
  }).join("");
}

function renderSummary(){
  const el = $("#summary"); if(!el) return;
  const C = S.data && S.data.chess, L = S.data && S.data.lichess;
  const rows = [];
  if(L && L.prof){
    const p = L.prof.perfs || {};
    if(p.puzzle) rows.push(["Rating puzzle (Lichess)", `${p.puzzle.rating}${p.puzzle.prov?"?":""} \u00b7 ${p.puzzle.games} puzzle`]);
    if(p.rapid && p.rapid.games)  rows.push(["Rapid (Lichess)", `${p.rapid.rating}${p.rapid.prov?"?":""} \u00b7 ${p.rapid.games} partai`]);
    if(p.blitz && p.blitz.games)  rows.push(["Blitz (Lichess)", `${p.blitz.rating}${p.blitz.prov?"?":""} \u00b7 ${p.blitz.games} partai`]);
    if(p.storm && p.storm.runs)   rows.push(["Puzzle Storm (Lichess)", `${p.storm.score} \u00b7 ${p.storm.runs} kali`]);
  }
  const G = normGames();
  const cc = G.filter(g=>g.site==="Chess.com"), li = G.filter(g=>g.site==="Lichess");
  const hit = a => `${a.length} \u00b7 ${a.filter(x=>x.res==="M").length}M / ${a.filter(x=>x.res==="R").length}R / ${a.filter(x=>x.res==="K").length}K`;
  if(li.length) rows.push(["Partai (Lichess)", hit(li)]);
  if(cc.length) rows.push(["Partai (Chess.com)", hit(cc)]);
  if(C){
    const st = C.stats || {};
    if(st.chess_rapid && st.chess_rapid.last) rows.push(["Rapid (Chess.com)", st.chess_rapid.last.rating]);
    if(st.chess_blitz && st.chess_blitz.last) rows.push(["Blitz (Chess.com)", st.chess_blitz.last.rating]);
    if(st.tactics && st.tactics.highest)
      rows.push(["Taktik tertinggi (Chess.com)", st.tactics.highest.rating +
        (st.tactics.lowest ? " \u00b7 terendah " + st.tactics.lowest.rating : "")]);
    if(st.puzzle_rush && st.puzzle_rush.best)
      rows.push(["Puzzle Rush terbaik (Chess.com)", st.puzzle_rush.best.score]);
  }
  rows.push(["Runtun hari aktif", streakHari()]);
  el.innerHTML = rows.length
    ? `<table>${rows.map(([a,b])=>`<tr><td style="font-family:var(--sans);font-size:13px">${a}</td><td style="text-align:right;font-weight:700">${b}</td></tr>`).join("")}</table>`
    : `<div class="empty">Belum ada data.</div>`;
}

let sudahKonfeti = "";
function render(){
  document.body.dataset.role = S.role;
  const tabs = TABS[S.role];
  if(!tabs.some(t=>t[0]===S.tab)) S.tab = tabs[0][0];
  $("#nav").innerHTML = tabs.map(([id,label])=>
    `<button data-tab="${id}" class="${id===S.tab?"on":""}">${label}</button>`).join("");
  $$("#nav button").forEach(b => b.onclick = () => { S.tab = b.dataset.tab; persist(); render(); });

  const V = {
    misi: viewMisi, progres: viewProgres,
    hari: S.role==="pelatih" ? viewHariPelatih : viewHariOrtu,
    minggu: viewMinggu, analisis: viewAnalisis, rencana: viewRencana,
    partai: viewPartai, atur: viewAtur,
  };
  $("#view").innerHTML = V[S.tab]();

  const umur = S.fetchedAt ? Date.now() - S.fetchedAt : null;
  const basi = umur != null && umur > 6*3600*1000;
  $("#sub").innerHTML = (S.cfg.name ? S.cfg.name.toUpperCase() + " \u00b7 " : "") +
    (S.fetchedAt
      ? (basi ? `<b style="color:var(--warn)">DATA ${Math.round(umur/3600000)} JAM LALU</b>` :
         "DATA " + new Date(S.fetchedAt).toLocaleString("id-ID",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}))
      : "BELUM ADA DATA");
  const hint = $("#setupHint");
  if(hint) hint.classList.toggle("hide", !!(S.cfg.chess || S.cfg.lichess || S.cfg.gs));
  const qd = $("#questDate");
  if(qd) qd.textContent = new Date().toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long"});

  renderTodos(); renderKPIs(); renderAlerts(); renderNotes(); renderPlatforms(); renderRatings();
  renderStrip(); renderSummary(); renderGames(); renderPlan(); renderAtur();
  if($("#chart")) renderChart("chart", ratingSeries(), false);
  if($("#accChart")) renderChart("accChart",
    akurasiTren().length ? [{name:"Akurasi", color:"#1E8C7F", pts:akurasiTren()}] : [], true);

  // rapor mingguan: angka menghitung naik
  if(S.tab === "minggu"){
    const W = last7();
    countUp($("#wPatuh"), Math.round(W.reduce((a,b)=>a+b.patuh,0)/7), "%");
    countUp($("#wAktif"), W.filter(w=>w.aktif).length);
    countUp($("#wStreak"), streakHari());
    countUp($("#wPz"), W.reduce((a,b)=>a+b.pz,0));
  }
  if(S.tab === "misi"){
    const q = buildQuests(), done = q.filter(x=>x.ok).length;
    const pct = q.length ? Math.round(100*done/q.length) : 0;
    countUp($("#misiPct"), pct, "%");
    const auto = q.filter(x=>x.auto);
    const kunci = todayKey() + ":" + auto.filter(x=>x.ok).length;
    if(auto.length && auto.every(x=>x.ok) && sudahKonfeti !== kunci){ sudahKonfeti = kunci; setTimeout(konfeti, 400); }
  }
  animateRings();
}

$$(".who button").forEach(b => b.onclick = () => {
  S.role = b.dataset.role;
  $$(".who button").forEach(x=>x.classList.toggle("on", x===b));
  persist(); render();
});
async function persist(){ await Store.save(S); }

const bR = $("#bRefresh");
if(bR) bR.onclick = async () => {
  bR.classList.add("spin2");
  try { await fetchAll(); } finally { bR.classList.remove("spin2"); }
};
/* BUG DI HP: membuka papan ketik memicu event `resize`. Versi lama memanggil
   render() penuh -> innerHTML diganti -> kolom yang sedang diketik kehilangan
   fokus DAN isinya. Itu penyebab utama rasa "tidak stabil" di HP.
   Sekarang: hanya grafik yang digambar ulang, dan tidak sama sekali kalau ada
   kolom yang sedang aktif. */
let _rz, _w = innerWidth;
addEventListener("resize", () => {
  const aktif = document.activeElement;
  if(aktif && /^(INPUT|TEXTAREA|SELECT)$/.test(aktif.tagName)) return;   // papan ketik terbuka
  if(Math.abs(innerWidth - _w) < 40) return;   // hanya tinggi yang berubah (bar URL menyusut)
  _w = innerWidth;
  clearTimeout(_rz);
  _rz = setTimeout(() => {
    if($("#chart")) renderChart("chart", ratingSeries(), false);
    if($("#accChart")) renderChart("accChart",
      akurasiTren().length ? [{name:"Akurasi", color:"#1E8C7F", pts:akurasiTren()}] : [], true);
  }, 250);
});

function renderAll(){ render(); }   // dipanggil oleh fetchAll()

(async () => {
  const saved = await Store.load();
  if(saved) S = Object.assign(S, saved);
  $$(".who button").forEach(x=>x.classList.toggle("on", x.dataset.role===S.role));
  render();
  if((S.cfg.chess||S.cfg.lichess||S.cfg.gs||S.cfg.csv) && Date.now()-S.fetchedAt > 15*60000) fetchAll();
})();
</script>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#EBEEF2">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Road To Grand Master">
<title>Road To Grand Master</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Lora:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* SATU tinta, SATU aksen, SATU kertas.
       Palet lama punya lima aksen (ungu, teal, koral, biru, emas) dan itulah yang
       membuatnya terasa seperti mainan. Di sini warna hanya boleh muncul kalau ia
       membawa arti: navy = struktur, emas = penting, merah/kuning/hijau = sinyal. */
    --paper:#F3F5F9;      /* latar terang */
    --card:#FFFFFF;       /* putih bersih */
    --ink:#0A2342;        /* navy SI PINTAR */
    --navy:#17457A;       /* navy sedang */
    --soft:#5A6B80;       /* abu dingin — AA di atas kartu */
    --rule:#DCE2EA;       /* garis abu dingin */
    --gold:#96731C;       /* emas tua — AA untuk TEKS di atas terang */
    --gold-lite:#C9A227;  /* emas SI PINTAR — HANYA bidang. Navy di atasnya AA */
    --ok:#1F6B4A; --warn:#A16317; --no:#C7192B;
    --carbon:var(--navy); --teal:var(--gold); --coral:var(--gold-lite); --sky:var(--navy);
    --accent:var(--gold);
    --serif:"Lora",Georgia,serif;
    --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
    --sans:"Archivo",system-ui,-apple-system,sans-serif;
    --dur:.45s;
  }
  /* Peran dibedakan oleh KEPEKATAN, bukan oleh warna yang berbeda-beda.
     Ketiganya tetap di keluarga navy–emas. */
  body[data-role="anak"]   { --accent:#B8892B; }
  body[data-role="ortu"]   { --accent:var(--navy); }
  body[data-role="pelatih"]{ --accent:#6B4E2E; }
  /* MODE GELAP. Dasbor ini dibuka malam hari, setelah anak selesai bertanding.
     Bukan inversi warna \u2014 tinta jadi kertas, dan warna sinyal dinaikkan
     kecerahannya supaya hijau/kuning/merah tetap terbaca di latar gelap. */
  body[data-tema="gelap"]{
    --paper:#0C1929;      /* navy malam */
    --card:#132436;
    --ink:#F0E9D8;        /* krem jadi tinta */
    --navy:#2C4C74;
    --soft:#8A9AB0;
    --rule:#26405C;
    --gold:#E0B052;       /* emas dinaikkan supaya terbaca di navy */
    --gold-lite:#F0C978;
    --ok:#48B583; --warn:#DDA24A; --no:#E06A5C;
    --carbon:var(--navy); --teal:var(--gold); --coral:var(--gold-lite); --sky:#7BA6D8;
  }
  body[data-tema="gelap"] input,
  body[data-tema="gelap"] select,
  body[data-tema="gelap"] textarea{ background:#081320; color:var(--ink) }
  body[data-tema="gelap"] .strip .cell{ background:#081320 }
  body[data-tema="gelap"] .week .box{ background:#081320 }
  body[data-tema="gelap"] .plat .foot{ background:rgba(255,255,255,.04) }
  body[data-tema="gelap"] .tilt{ color:#0C1929 }
  body[data-tema="gelap"] .sq .p.w{ color:#F0F1EA }


  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--paper);color:var(--ink);font-family:var(--sans);
    touch-action:manipulation;-webkit-tap-highlight-color:transparent;
    padding:18px 14px 50px;transition:background var(--dur);
    /* Latar polos. Semburat dipasang di lapisan terpisah (body::before), bukan
       di sini: background-attachment:fixed memaksa cat ulang tiap frame saat
       di-scroll di HP, dan itu persis yang membuat aplikasi terasa tersendat. */
  }
  /* Lapisan semburat: dipasang sekali, tidak ikut di-scroll, tidak dicat ulang. */
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(1200px 540px at 50% -10%, rgba(201,162,39,.10), transparent 66%),
      radial-gradient(820px 460px at 100% 100%, rgba(10,35,66,.08), transparent 72%);
  }
  body[data-tema="gelap"]::before{
    background:
      radial-gradient(1200px 540px at 50% -10%, rgba(224,176,82,.10), transparent 66%),
      radial-gradient(820px 460px at 100% 100%, rgba(44,76,116,.16), transparent 72%);
  }
  .sheet{max-width:1080px;margin:0 auto}

  header{display:flex;flex-direction:column;gap:var(--s3);
    border-bottom:2px solid var(--navy);padding-bottom:var(--s3);margin-bottom:16px}
  .masthead{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--s3)}
  .brand-wrap{min-width:0}
  .util{display:flex;gap:6px;flex:0 0 auto}
  .util button{font-family:var(--mono);font-weight:600;font-size:12px;min-width:40px;height:40px;padding:0 9px;
    background:var(--card);color:var(--soft);border:1px solid var(--rule);border-radius:var(--r);cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;transition:background .15s,color .15s,border-color .15s}
  .util button:hover{color:var(--ink);border-color:var(--soft)}
  #bTema,#bAtur{font-size:15px}
  .hrow{display:flex;align-items:flex-end;justify-content:space-between;gap:var(--s4);flex-wrap:wrap}
  .roles{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
  .roles-lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft)}
  .brand{
    font-family:var(--serif);font-weight:600;font-size:23px;letter-spacing:.01em;
    line-height:1.1;color:var(--ink)}
  .brand::after{
    content:"";display:block;width:38px;height:2px;background:var(--gold-lite);margin-top:6px;
    transform-origin:left;animation:drawline .6s .15s both cubic-bezier(.2,.8,.2,1)}
  .brand span{color:var(--accent);transition:color var(--dur)}
  .tagline{font-family:var(--mono);font-size:10px;color:var(--soft);letter-spacing:.1em;margin-top:7px;font-weight:500}
  .brand{white-space:normal}
  #pilihAnak{
    margin-top:0;width:auto;min-width:160px;max-width:100%;
    font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.01em;
    padding:7px 10px;border:1px solid var(--rule);border-left:3px solid var(--gold);border-radius:var(--r);
    background:var(--card);cursor:pointer;color:var(--ink)}
  .who{display:flex;font-family:var(--sans);font-size:12px;letter-spacing:.02em}
  .who button{background:var(--card);border:1px solid var(--rule);border-right:0;padding:8px 13px;cursor:pointer;
    font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:.02em;color:var(--ink);
    transition:background .18s,color .18s;min-height:40px}
  .who button:last-child{border-right:1px solid var(--rule)}
  .who button.on{background:var(--ink);color:var(--card)}
  /* Emas terang butuh tinta gelap; navy butuh tinta terang. Kontras dulu, gaya belakangan. */
  body[data-role="anak"] .who button.on{background:var(--gold-lite);border-color:var(--ink);color:var(--ink)}
  body[data-role="ortu"] .who button.on{background:var(--navy);border-color:var(--navy);color:var(--card)}
  body[data-role="pelatih"] .who button.on{background:var(--ink);border-color:var(--ink);color:var(--card)}

  nav{display:flex;margin-bottom:18px;flex-wrap:wrap}
  nav button{font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.01em;
    background:none;border:0;border-bottom:3px solid transparent;padding:9px 15px;cursor:pointer;color:var(--soft);
    transition:color .18s,border-color .18s;min-height:42px}
  nav button.on{color:var(--ink);border-bottom-color:var(--gold);font-weight:700}

  /* SKALA JARAK. Semua padding/margin kelipatan 4px. Ketidakrapian yang kamu
     rasakan hampir selalu ini: jarak yang dipilih satu-satu, bukan dari skala. */
  :root{ --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --r:4px; }

  /* Kartu: TANPA bingkai penuh. Satu garis tipis di atas, sisanya ruang kosong.
     Bingkai di sekeliling segalanya adalah sumber utama rasa "ramai". */
  section.box{
    background:transparent;border:0;margin-bottom:var(--s6);
    animation:rise var(--dur) both}
  /* Judul: teks di atas kertas, bukan palang gelap. Ikon memberi tanda,
     garis emas tipis memberi batas. Itu cukup. */
  section.box>h2{
    display:flex;align-items:center;gap:var(--s2);
    font-family:var(--serif);font-size:17px;letter-spacing:.005em;font-weight:600;
    color:var(--ink);background:transparent;
    padding:0 0 var(--s2) 0;margin-bottom:var(--s3);
    border-bottom:1px solid var(--rule);position:relative}
  section.box>h2::after{
    content:"";position:absolute;left:0;bottom:-1px;width:34px;height:2px;background:var(--gold-lite);
    transform-origin:left;animation:drawline .55s .2s both cubic-bezier(.2,.8,.2,1)}
  section.box>h2 .ik{color:var(--gold);flex:0 0 auto}
  section.box>h2 span{flex:1 1 auto;min-width:0}
  section.box>h2 em{
    font-family:var(--mono);font-style:normal;font-size:10.5px;color:var(--soft);
    letter-spacing:.01em;text-align:right;font-weight:400;flex:0 0 auto;max-width:52%}

  /* Isi kartu duduk langsung di kertas. Latar hanya untuk baris yang
     benar-benar perlu dipisahkan. */
  section.box > div,
  section.box > table,
  section.box > svg{background:transparent}

  /* "kenapa?" — penjelasan panjang disembunyikan, tidak dihapus. */
  .knp{margin-top:var(--s1)}
  .knp summary{
    font-family:var(--mono);font-size:10.5px;color:var(--gold);cursor:pointer;
    list-style:none;display:inline-flex;align-items:center;gap:4px;padding:2px 0}
  .knp summary::-webkit-details-marker{display:none}
  .knp summary::after{content:"\002B";font-weight:700}
  .knp[open] summary::after{content:"\2212"}
  .knp > div{
    font-family:var(--sans);font-size:12.5px;line-height:1.55;color:var(--soft);
    padding:var(--s2) 0 var(--s1);max-width:64ch}
  .pad{padding:0}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes drawline{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  .st1{animation-delay:.04s} .st2{animation-delay:.09s} .st3{animation-delay:.14s} .st4{animation-delay:.19s}

  /* ══ KPI ══ */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:var(--s4) var(--s5);margin-bottom:var(--s6)}
  .kpi{background:transparent;border:0;border-top:2px solid var(--tone,var(--rule));
    padding:var(--s2) 0 0;position:relative;animation:rise var(--dur) both}
  .kpi b{display:block;font-family:var(--mono);font-size:26px;line-height:1.15;font-weight:600;
    font-variant-numeric:tabular-nums;color:var(--tone,var(--ink))}
  .kpi i{font-style:normal;font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.03em;color:var(--soft)}
  .kpi small{display:block;font-family:var(--mono);font-size:10.5px;color:var(--soft);margin-top:4px}

  /* ══ cincin progres (tampilan anak) ══ */
  .rings{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:12px;padding:14px 12px}
  .ring{text-align:center;animation:rise var(--dur) both}
  .ring svg{width:96px;height:96px;transform:rotate(-90deg)}
  .ring circle{fill:none;stroke-width:9;stroke-linecap:round}
  .ring .bg{stroke:var(--rule)}
  .ring .fg{stroke:var(--tone);stroke-dasharray:264;stroke-dashoffset:264;
    transition:stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)}
  .ring .num{position:relative;margin-top:-62px;margin-bottom:26px;
    font-family:var(--mono);font-weight:700;font-size:19px;color:var(--tone)}
  .ring .num span{display:block;font-size:9px;color:var(--soft);letter-spacing:.08em}
  .ring p{font-size:12px;font-weight:600;line-height:1.3}
  .ring.done .lbl::after{content:" ✓";color:var(--ok);font-weight:800}

  /* ══ misi anak ══ */
  .mission{border:1px solid var(--rule);border-radius:var(--r);background:var(--card);padding:0;margin-bottom:16px;overflow:hidden;box-shadow:0 1px 3px rgba(19,42,68,.05)}
  .mission .top{background:var(--ink);color:var(--card);padding:16px;display:flex;justify-content:space-between;
    align-items:center;border-bottom:2px solid var(--gold)}
  .mission .top b{font-family:var(--serif);font-size:16px;letter-spacing:.02em;font-weight:600}
  .mission .top .pct{font-family:var(--mono);font-weight:600;font-size:28px;color:var(--gold-lite);font-variant-numeric:tabular-nums}
  .mission .track{height:8px;background:var(--rule)}
  .mission .track i{display:block;height:100%;background:var(--gold-lite);width:0;transition:width 1.1s cubic-bezier(.2,.8,.2,1)}
  .flame{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-weight:700}
  .flame svg{width:17px;height:17px;animation:flick 1.6s ease-in-out infinite}
  @keyframes flick{0%,100%{transform:scale(1) rotate(-2deg)}50%{transform:scale(1.14) rotate(2deg)}}

  .todo{display:grid;grid-template-columns:26px 1fr auto;gap:var(--s3);align-items:center;
    padding:var(--s3) 0;border-bottom:1px solid var(--rule);animation:rise .4s both}
  .todo:last-child{border-bottom:0}
  .todo .mark{width:26px;height:26px;border:1.5px solid var(--ink);border-radius:3px;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:14px;font-weight:700;background:transparent;cursor:pointer;
    transition:background .25s,transform .25s,border-color .25s}
  .todo .mark[aria-disabled="true"]{cursor:default}
  .todo.done .mark{background:var(--ok);border-color:var(--ok);color:#fff;animation:pop .35s}
  .todo.auto.done .mark{background:var(--gold-lite);border-color:var(--ink);color:var(--ink)}
  @keyframes pop{0%{transform:scale(.6)}55%{transform:scale(1.25)}100%{transform:scale(1)}}
  .todo .t{font-size:14px;line-height:1.35}
  .todo .t small{display:block;font-family:var(--mono);font-size:10px;color:var(--soft);margin-top:3px;
    letter-spacing:.02em}
  .todo .t small.src{color:var(--accent)}
  /* TIDAK ada coretan. Teks tercoret sulit dibaca anak, dan mengaburkan beda
     antara "tugas selesai" dan "pagar tidak dilanggar". Centang saja sudah cukup. */
  .todo.done .t{opacity:.78}
  .todo .prog{font-family:var(--mono);font-size:12px;font-weight:700;white-space:nowrap}
  /* Pagar bukan tugas: tidak ada yang "dikerjakan", hanya tidak dilanggar. */
  .todo.pagar{opacity:.82}
  .todo.pagar .mark{border-style:dashed}
  .todo.pagar.done .mark{background:transparent;border-color:var(--ok);border-style:solid;color:var(--ok)}
  .todo.pagar .prog{font-size:10px;letter-spacing:.1em}

  .bar{height:5px;background:var(--rule);margin-top:6px;max-width:190px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--accent);width:0;transition:width .9s cubic-bezier(.2,.8,.2,1)}

  .golinks{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:12px}
  a.go{display:block;text-decoration:none;color:#fff;padding:14px;border:1px solid rgba(19,42,68,.14);border-radius:var(--r);
    box-shadow:0 1px 3px rgba(19,42,68,.10);transition:transform .12s,box-shadow .12s,filter .12s}
  a.go:active{transform:translateY(1px);box-shadow:0 1px 2px rgba(19,42,68,.08);filter:brightness(.97)}
  a.go b{display:block;font-family:var(--serif);font-size:15px;letter-spacing:.01em;font-weight:600}
  a.go span{font-size:11.5px;opacity:.9}
  a.go.p{background:var(--gold-lite);color:var(--ink)} a.go.g{background:var(--navy)} a.go.d{background:var(--ink)}

  /* ══ kolom platform ══ */
  .plats{display:grid;grid-template-columns:1fr 1fr;gap:var(--s4);margin-bottom:var(--s6)}
  .plat{background:var(--card);border:1px solid var(--rule);border-top:2px solid var(--navy);border-radius:var(--r);
    box-shadow:0 1px 3px rgba(19,42,68,.05);animation:rise var(--dur) both;overflow:hidden}
  .plat > h3{
    font-family:var(--serif);font-size:14px;letter-spacing:.01em;font-weight:600;
    padding:11px 14px;color:var(--card);display:flex;justify-content:space-between;align-items:center}
  .plat.li > h3{background:var(--navy);border-bottom:2px solid var(--gold)}
  .plat.cc > h3{background:var(--gold-lite);border-bottom:2px solid var(--ink);color:var(--ink)}
  .plat > h3 em{font-family:var(--mono);font-style:normal;font-size:9.5px;opacity:.8;letter-spacing:.02em;font-weight:400}
  .plat .hero{padding:12px;border-bottom:1px solid var(--rule);display:flex;gap:14px;align-items:baseline}
  .plat .hero b{font-family:var(--mono);font-size:32px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
  .plat .hero span{font-family:var(--sans);font-size:11.5px;font-weight:600;color:var(--soft);letter-spacing:.02em}
  .plat .hero .sub{margin-left:auto;text-align:right;font-family:var(--mono);font-size:11px;color:var(--soft)}
  .plat dl{margin:0}
  .plat .r{display:flex;justify-content:space-between;align-items:baseline;gap:var(--s2);
    padding:var(--s2) var(--s3);border-bottom:1px solid var(--rule);font-size:13px}
  .plat .r:last-child{border-bottom:0}
  .plat .r dt{font-family:var(--sans);color:var(--ink);font-weight:500}
  .plat .r dd{font-family:var(--mono);font-weight:600;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
  .plat .r dd small{display:block;font-weight:400;font-size:9.5px;color:var(--soft);letter-spacing:.04em}
  .plat .r.dim dd{color:var(--soft);font-weight:400}
  .plat .r.no dd{color:var(--no)}
  .plat .r.ok dd{color:var(--ok)}
  .plat .foot{padding:9px 12px;font-family:var(--mono);font-size:9.5px;line-height:1.5;color:var(--soft);
    background:rgba(27,33,48,.04);border-top:1px solid var(--rule)}
  @media(max-width:700px){ .plats{grid-template-columns:1fr;gap:10px} }

  .filt{display:flex;gap:0;padding:10px 12px;border-bottom:1px solid var(--rule)}
  .filt button{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    padding:7px 12px;border:1px solid var(--rule);border-right:0;background:var(--card);cursor:pointer;
    color:var(--ink);min-height:36px}
  .filt button:last-child{border-right:1px solid var(--rule)}
  .filt button.on{background:var(--ink);color:var(--card)}
  /* Kekalahan miniatur: partai yang harus dibedah pelatih lebih dulu. */
  tr.mini td{background:rgba(159,49,40,.08)}
  tr.mini td:first-child{box-shadow:inset 3px 0 0 var(--no)}
  .miniTag{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--no);
    border:1px solid var(--no);padding:1px 4px;margin-left:5px;white-space:nowrap}

  /* ══ spanduk tilt (layar anak) ══ */
  .tilt{
    border:3px solid var(--no);background:var(--no);color:#fff;padding:16px;margin-bottom:16px;
    animation:pulse 1.6s ease-in-out infinite}
  .tilt b{display:block;font-family:var(--serif);font-size:17px;letter-spacing:.01em;margin-bottom:8px;font-weight:600}
  .tilt p{font-size:14px;line-height:1.55}
  .tilt .why{margin-top:9px;font-family:var(--mono);font-size:11px;opacity:.85;line-height:1.5}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(159,49,40,.5)}50%{box-shadow:0 0 0 9px rgba(159,49,40,0)}}
  @media(prefers-reduced-motion:reduce){ .tilt{animation:none} }

  /* ══ pelatih ══ */
  .rek{display:grid;grid-template-columns:1fr;gap:0}
  .rek a{display:grid;grid-template-columns:1fr auto;gap:var(--s3);align-items:center;
    text-decoration:none;color:inherit;padding:var(--s3);border-bottom:1px solid var(--rule);
    background:var(--card);transition:background .15s}
  .rek a:last-child{border-bottom:0}
  .rek a:hover{background:var(--paper)}
  .rek b{font-family:var(--serif);font-size:16px;font-weight:600;display:block;margin-bottom:3px}
  .rek small{font-family:var(--mono);font-size:11px;color:var(--soft);line-height:1.5;display:block}
  .rek .arr{font-family:var(--mono);font-size:16px;color:var(--gold);font-weight:600}
  .rek a.kuat{border-left:3px solid var(--no)}
  .rek a.senang{border-left:3px solid var(--ok)}
  .sumber{font-family:var(--mono);font-size:10.5px;padding:9px 14px;line-height:1.55;
    border-bottom:1px solid var(--rule)}

<script>
/* ================== TOKEN LICHESS OTOMATIS (opsional) ==================

let DB = { v:2, anak:[], aktif:null, role:"ortu", tab:"hari", tema:"auto", lang:"id" };

const idBaru = () => "a" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);

});
const MEDAN = ["cfg","tier","targets","manual","checks","notes","snaps","data","fetchedAt","filter","tiltLewat","tiltHari","temaHari","temaKemarin","libur","tiltSkip"];
function anakAktif(){ return DB.anak.find(a => a.id === DB.aktif) || DB.anak[0] || null; }
function muatAnak(){
  const a = anakAktif(); if(!a) return;
  MEDAN.forEach(k => S[k] = a[k]);
  if(a.tiltHari !== todayKey()){ a.tiltHari = todayKey(); a.tiltLewat = false; }
  S.tiltLewat = a.tiltLewat;
  S.libur = a.libur || {};          // { "2026-07-18": true } — hari libur resmi
  S.tiltSkip = a.tiltSkip || {};    // { "2026-07-18": 2 } — kunci tilt dilewati
  S.cfg.name = a.nama;
  // Konfigurasi bakuan menang atas localStorage lama -> tak perlu input di HP/perangkat baru.
  if(BAKED_GS) S.cfg.gs = BAKED_GS;             // URL backend: dipaksa (sumber tunggal = file)
  S.cfg.chess = "";      // sistem murni Lichess
  S.cfg.liToken = "";    // Token browser dibuang: verifikasi tema murni dari backend
  if(BAKED_GS) S.cfg.csv = "";  // Backend /exec = sumber tunggal; CSV tak dipakai lagi
  if(!S.cfg.lichess) S.cfg.lichess = BAKED_LICHESS;
  _ng = null; _ngAt = "";        // WAJIB: buang cache partai anak sebelumnya
}
function simpanAnak(){
  const a = anakAktif(); if(!a) return;
  MEDAN.forEach(k => a[k] = S[k]);
  a.nama = (S.cfg.name || "").trim() || a.nama;
}

/* Tugas kurikulum. Bentuk objek: { teks, tema?, n? }

/* ═══════════ pengambilan data ═══════════ */
function url(u){ return S.cfg.proxy ? S.cfg.proxy + encodeURIComponent(u) : u; }

/* Jaringan seluler menggantung tanpa pernah menolak. Tanpa batas waktu,
   fetch menunggu selamanya dan aplikasi TAMPAK beku, bukan gagal.
   Ditambah 2x ulang-coba dengan jeda: kegagalan sesaat di HP itu normal. */
const BATAS_MS = 12000, ULANG = 2;
async function ambilMentah(u, accept){
  let galat;
  for(let i = 0; i <= ULANG; i++){
    const ac = new AbortController();
    const jam = setTimeout(() => ac.abort(), BATAS_MS);
    try{
      const r = await fetch(url(u), { headers:{ Accept: accept }, signal: ac.signal, cache:"no-store" });
      clearTimeout(jam);
      if(r.status === 429){ galat = new Error("HTTP 429"); await tidur(1500 * (i+1)); continue; }
      if(!r.ok) throw new Error("HTTP " + r.status);
      return r;
    }catch(e){
      clearTimeout(jam);
      galat = e.name === "AbortError"
        ? new Error("waktu habis setelah " + (BATAS_MS/1000) + " detik \u2014 jaringan lambat atau menggantung")
        : e;
      // 404 tidak akan berubah walau diulang
      if(/HTTP 4(0[0-9]|1[0-8])/.test(String(galat.message))) break;
      if(i < ULANG) await tidur(700 * (i+1));
    }
  }
  throw galat;
}
const tidur = ms2 => new Promise(r => setTimeout(r, ms2));
async function getJSON(u){ return (await ambilMentah(u, "application/json")).json(); }

/* Permintaan ber-token. Token TIDAK PERNAH ditulis ke dalam file ini —
   ia diketik pengguna, disimpan di browsernya, dan tidak ikut ke GitHub. */
async function fetchAuth(u, token, accept){
  const ac = new AbortController();
  const jam = setTimeout(() => ac.abort(), BATAS_MS);
  try{
    // Permintaan ber-token TIDAK boleh lewat proxy pihak ketiga (proxy bisa
    // menyadap header Authorization). Endpoint Lichess ini mendukung CORS langsung.
    const r = await fetch(u, {
      headers: { Accept: accept, Authorization: "Bearer " + token },
      signal: ac.signal, cache: "no-store",
    });
    clearTimeout(jam);
    if(r.status === 401) throw new Error("HTTP 401 \u2014 token ditolak Lichess");
    if(!r.ok) throw new Error("HTTP " + r.status);
    return r;
  }catch(e){ clearTimeout(jam); throw e; }
}
async function getJSONAuth(u, token){
  return (await fetchAuth(u, token, "application/json")).json();
}
async function getNDJSONAuth(u, token){
  const t = await (await fetchAuth(u, token, "application/x-ndjson")).text();
  return t.split("\n").filter(Boolean)
    .map(l => { try { return JSON.parse(l); } catch(e){ return null; } })
    .filter(Boolean);
}
/* Lichess mengirim daftar partai sebagai NDJSON: satu objek JSON per baris,
   bukan satu array. r.json() akan GAGAL di sini. */
async function getNDJSON(u){
  const t = await (await ambilMentah(u, "application/x-ndjson")).text();
  return t.split("\n").filter(Boolean).map(l => JSON.parse(l));
}

   pengambilan data tanpa pesan apa pun. */
function logLine(msg, kind){
  S.fetchLog = S.fetchLog || [];
  S.fetchLog.push({ msg, kind, t: Date.now() });
  const el = $("#fetchLog");
  if(!el) return;
  const d = document.createElement("div");
  d.className = "alert-row " + (kind||"");
  d.innerHTML = `<b>${kind==="no"?"GAGAL":kind==="warn"?"SEBAGIAN":"OK"}</b><span>${msg}</span>`;
  el.appendChild(d);
}
function logClear(){ S.fetchLog = []; const el = $("#fetchLog"); if(el) el.innerHTML = ""; }
function logShow(){
  const el = $("#fetchLog"); if(!el) return;
  el.innerHTML = (S.fetchLog||[]).map(x =>
    `<div class="alert-row ${x.kind||""}"><b>${x.kind==="no"?"GAGAL":x.kind==="warn"?"SEBAGIAN":"OK"}</b><span>${x.msg}</span></div>`
  ).join("") || `<div class="empty" style="padding:0">Belum ada percobaan tarik data.</div>`;
}
/* Menerjemahkan kegagalan jaringan jadi sebab yang bisa ditindak.
   "Failed to fetch" tidak memberi tahu apa pun kepada orang tua. */
function sebab(e, situs){
  const m = String(e && e.message || e);
  if(/^HTTP 404/.test(m)) return `username "${situs}" tidak ditemukan. Periksa ejaannya.`;
  if(/^HTTP 429/.test(m)) return "terlalu banyak permintaan (429). Tunggu satu menit.";
  if(/^HTTP 403/.test(m)) return "diblokir server (403).";
  if(/^HTTP 5\d\d/.test(m)) return m + " — server sedang bermasalah, bukan kesalahanmu.";
  if(/Failed to fetch|NetworkError|Load failed|TypeError/i.test(m))
    return "permintaan diblokir browser. Dua penyebab paling sering: (1) file dibuka lewat file:// — harus lewat http:// atau GitHub Pages; (2) CORS. Isi kolom Proxy CORS kalau (1) sudah benar.";
  return m;
}

/* Sheet yang diterbitkan lewat File > Share > Publish to web > CSV
   disajikan Google dengan header CORS terbuka. Ia TIDAK PERNAH diblokir browser,
   berbeda dengan endpoint /exec Apps Script yang mengalihkan ke halaman login
   kalau aksesnya bukan "Anyone".

   Pemetaan kolom memakai NAMA HEADER, bukan nomor kolom. Kalau saya menambah
   kolom baru di Kode.gs nanti, ini tidak akan diam-diam salah baca. */
function parseCSV(teks){
  const baris = [];
  let f = "", row = [], q = false;
  for(let i=0;i<teks.length;i++){
    const c = teks[i];
    if(q){
      if(c === '"'){ if(teks[i+1] === '"'){ f += '"'; i++; } else q = false; }
      else f += c;
    } else if(c === '"') q = true;
    else if(c === ","){ row.push(f); f = ""; }
    else if(c === "\n"){ row.push(f); baris.push(row); row = []; f = ""; }
    else if(c !== "\r") f += c;
  }
  if(f || row.length){ row.push(f); baris.push(row); }
  return baris.filter(r => r.some(x => x !== ""));
}
function snapsDariCSV(teks){
  const baris = parseCSV(teks);
  if(baris.length < 2) return {};
  const H = baris[0].map(x => x.trim().toLowerCase());
  const kol = nama => H.findIndex(h => h.indexOf(nama) === 0);
  const iTgl   = kol("tanggal"),
        iPz    = kol("puzzle (lichess)"), iTot = kol("puzzle total"),
        iRate  = kol("rating puzzle"),
        iPatuh = kol("kepatuhan"), iLang = kol("pelanggaran"), iStat = kol("status"), iTema = kol("tema");
  if(iTgl < 0) return {};
  const n = (r,i) => (i >= 0 && r[i] !== "" && r[i] != null) ? Number(r[i]) : null;
  const out = {};
  baris.slice(1).forEach(r => {
    let dk = (r[iTgl]||"").trim();
    // Toleran format lokal Indonesia (DD/MM/YYYY atau D/M/YYYY) -> ISO.
    const mLoc = dk.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})$/);
    if(mLoc) dk = mLoc[3] + "-" + mLoc[2].padStart(2,"0") + "-" + mLoc[1].padStart(2,"0");
    if(!/^\d{4}-\d{2}-\d{2}$/.test(dk)) return;
    out[dk] = {
      puzzles: n(r,iPz) || 0, puzTotal: n(r,iTot), puzRating: n(r,iRate),
      kepatuhan: n(r,iPatuh), langgar: iLang >= 0 ? r[iLang] : "",
      status: iStat >= 0 ? r[iStat] : "",
      tema: (function(){ const v = iTema >= 0 ? r[iTema] : ""; if(!v || !String(v).trim()) return undefined;
        try { const o = JSON.parse(v); return (o && typeof o === "object") ? o : undefined; } catch(e){ return undefined; } })(),
    };
  });
  return out;
}

async function fetchAll(){

  const out = { chess:null, lichess:null, errors:[] };

  // GS (Apps Script) = sumber utama. CSV kini CADANGAN, dijalankan di bawah HANYA
  // kalau GS tak mengirim data. Jadi galat CSV tak muncul saat GS jalan.
  let gsOk = false;

  // Sumber utama: Apps Script. Ia sudah punya SELURUH riwayat harian —
  // termasuk hari-hari saat dasbor ini tidak pernah dibuka.
  if(S.cfg.gs){

      out.chess = { user:d.user, stats:d.stats, games:d.games||[], months:"-", viaGs:true };
      if(d.lichess) out.lichess = d.lichess;
      if(d.snaps) Object.keys(d.snaps).forEach(k => {

      });
      if(d.temaStatus) S.temaStatusBackend = d.temaStatus;
      if(d.nama && !S.cfg.name) S.cfg.name = d.nama;
    }catch(e){ out.errors.push(["Apps Script", e.message]); }
  }

  // CADANGAN: CSV hanya kalau GS tak mengirim data (mis. akses GS salah tapi sheet
  // dipublikasikan). Kalau GS sukses, blok ini dilewati -> tak ada galat CSV.
  if(S.cfg.csv && !gsOk){
    try{
      const r = await fetch(S.cfg.csv.trim());
      if(!r.ok) throw new Error("HTTP " + r.status);
      const snaps = snapsDariCSV(await r.text());
      const n = Object.keys(snaps).length;
      if(!n) throw new Error("CSV terbaca tapi tidak ada baris tanggal yang sah. Pastikan yang diterbitkan adalah sheet 'Harian'.");
      Object.keys(snaps).forEach(k => {
        S.snaps[k] = Object.assign({}, snaps[k], S.snaps[k]);
        if(snaps[k].tema) S.snaps[k].tema = snaps[k].tema;
      });
      logLine(`Sheet CSV (cadangan): ${n} hari riwayat`, "");
    }catch(e){ out.errors.push(["Sheet CSV", e.message]); }
  }

  if(S.cfg.lichess && !out.lichess){
    const u = S.cfg.lichess.trim();
    try{
      /* Dulu memakai Promise.all dengan `prof` tanpa .catch: kalau endpoint profil
         gagal, SELURUH data Lichess ikut hangus — termasuk feed aktivitas yang
         sebenarnya berhasil. allSettled menyelamatkan apa pun yang berhasil. */
      const T_ = (S.cfg.liToken && S.cfg.liToken.trim()) || LICHESS_TOKEN.trim();
      const hasil = await Promise.allSettled([
        getJSON(`https://lichess.org/api/user/${u}`),
        getJSON(`https://lichess.org/api/user/${u}/activity`),
        getJSON(`https://lichess.org/api/user/${u}/rating-history`),
        getNDJSON(`https://lichess.org/api/games/user/${u}?max=100&opening=true&evals=true`),
        // Performa PER TEMA, 30 hari. Butuh token (puzzle:read).
        T_ ? getJSONAuth(`https://lichess.org/api/puzzle/dashboard/30`, T_)
           : Promise.reject(new Error("tanpa token")),
        /* SETIAP percobaan puzzle, dengan tema dan waktunya. Inilah yang membuat
           target tema bisa DIVERIFIKASI, bukan sekadar disarankan. Tanpa ini,
           "kerjakan 10 puzzle Pin" hanya bisa jadi centang manual. */
        T_ ? getNDJSONAuth(`https://lichess.org/api/puzzle/activity?max=200`, T_)
           : Promise.reject(new Error("tanpa token")),
      ]);
      const nilai = i => hasil[i].status === "fulfilled" ? hasil[i].value : null;
      const prof = nilai(0), act = nilai(1) || [], hist = nilai(2) || [], lg = nilai(3);
      const pzDash = nilai(4), pzAct = nilai(5);

      if(!prof && !act.length && !lg)
        throw hasil[0].reason || new Error("semua endpoint Lichess gagal");

      out.lichess = { user:u, prof, act, hist, games: lg || [], gamesOk: !!lg, pzDash, pzAct };
      if(!prof) logLine("Lichess: profil gagal ditarik, tapi aktivitas & partai TETAP terbaca. " +
        "Rating tidak akan diperbarui kali ini.", "warn");
      if(T_ && !pzDash && !pzAct)
        logLine("Token Lichess DITOLAK atau tidak punya izin puzzle:read. Rekomendasi tema kembali jadi tebakan, " +
          "dan target tema tidak bisa diverifikasi.", "no");
      else if(pzDash || pzAct)
        logLine(`Token OK \u2014 ${(pzDash && pzDash.themes ? pzDash.themes.length + " tema, " : "")}` +
          `${pzAct ? pzAct.length + " percobaan puzzle terbaca. Target tema DIVERIFIKASI." : ""}`, "");
    }catch(e){ out.errors.push(["Lichess", e.message]); }

  if(_el) _el.innerHTML = "";

  out.errors.forEach(([site,msg])=>{

      logLine("Apps Script: diblokir browser. Ini HAMPIR SELALU berarti deployment-nya belum " +
        "\"Anyone\" \u2014 Google mengalihkan ke halaman login dan browser memblokir pengalihan itu. " +
        "Perbaiki: Deploy \u2192 Manage deployments \u2192 \u270f\ufe0f \u2192 Who has access: Anyone. " +
        "CATATAN: trigger harian & email TETAP jalan walau ini gagal \u2014 keduanya berjalan di server Google, bukan di browser.", "no");
      return;
    }
    logLine(`${site}: ${sebab(msg, site==="Lichess"?S.cfg.lichess:S.cfg.chess)}`, "no");
  });
  if(out.chess && out.chess.viaGs) logLine(`Apps Script: ${Object.keys(S.snaps).length} hari riwayat dari Sheet`, "");
  if(out.lichess) logLine(`Lichess: ${out.lichess.games.length} partai + ${(out.lichess.act||[]).length} hari aktivitas` +
    (out.lichess.gamesOk ? "" : " \u2014 daftar partai GAGAL ditarik, memakai feed aktivitas sebagai cadangan"),
    out.lichess.gamesOk ? "" : "warn");
  if(S.cfg.lichess && !out.lichess) logLine("Data Lichess tidak masuk.", "warn");

  /* BUG DI HP: versi lama menimpa S.data mentah-mentah. Kalau jaringan seluler
     putus di tengah, satu sumber gagal dan SELURUH data yang tadinya
     sudah benar ikut terhapus. Sekarang: hanya bagian yang BERHASIL yang diganti;
     bagian yang gagal mempertahankan data terakhir yang baik. */
  const lama = S.data || { chess:null, lichess:null, errors:[] };
  const baru = {
    chess:   out.chess   || lama.chess   || null,
    lichess: out.lichess || lama.lichess || null,
    errors:  out.errors,
  };
  const pakaiLama = (!out.chess && lama.chess) || (!out.lichess && lama.lichess);
  if(pakaiLama) logLine("Sebagian gagal \u2014 data lama dipertahankan, tidak dihapus. " +
    "Angka yang kamu lihat mungkin bukan dari tarikan barusan.", "warn");

  S.data = baru;
  // Waktu hanya diperbarui kalau ADA yang benar-benar masuk.
  if(out.chess || out.lichess || S.cfg.csv) S.fetchedAt = Date.now();
  recordSnapshot(out);
  await persist(); renderAll();
}

/* Setiap kali data ditarik, keadaan hari itu difoto dan disimpan. Hari yang
   aplikasinya tidak dibuka TIDAK punya catatan lokal — kecuali Apps Script
   terpasang, yang mencatat tiap malam tanpa perlu dasbor dibuka. */
function recordSnapshot(out){
  const dk = todayKey();
  S.snaps[dk] = S.snaps[dk] || {};

  // Lichess: simpan penghitung kumulatif. Ini yang membuat jumlah puzzle
  // harian bisa dihitung walau feed aktivitas gagal total.
  const lp = out.lichess && out.lichess.prof && out.lichess.prof.perfs && out.lichess.prof.perfs.puzzle;
  if(lp){
    S.snaps[dk].puzTotal  = lp.games;
    S.snaps[dk].puzRating = lp.rating;
  }
  S.snaps[dk].at = Date.now();
}

/* ═══════════ olah data ═══════════ */
function chessGamesOn(dk){
  const d = S.data && S.data.chess ? S.data.chess.games : [];
  return d.filter(g => dayKey(ms(g.end_time)) === dk);
}
function chessResultFor(g){
  const me = S.data.chess.user;
  const putih = (g.white.username||"").toLowerCase() === me;
  const side = putih ? g.white : g.black;
  const opp  = putih ? g.black : g.white;
  const r = side.result;
  const res = r === "win" ? "M" : ["agreed","repetition","stalemate","insufficient","50move","timevsinsufficient"].includes(r) ? "R" : "K";
  return { side, opp, res, putih, rating:side.rating,
           acc: g.accuracies ? (putih ? g.accuracies.white : g.accuracies.black) : null };
}
function lichessDay(dk){
  const act = (S.data && S.data.lichess) ? (S.data.lichess.act||[]) : [];
  // interval.end adalah akhir hari aktivitas (detik)
  // Interval Lichess {start,end} sering BERAKHIR di tengah malam berikutnya.
  // Mencocokkan pada `end` membuat aktivitas hari ini jatuh ke hari BESOK —
  // dan hari ini tampak kosong. Cocokkan pada hari MULAInya: satu entri = satu
  // hari, tidak pernah ganda, dan tidak pernah meleset satu hari ke depan.
  return act.find(a => a.interval && dayKey(ms(a.interval.start)) === dk) || null;
}
function puzzlesFromActivity(dk){
  const a = lichessDay(dk);
  if(!a || !a.puzzles || !a.puzzles.score) return 0;
  const s = a.puzzles.score;
  return (s.win||0) + (s.loss||0) + (s.draw||0);
}

/* JARING PENGAMAN.
   Feed aktivitas Lichess bisa kosong, terlambat, atau salah hari.
   Tapi profil menyimpan penghitung KUMULATIF `perfs.puzzle.games` —
   total puzzle yang pernah dikerjakan seumur hidup akun.
   Selisih antara foto hari ini dan foto terakhir sebelumnya ADALAH
   jumlah puzzle hari itu, dan angka ini tidak bergantung pada feed apa pun.

   Batasnya jujur: butuh foto pembanding. Hari pertama pemakaian aplikasi
   tidak punya pembanding, jadi selisihnya tidak bisa dihitung. */
function puzzlesFromCounter(dk){
  const kini = S.snaps[dk];
  if(!kini || kini.puzTotal == null) return null;
  const sebelum = Object.keys(S.snaps).filter(d => d < dk && S.snaps[d].puzTotal != null).sort().pop();
  if(!sebelum) return null;
  const d = kini.puzTotal - S.snaps[sebelum].puzTotal;
  return d >= 0 ? d : null;
}

function puzzlesOn(dk){
  const a = puzzlesFromActivity(dk);
  const c = puzzlesFromCounter(dk);
  // Ambil yang lebih besar. Feed yang kosong tidak boleh menghapus bukti
  // dari penghitung kumulatif, dan sebaliknya.
  return Math.max(a, c == null ? 0 : c);
}
function sumberPuzzle(dk){
  const a = puzzlesFromActivity(dk), c = puzzlesFromCounter(dk);
  if(a > 0 && c != null && c !== a) return `feed ${a} \u00b7 penghitung ${c}`;
  if(a > 0) return "feed aktivitas";
  if(c != null && c > 0) return "penghitung kumulatif";
  return null;
}
function lichessGamesOn(dk){
  const a = lichessDay(dk);
  if(!a || !a.games) return {total:0, byPerf:{}, win:0, loss:0};
  let total=0, win=0, loss=0; const byPerf={};
  for(const [perf,v] of Object.entries(a.games)){
    const n = (v.win||0)+(v.loss||0)+(v.draw||0);
    byPerf[perf]=n; total+=n; win+=(v.win||0); loss+=(v.loss||0);
  }
  return {total, byPerf, win, loss};
}
/* ═══════════ MODEL PARTAI TERSATU ═══════════
   BUG YANG DIPERBAIKI: sebelumnya partai Lichess hanya dihitung dari feed
   aktivitas (ringkasan yang bisa kosong/terlambat), dan deret kekalahan serta
   tabel partai hanya melihat satu situs. Akibatnya partai rapid di Lichess
   tidak muncul di mana pun. Sekarang kedua situs dinormalkan ke satu bentuk. */

function ecoNama(pgn){
  const m = (pgn||"").match(/\[ECOUrl "https?:\/\/[^"]*\/openings\/([^"]+)"\]/);
  return m ? decodeURIComponent(m[1]).replace(/-/g," ").trim() : null;
}
/* Lichess memakai "ultraBullet" dan varian lain. Tanpa penyeragaman,
   pagar anti-bullet bisa dilewati hanya dengan bermain UltraBullet. */
/* Jumlah langkah PENUH (bukan ply), dihitung dari daftar SAN Lichess. */
function langkahCC(pgn){
  if(!pgn) return null;
  const m = String(pgn).match(/(\d+)\.\s*\S+\s*(?:\{[^}]*\})?\s*\S*\s*$/m);
  const semua = String(pgn).match(/(\d+)\.(?!\.)/g);
  if(!semua || !semua.length) return null;
  return parseInt(semua[semua.length-1], 10);
}
function langkahLI(moves){
  if(!moves) return null;
  const ply = String(moves).trim().split(/\s+/).filter(Boolean).length;
  return Math.ceil(ply / 2);
}
/* Kekalahan miniatur: kalah dalam < 15 langkah. Hampir selalu berarti blunder
   pembukaan atau jebakan — bukan kekalahan strategis. Ini partai yang HARUS
   dibedah pelatih lebih dulu, dan yang paling merusak mental anak. */
const MINI = 15;

function speedNorm(x){
  if(x === "ultraBullet") return "bullet";
  if(x === "daily") return "correspondence";
  return x;
}

let _ng = null, _ngAt = "";
function normGames(){
  const kunci = DB.aktif + "|" + S.fetchedAt;   // id anak IKUT jadi kunci cache
  if(_ng && _ngAt === kunci) return _ng;
  const out = [];
  // Sumber partai: Lichess.
  const L = S.data && S.data.lichess;
  if(L && L.games) L.games.forEach(g => {
    const me = (L.user||"").toLowerCase();
    const w = g.players && g.players.white, b = g.players && g.players.black;
    if(!w || !b) return;
    const idW = ((w.user && (w.user.id || w.user.name)) || "").toLowerCase();
    const isW = idW === me;
    const my = isW ? w : b, op = isW ? b : w;
    let res = "R";
    if(g.winner) res = (g.winner === (isW ? "white" : "black")) ? "M" : "K";
    const lgk = langkahLI(g.moves);
    let blunder = null;
    if(Array.isArray(g.analysis) && g.analysis.length){
      blunder = { op:0, mid:0, eg:0, blunder:0, mistake:0, inaccuracy:0 };
      g.analysis.forEach((a, ply) => {
        if(!a || !a.judgment) return;
        if(((ply % 2 === 0) === isW) === false) return;
        const nm = a.judgment.name;
        if(nm === "Inaccuracy"){ blunder.inaccuracy++; return; }
        if(nm === "Blunder") blunder.blunder++; else blunder.mistake++;
        const mv = Math.floor(ply/2) + 1;
        blunder[mv <= 12 ? "op" : mv <= 30 ? "mid" : "eg"]++;
      });
    }
    out.push({ t: g.lastMoveAt || g.createdAt, site:"Lichess", speed: speedNorm(g.speed), res,
      putih: isW, langkah: lgk, mini: res === "K" && lgk != null && lgk < MINI,
      rating: my.rating, opp: esc((op.user && op.user.name) || "Anonim"), oppRating: op.rating,
      acc: my.analysis && my.analysis.accuracy != null ? my.analysis.accuracy : null,
      url: "https://lichess.org/" + g.id, opening: g.opening ? esc(g.opening.name) : null,
      eco: g.opening ? g.opening.eco : null, blunder });
  });
  _ng = out.sort((a,b)=>b.t-a.t); _ngAt = kunci;
  return _ng;
}

function gamesOn(dk){
  const list = normGames().filter(g => dayKey(g.t) === dk);
  const byClass = {};
  list.forEach(g => byClass[g.speed] = (byClass[g.speed]||0)+1);
  let total = list.length;
  // Cadangan: kalau daftar partai Lichess gagal ditarik, jangan buang datanya —
  // pakai feed aktivitas seperti dulu.
  const L = S.data && S.data.lichess;
  if(L && (!L.games || !L.games.length)){
    const a = lichessGamesOn(dk);
    for(const [p,n] of Object.entries(a.byPerf)){ const k = speedNorm(p); byClass[k] = (byClass[k]||0)+n; }
    total += a.total;
  }
  return { total, byClass, list };
}

/* Deret kekalahan melihat seluruh partai Lichess. Anak yang kalah beruntun
   lalu 2x di Lichess tetap sedang tilt — dan sebelumnya tidak terdeteksi. */
function losingStreakToday(){
  const dk = todayKey();
  const g = normGames().filter(x => dayKey(x.t) === dk).sort((a,b)=>a.t-b.t);
  let best = 0, cur = 0;
  g.forEach(x => { if(x.res === "K"){ cur++; best = Math.max(best, cur); } else cur = 0; });
  return best;
}

/* ═══════════ render: tugas harian ═══════════ */
function buildQuests(){
  const dk = todayKey(), T = targets();
  const g = gamesOn(dk);
  const pz = puzzlesOn(dk);
  const rapid = (g.byClass.rapid||0);
  const bullet = (g.byClass.bullet||0);
  const q = [];

  if(S.cfg.lichess && T.puzzle > 0) q.push({ auto:true, ok: pz >= T.puzzle, now:pz, goal:T.puzzle,
    t:tr("Selesaikan {a} puzzle",{a:T.puzzle}), src:tr("Lichess — terverifikasi otomatis") });

  if(T.rapid > 0) q.push({ auto:true, ok: rapid >= T.rapid, now:rapid, goal:T.rapid,
    t:tr("Main {a} partai rapid",{a:T.rapid}), src:tr("Lichess — terverifikasi otomatis") });

  q.push({ auto:true, ok: bullet <= T.bulletMax, now:bullet, goal:T.bulletMax, invert:true,
    t: T.bulletMax === 0 ? tr("Tidak main bullet") : tr("Bullet maksimal {a} partai",{a:T.bulletMax}),
    src:tr("Bullet merusak kalkulasi anak. Ini pagar, bukan target.") });

  q.push({ auto:true, ok: g.total <= T.gameMax, now:g.total, goal:T.gameMax, invert:true,
    t:tr("Total partai maksimal {a}",{a:T.gameMax}), src:tr("Pagar anti-tilt: bermain berlebihan setelah kalah menurunkan rating.") });

  const hitungKur = temaHitung(dk);
  /* Batas harian: 2 tema kurikulum + 2 tema hasil review partai, masing-masing
     TEMA_TARGET puzzle. Lebih dari itu, anak menghabiskan waktu berpindah tema
     alih-alih mendalami satu pola. */
  const TEMA_TARGET = 10, MAKS_KURIKULUM = 2, MAKS_REVIEW = 2;
  let nKur = 0;
  manualTasks().forEach((m,i) => {
    if(m.tema && nKur >= MAKS_KURIKULUM) return;   // sisa tema kurikulum ditunda
    if(m.tema) nKur++;
    /* Kalau tugas punya tema Lichess DAN token tersedia, ia terverifikasi.
       "Drill endgame" bukan lagi janji — ia angka. */
    if(m.tema && hitungKur && m.n > 0){
      const now = hitungKur[m.tema] || 0, goal = TEMA_TARGET;
      q.push({ auto:true, tema:m.tema, ok: now >= goal, now, goal,
        t: tr(m.teks) + tr(" \u2014 {a} puzzle", {a:goal}),
        src: tr("Kurikulum {a} — terverifikasi dari tema puzzle Lichess", {a:tier().nama}) });
    } else {
      q.push({ auto:false, idx:i, ok: !!(S.checks[dk]||{})["m"+i],
        tema: m.tema || null, t: tr(m.teks),
        src: m.tema
          ? tr("Kurikulum — butuh token Lichess untuk diverifikasi. Sementara ini: centang manual.")
          : tr("Manual — dicentang pelatih atau orang tua") });
    }
  });
  // ── Fokus dari analisa partai rapid terakhir (rencanaPuzzle) ──
  // Rekomendasi tema jadi TUGAS quest, bukan sekadar saran. Auto-verified sama
  // seperti tema lain kalau backend tema aktif; kalau belum, jatuh ke manual.
  const temaAda = new Set(q.filter(x => x.tema).map(x => x.tema));
  rencanaPuzzle().rekom.slice(0, MAKS_REVIEW).forEach((r, i) => {
    if(temaAda.has(r.tema)) return;
    temaAda.add(r.tema);
    const idx = 200 + i;
    if(hitungKur){
      const now = hitungKur[r.tema] || 0;
      q.push({ auto:true, tema:r.tema, ok: now >= TEMA_TARGET, now, goal:TEMA_TARGET,
        t: tr("Latih {a}: {b} puzzle", {a: temaNama(r.tema), b: TEMA_TARGET}),
        src: tr("Fokus dari partai rapid terakhir ({a}) \u2014 terverifikasi dari riwayat Lichess", {a: r.label}) });
    } else {
      q.push({ auto:false, tema:r.tema, idx,
        ok: !!(S.checks[dk]||{})["m"+idx],
        t: tr("Latih {a}: {b} puzzle", {a: temaNama(r.tema), b: TEMA_TARGET}),
        src: tr("Fokus dari partai rapid terakhir ({a}) \u2014 butuh backend tema untuk verifikasi", {a: r.label}) });
    }
  });
  // Pagar ditaruh PALING BAWAH. Yang harus dilihat anak lebih dulu adalah
  // apa yang harus DIKERJAKAN, bukan apa yang tidak boleh dilanggar.
  return q.sort((a,b) => (a.invert?1:0) - (b.invert?1:0));
}

function countUp(el, to, suffix){
  if(matchMedia("(prefers-reduced-motion:reduce)").matches){ el.textContent = to + (suffix||""); return; }
  const t0 = performance.now(), dur = 700, from = 0;
  const step = t => {
    const k = Math.min(1, (t - t0) / dur);
    const e = 1 - Math.pow(1 - k, 3);
    el.textContent = Math.round(from + (to - from) * e) + (suffix || "");
    if(k < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

/* ── analitik tambahan ── */
function last7(){
  const out = [];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const dk = dayKey(d);
    const g = gamesOn(dk), pz = puzzlesOn(dk);
    const T = targets();
    const cek = [];
    if(T.puzzle>0) cek.push(pz >= T.puzzle);
    cek.push((g.byClass.rapid||0) >= T.rapid);
    cek.push((g.byClass.bullet||0) <= T.bulletMax);
    cek.push(g.total <= T.gameMax);
    const patuh = Math.round(100*cek.filter(Boolean).length/cek.length);
    out.push({ dk, d, pz, games:g.total, bullet:g.byClass.bullet||0, patuh,
               aktif: pz>0 || g.total>0 });
  }
  return out;
}
function streakHari(){
  let n = 0;
  for(let i=0;i<120;i++){
    const d = new Date(); d.setDate(d.getDate()-i);
    const dk = dayKey(d);
    if(hariLibur(dk)) continue;   // istirahat terencana tidak memutus runtun
    const aktif = puzzlesOn(dk) > 0 || gamesOn(dk).total > 0;
    if(aktif) n++;
    else if(i > 0) break;      // hari ini boleh kosong, kemarin tidak
  }
  return n;
}
function bahanObrolan(){
  const W = last7(), T = targets(), out = [];
  const kurang = W.filter(w => T.puzzle>0 && w.pz < T.puzzle && w.aktif).length;
  if(kurang >= 3) out.push([tr("Target puzzle meleset {a} dari 7 hari",{a:kurang}),
    tr("Tanyakan apakah targetnya kebanyakan, atau ada yang mengganggu waktu latihannya. Target yang terus meleset bukan tanda anak malas — sering kali tandanya target itu salah.")]);
  const sepi = W.filter(w => !w.aktif).length;
  if(sepi >= 3) out.push([tr("{a} hari tanpa aktivitas sama sekali",{a:sepi}),
    tr("Sebelum menegur: cek apakah ia sakit, sibuk sekolah, atau justru sedang jenuh. Jenuh adalah masalah paling umum dan paling sering salah diobati dengan tambahan target.")]);
  const bul = W.reduce((a,b)=>a+b.bullet,0);
  if(bul > 0) out.push([tr("{a} partai bullet minggu ini",{a:bul}),
    tr("Bullet menyenangkan dan melatih refleks, tapi merusak kebiasaan kalkulasi. Sepakati batas bersama — jangan larang sepihak.")]);
  const G = normGames().filter(x=>x.acc!=null).slice(0,10);
  if(G.length >= 5){
    const avg = G.reduce((a,b)=>a+b.acc,0)/G.length;
    if(avg < 70) out.push([tr("Akurasi 10 partai terakhir {a}%",{a:avg.toFixed(1)}),
      tr("Di bawah 70% biasanya berarti bermain terlalu cepat untuk kontrol waktunya. Tanyakan: apakah ia menghabiskan waktu berpikirnya, atau langsung menjawab?")]);
  }
  const s = streakHari();
  if(s >= 5) out.push([tr("{a} hari berturut-turut aktif",{a:s}),
    tr("Puji konsistensinya, bukan hasilnya. Rating naik-turun; kebiasaan tidak.")]);
  if(!out.length) out.push([tr("Belum cukup data"),
    tr("Rapor ini butuh beberapa hari aktivitas sebelum bisa memberi bahan obrolan yang berguna.")]);
  return out.slice(0,4);
}
function esc(x){ return x == null ? x : String(x).replace(/[&<>"]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c])); }
function pembukaan(warna){
  const map = {};
  normGames().forEach(g => {
    if(warna === "putih" && !g.putih) return;
    if(warna === "hitam" && g.putih) return;
    const nama = g.opening;
    if(!nama) return;
    // 2 kata: "Scandinavian Defense Mieses Kotroc" dan "Scandinavian Defense"
    // adalah pembukaan yang sama. Memecahnya jadi baris terpisah menyesatkan pelatih.
    const kunci = nama.replace(/[:,].*$/,"").split(" ").slice(0,2).join(" ");
    (map[kunci] = map[kunci] || {n:0,m:0,k:0});
    map[kunci].n++;
    if(g.res==="M") map[kunci].m++;
    if(g.res==="K") map[kunci].k++;
  });
  return Object.entries(map).sort((a,b)=>b[1].n-a[1].n).slice(0,6);
}
/* HILANG dari versi sebelumnya — tab Perkembangan & Analisis crash karenanya.
   Versi baru: riwayat resmi Lichess + rekonstruksi dari rating tiap partai
   (riwayat rating resmi hanya tersedia dari Lichess). */
function ratingSeries(){
  const out = [];
  const L = S.data && S.data.lichess;
  if(L && L.hist){
    L.hist.filter(h => ["Rapid","Blitz","Puzzles"].includes(h.name) && h.points && h.points.length > 1)
      .forEach(h => out.push({
        name: "Lichess " + h.name,
        color: { Rapid:"#1E3A5F", Blitz:"#6E7C90", Puzzles:"#A8791F" }[h.name],
        pts: h.points.map(p => ({ t: Date.UTC(p[0], p[1], p[2]), v: p[3] })),
      }));
  }
  // Riwayat rating diambil dari Lichess. Satu-satunya sumbernya
  // adalah foto harian yang aplikasi ini simpan sendiri.
  const hari = Object.keys(S.snaps).sort();

  const bySrc = {};
  normGames().forEach(g => {
    if(!g.rating || !["rapid","blitz"].includes(g.speed)) return;
    (bySrc[`${g.site} ${g.speed}`] = bySrc[`${g.site} ${g.speed}`] || []).push({ t:g.t, v:g.rating });
  });
  const warna = { "Lichess rapid":"#1E3A5F", "Lichess blitz":"#6E7C90" };
  Object.entries(bySrc).filter(([,v]) => v.length > 1).forEach(([k,v]) => {
    // riwayat resmi Lichess lebih akurat — jangan gambar dua kali
    const speed = k.split(" ")[1];
    if(k.startsWith("Lichess") && out.some(o => o.name === "Lichess " + speed[0].toUpperCase() + speed.slice(1))) return;
    out.push({ name:k, color: warna[k] || "#12243F", pts: v.sort((a,b)=>a.t-b.t) });
  });
  return out;
}

function akurasiTren(){
  return normGames().filter(g=>g.acc!=null).sort((a,b)=>a.t-b.t).slice(-25)
    .map(g=>({ t:g.t, v:g.acc }));
}

/* ═══════════ DIAGNOSIS ═══════════
   Menguji setiap endpoint sendiri-sendiri. "Lichess tidak bisa" bukan diagnosis —
   yang berguna adalah tahu endpoint MANA dan gagal KENAPA. */
async function ujiKoneksi(){
  const el = $("#testLog");
  el.innerHTML = `<div class="alert-row"><b>\u2026</b><span><span class="spin"></span> menguji\u2026</span></div>`;
  const hasil = [];
  const uji = async (nama, u, wajib) => {
    const t0 = performance.now();
    try{
      const r = await fetch(url(u), { headers:{ "Accept":"application/json" } });
      const ms2 = Math.round(performance.now()-t0);
      if(!r.ok){ hasil.push(["no", nama, `HTTP ${r.status} — ${sebab(new Error("HTTP "+r.status), "")}`]); return null; }
      const d = await r.json();
      const isi = Array.isArray(d) ? `${d.length} entri` : "objek JSON";
      hasil.push(["ok", nama, `${r.status} \u00b7 ${isi} \u00b7 ${ms2}ms`]);
      return d;
    }catch(e){
      const m = String(e && e.message || e);
      const diblokir = /Failed to fetch|NetworkError|Load failed/i.test(m);
      if(nama === "Apps Script" && diblokir){
        hasil.push(["no", nama,
          "Diblokir browser. Karena Lichess BERHASIL, ini bukan file:// dan bukan CORS umum \u2014 " +
          "penyebabnya spesifik ke Apps Script. Hampir selalu: deployment-nya belum \"Anyone\". " +
          "Google mengalihkan permintaan ke halaman login, dan browser memblokir pengalihan lintas-domain itu. " +
          "Perbaiki: Deploy \u2192 Manage deployments \u2192 \u270f\ufe0f \u2192 Who has access: Anyone (BUKAN \"Anyone with Google account\"). " +
          "Atau lewati sama sekali: terbitkan Sheet sebagai CSV dan isi kolom URL Sheet CSV di atas. " +
          "CATATAN PENTING: trigger harian 23:00 dan email laporan TETAP BERJALAN walau ini gagal \u2014 " +
          "keduanya jalan di server Google, bukan di browser."]);
        return null;
      }
      if(nama === "Sheet CSV" && diblokir){
        hasil.push(["no", nama,
          "Diblokir. Pastikan Sheet benar-benar diterbitkan: File \u2192 Share \u2192 Publish to web \u2192 pilih sheet " +
          "\"Harian\" \u2192 format CSV \u2192 Publish. URL-nya harus mengandung /pub? dan output=csv."]);
        return null;
      }
      hasil.push([wajib?"no":"warn", nama, sebab(e, "")]);
      return null;
    }
  };

  if(S.cfg.lichess){
    const u = S.cfg.lichess.trim();
    const prof = await uji("Lichess / profil", `https://lichess.org/api/user/${u}`, true);
    await uji("Lichess / aktivitas", `https://lichess.org/api/user/${u}/activity`, false);
    await uji("Lichess / riwayat rating", `https://lichess.org/api/user/${u}/rating-history`, false);
    if(prof){
      const p = prof.perfs || {};
      const pz = p.puzzle ? `${p.puzzle.games} puzzle, rating ${p.puzzle.rating}` : "belum ada puzzle";
      const total = p.puzzle ? p.puzzle.games : 0;
      hasil.push([total ? "ok" : "warn", "Lichess / isi akun",
        `${prof.username} \u00b7 ${pz}. ` + (total ? "" :
        "Akun BERHASIL dibaca tapi kosong \u2014 belum ada satu puzzle pun tercatat di server Lichess.")]);
      const dk = todayKey();
      const kemarin = Object.keys(S.snaps).filter(d=>d<dk && S.snaps[d].puzTotal!=null).sort().pop();
      hasil.push([kemarin ? "ok" : "warn", "Penghitung kumulatif",
        kemarin
          ? `Foto terakhir ${kemarin}: ${S.snaps[kemarin].puzTotal} puzzle. Sekarang: ${total}. Selisih = ${total - S.snaps[kemarin].puzTotal} puzzle.`
          : `Total sekarang ${total} puzzle, tapi BELUM ADA foto pembanding dari hari sebelumnya. ` +
            `Jumlah puzzle harian baru bisa dihitung mulai besok. Ini batas nyata alat ini, bukan bug \u2014 ` +
            `Lichess tidak menyimpan "berapa puzzle hari ini", hanya total seumur hidup.`]);
      const feed = puzzlesFromActivity(dk);
      if(feed > total) hasil.push(["warn", "Angka tidak cocok",
        `Feed melaporkan ${feed} puzzle hari ini, tapi penghitung total profil hanya ${total} seumur hidup. ` +
        `Kedua angka ini jelas mengukur hal yang berbeda \u2014 kemungkinan besar penghitung profil hanya ` +
        `mencatat puzzle yang mengubah rating. Aplikasi memakai angka yang LEBIH BESAR (${Math.max(feed,total)}), ` +
        `jadi jumlah harian tetap benar. Tapi "total puzzle" di ringkasan akan terlihat terlalu kecil.`]);
      hasil.push([feed ? "ok" : "warn", "Feed aktivitas hari ini",
        feed ? `${feed} puzzle terbaca dari feed.` :
        "Feed melaporkan 0 puzzle hari ini. Lichess kadang terlambat memperbarui feed aktivitas \u2014 " +
        "karena itu penghitung kumulatif di atas dipakai sebagai cadangan."]);
    }
  } else hasil.push(["warn","Lichess","username kosong."]);

/* Rapor sebagai TEKS, bukan gambar. Alasannya bukan kemalasan:

   ditempel di WhatsApp mana pun tanpa aplikasi tambahan. Gambar tidak. */
function raporTeks(){
  const W = last7(), T = targets(), a = anakAktif();
  const rata = Math.round(W.reduce((x,y)=>x+y.patuh,0)/7);
  const hari = HARI();
  const baris = W.map(w =>
    `${hari[w.d.getDay()]} ${String(w.d.getDate()).padStart(2," ")}: ` +
    `${String(w.pz).padStart(3," ")} ${tr("puzzle")} \u00b7 ${w.games} ${tr("partai")} \u00b7 ${w.patuh}%` +
    (w.bullet ? ` \u00b7 bullet ${w.bullet}` : "") + (w.aktif ? "" : " \u00b7 " + tr("TIDAK AKTIF")));
  const obrol = bahanObrolan().map(([t,p]) => `\u2022 ${t}\n  ${p}`);
  const pad = (x) => String(x).padEnd(DB.lang === "en" ? 20 : 20, " ");
  return [
    `${tr("RAPOR MINGGUAN")} \u2014 ${(a ? a.nama : tr("Anak")).toUpperCase()}`,
    new Date().toLocaleDateString(LOCALE(),{day:"numeric",month:"long",year:"numeric"}),
    "",
    `${pad(tr("Kepatuhan rata-rata"))}: ${rata}%`,
    `${pad(tr("Hari aktif"))}: ${W.filter(w=>w.aktif).length}/7`,
    `${pad(tr("Runtun hari"))}: ${streakHari()}`,
    `${pad(tr("Total puzzle"))}: ${W.reduce((x,y)=>x+y.pz,0)} (${tr("target {a}/hari",{a:T.puzzle})})`,
    "",
    tr("PER HARI"),
    ...baris,
    "",
    tr("BAHAN OBROLAN"),
    ...obrol,
    "",
    "\u2014 " + tr("Angka di atas hanya mencakup yang bisa diverifikasi API."),
    tr("Pelajaran, video, dan latihan papan fisik tidak terlihat. Tanyakan langsung."),
  ].join("\n");
}

function renderBagi(){
  const b1 = $("#bBagi"), b2 = $("#bCetak");
  if(!b1) return;
  b1.onclick = async () => {
    const teks = raporTeks();
    const el = $("#bagiHasil");
    try{

      await navigator.clipboard.writeText(teks);
      el.innerHTML = `<div class="alert-row ok"><b>${tr("TERSALIN")}</b><span>${tr("Rapor sudah di papan klip. Tempel di WhatsApp.")}</span></div>`;

        <div class="empty" style="padding:6px 0">${tr("Salin manual dari kotak di atas.")}</div>`;
    }
  };
  b2.onclick = () => print();
}

function rencanaPuzzle(){
  const rapid = normGames().filter(g => g.speed === "rapid" && g.t >= Date.now() - 2*864e5);
  let dianalisis = 0;
  const perGame = rapid.map(g => {
    const b = g.blunder;
    if(b && (b.blunder + b.mistake) > 0){
      dianalisis++;
      const serius = b.blunder + b.mistake;
      const fase = [["op",b.op],["mid",b.mid],["eg",b.eg]].sort((x,y)=>y[1]-x[1])[0][0];
      const sinyal = fase === "op" ? "opening" : fase === "eg" ? "endgame" : "taktik";
      const bagian = [];
      if(b.op)  bagian.push(b.op + " " + tr("pembukaan"));
      if(b.mid) bagian.push(b.mid + " " + tr("tengah"));
      if(b.eg)  bagian.push(b.eg + " " + tr("akhir"));
      const catatan = serius + " " + tr("kesalahan serius") + " \u00b7 " + bagian.join(", ") +
        (b.inaccuracy ? " (+" + b.inaccuracy + " " + tr("impresisi") + ")" : "");
      return { g, sinyal, catatan, bobot: { opening:b.op, taktik:b.mid, endgame:b.eg }, analyzed:true };
    }
    if(b){ dianalisis++; return { g, sinyal:null, catatan: tr("Dianalisis \u2014 tanpa kesalahan serius"), bobot:null, analyzed:true }; }
    let sinyal = null, catatan;
    const acc = g.acc;
    if(g.res === "K"){
      if(g.mini || (g.langkah != null && g.langkah < 15)){ sinyal = "opening"; catatan = tr("Kalah cepat \u2014 blunder pembukaan (perkiraan)"); }
      else if(acc != null && acc < 70){ sinyal = "taktik"; catatan = tr("Akurasi rendah \u2014 blunder taktik (perkiraan)"); }
      else { sinyal = "endgame"; catatan = tr("Kalah panjang \u2014 masalah akhir (perkiraan)"); }
    } else if(g.res === "R"){
      if(acc != null && acc >= 80){ sinyal = "endgame"; catatan = tr("Seri dari posisi rapi \u2014 latih teknik akhir"); }
      else catatan = tr("Seri");
    } else {
      if(acc != null && acc < 65){ sinyal = "taktik"; catatan = tr("Menang tapi akurasi rendah \u2014 masih rawan"); }
      else catatan = tr("Menang bersih");
    }
    return { g, sinyal, catatan, bobot: sinyal ? { [sinyal]:1 } : null, analyzed:false };
  });
  const skor = { opening:0, taktik:0, endgame:0 };
  perGame.forEach(a => { if(a.bobot) for(const k in a.bobot) skor[k] += a.bobot[k]; });
  const peta = {
    opening: { label: tr("Pembukaan"),       tema: ["opening"] },
    taktik:  { label: tr("Taktik"),          tema: ["fork", "pin"] },
    endgame: { label: tr("Akhir permainan"), tema: ["rookEndgame", "pawnEndgame"] },
  };
  const rekom = [];
  Object.entries(skor).filter(([k,v]) => v > 0).sort((a,b) => b[1]-a[1]).forEach(([sg, jml]) => {
    const target = Math.min(15, 4 + jml*2);
    peta[sg].tema.forEach(tema => rekom.push({ sinyal:sg, label: peta[sg].label, tema, target, jml }));
  });
  return { perGame, rekom: rekom.slice(0,5), skor, jml: rapid.length, dianalisis };
}

/* ═══════════ PELATIH OTOMATIS ═══════════
   Menganalisa tiap partai rapid dari data engine Lichess: judgment per langkah
   (blunder/kesalahan/impresisi), akurasi, fase terjadinya, pembukaan, hasil.
   Ini analisis berbasis aturan atas data mesin sungguhan — bukan tebakan, tapi
   juga bukan komentar bebas seperti pelatih manusia. */
function coachPartai(hari){
  const bts = Date.now() - (hari||7)*864e5;
  return normGames().filter(g => g.speed === "rapid" && g.t >= bts)
    .sort((a,b) => b.t - a.t).map(g => {
    const b = g.blunder, acc = g.acc;
    const serius = b ? (b.blunder + b.mistake) : null;
    const kuat = [], lemah = [], catatan = [];

    if(acc != null){
      if(acc >= 85) kuat.push(tr("Akurasi tinggi ({a}%) \u2014 langkah konsisten dekat pilihan mesin", {a: acc.toFixed(0)}));
      else if(acc >= 75) kuat.push(tr("Akurasi cukup baik ({a}%)", {a: acc.toFixed(0)}));
      else if(acc >= 65) lemah.push(tr("Akurasi sedang ({a}%) \u2014 masih banyak langkah yang bisa lebih baik", {a: acc.toFixed(0)}));
      else lemah.push(tr("Akurasi rendah ({a}%) \u2014 tanda bermain terburu-buru atau posisi di luar pemahaman", {a: acc.toFixed(0)}));
    }
    if(b){
      if(serius === 0) kuat.push(tr("Nol blunder dan nol kesalahan serius sepanjang partai"));
      if(b.op)  lemah.push(tr("{a} kesalahan serius di PEMBUKAAN (langkah 1-12) \u2014 fase yang paling bisa diperbaiki lewat hafalan pola", {a:b.op}));
      if(b.mid) lemah.push(tr("{a} kesalahan serius di TENGAH (langkah 13-30) \u2014 fase taktik: garpu, pin, skewer terlewat", {a:b.mid}));
      if(b.eg)  lemah.push(tr("{a} kesalahan serius di AKHIR (setelah langkah 30) \u2014 teknik konversi belum kuat", {a:b.eg}));
      if(b.inaccuracy >= 5) lemah.push(tr("{a} impresisi \u2014 banyak langkah 'hampir benar'; biasanya karena waktu berpikir kurang", {a:b.inaccuracy}));
      if(b.blunder === 0 && b.mistake > 0) kuat.push(tr("Tidak ada blunder besar; kesalahannya masih tingkat menengah"));
    }
    if(g.langkah != null){
      if(g.res === "K" && g.langkah < 20) lemah.push(tr("Partai berakhir sangat cepat ({a} langkah) \u2014 kekalahan terjadi sebelum permainan sungguhan dimulai", {a:g.langkah}));
      if(g.res === "M" && g.langkah > 45) kuat.push(tr("Menang lewat partai panjang ({a} langkah) \u2014 kesabaran dan stamina bagus", {a:g.langkah}));
    }
    if(g.oppRating != null && g.rating != null){
      const sel = g.oppRating - g.rating;
      if(g.res === "M" && sel >= 100) kuat.push(tr("Menang lawan yang {a} poin lebih tinggi", {a:sel}));
      if(g.res === "K" && sel <= -100) lemah.push(tr("Kalah dari lawan {a} poin lebih rendah", {a:Math.abs(sel)}));
    }

    // Vonis utama
    let vonis, fokus = null;
    if(!b){
      vonis = tr("Partai ini BELUM dianalisis mesin di Lichess. Minta 'Request computer analysis' di halaman partainya supaya review jadi tepat.");
    } else if(serius === 0){
      vonis = tr("Partai bersih. Tidak ada kesalahan serius \u2014 ini contoh permainan yang patut diulang polanya.");
    } else {
      const f = [["op",b.op],["mid",b.mid],["eg",b.eg]].sort((x,y)=>y[1]-x[1])[0];
      fokus = f[0];
      const nama = fokus === "op" ? tr("pembukaan") : fokus === "eg" ? tr("akhir permainan") : tr("permainan tengah");
      vonis = tr("Titik lemah utama partai ini ada di {a}: {b} dari {c} kesalahan serius terjadi di sana.",
        {a: nama, b: f[1], c: serius});
    }
    if(b && serius > 0){
      catatan.push(fokus === "op"
        ? tr("Latihan yang tepat: puzzle tema pembukaan + hafal 5 langkah pertama repertoar sendiri.")
        : fokus === "eg"
        ? tr("Latihan yang tepat: puzzle endgame benteng & pion, dan drill konversi keunggulan.")
        : tr("Latihan yang tepat: puzzle taktik pendek (garpu, pin, skewer) dengan batas waktu."));
    }
    return { g, kuat, lemah, vonis, catatan, serius, fokus, dianalisis: !!b };
  });
}

function coachRingkas(hari){
  const L = coachPartai(hari||7);
  const n = L.length, dian = L.filter(x=>x.dianalisis).length;
  const accs = L.map(x=>x.g.acc).filter(v=>v!=null);
  const accRata = accs.length ? accs.reduce((a,b)=>a+b,0)/accs.length : null;
  const M = L.filter(x=>x.g.res==="M").length, K = L.filter(x=>x.g.res==="K").length, R = n-M-K;
  const fase = { op:0, mid:0, eg:0 };
  L.forEach(x => { if(x.g.blunder){ fase.op+=x.g.blunder.op; fase.mid+=x.g.blunder.mid; fase.eg+=x.g.blunder.eg; } });
  const totalSerius = fase.op+fase.mid+fase.eg;
  const rate = dian ? (totalSerius/dian) : null;
  const rating = L.length ? L[0].g.rating : null;
  const urut = Object.entries(fase).sort((a,b)=>b[1]-a[1]);
  return { L, n, dian, accRata, M, K, R, fase, totalSerius, rate, rating, terlemah: urut[0], terkuat: urut[urut.length-1] };
}

function coachCatatanOrtu(){
  const C = coachRingkas(7), a = anakAktif();
  const nm = (a && a.nama) ? a.nama : tr("Anak");
  const namaFase = f => f==="op" ? tr("pembukaan") : f==="eg" ? tr("akhir permainan") : tr("permainan tengah");
  const L = [];
  L.push("*" + tr("Catatan Pelatih") + " \u2014 " + nm + "*");
  L.push(new Date().toLocaleDateString(LOCALE(), { weekday:"long", day:"numeric", month:"long", year:"numeric" }));
  L.push("");
  if(!C.n){ L.push(tr("Belum ada partai rapid dalam 7 hari terakhir.")); return L.join("\n"); }
  L.push(tr("*Ringkasan 7 hari*"));
  L.push("\u2022 " + tr("Partai rapid") + ": " + C.n + " (" + C.M + tr("M") + " / " + C.R + tr("R") + " / " + C.K + tr("K") + ")");
  if(C.rating != null) L.push("\u2022 " + tr("Rating rapid") + ": " + C.rating);
  if(C.accRata != null) L.push("\u2022 " + tr("Akurasi rata-rata") + ": " + C.accRata.toFixed(1) + "%");
  if(C.dian) L.push("\u2022 " + tr("Kesalahan serius") + ": " + C.totalSerius + " (" + C.rate.toFixed(1) + " " + tr("per partai") + ")");
  L.push("");
  if(C.dian && C.totalSerius > 0){
    L.push("*" + tr("Yang perlu dilatih") + ":* " + namaFase(C.terlemah[0]) + " (" + C.terlemah[1] + " " + tr("kesalahan") + ")");
    L.push("*" + tr("Yang sudah baik") + ":* " + namaFase(C.terkuat[0]) + " (" + C.terkuat[1] + " " + tr("kesalahan") + ")");
  } else if(!C.dian){
    L.push(tr("Catatan: partai belum dianalisis mesin di Lichess, jadi rincian kesalahan belum tersedia."));
  }
  L.push("");
  L.push("*" + tr("Rencana besok") + ":*");
  const rek = rencanaPuzzle().rekom.slice(0,2);
  if(rek.length) rek.forEach(r => L.push("\u2022 " + temaNama(r.tema) + " \u2014 10 " + tr("puzzle")));
  else L.push("\u2022 " + tr("Lanjutkan kurikulum harian."));
  L.push("");
  L.push("_Road To Grand Master_");
  return L.join("\n");
}

/* Hari libur resmi: istirahat yang DIRENCANAKAN, bukan kelalaian. Istirahat bagian
   dari program latihan; memaksa runtun tanpa jeda memicu jenuh. */
function hariLibur(dk){ return !!(S.libur && S.libur[dk]); }
function toggleLibur(dk){
  S.libur = S.libur || {};
  if(S.libur[dk]) delete S.libur[dk]; else S.libur[dk] = true;
  persist(); render();
}

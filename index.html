/* ═══════════════════════════════════════════════════════════════════════
   PELATIH OTOMATIS

   BUKAN "AI". Ini mesin berbasis aturan, dan itu disengaja.

   Model bahasa akan memberi kalimat yang terdengar bijak tanpa kamu bisa
   memeriksa dari mana asalnya. Untuk keputusan yang menyangkut anakmu setiap
   hari, itu lebih buruk daripada aturan sederhana yang bisa kamu bantah.

   Setiap rekomendasi di sini WAJIB menyebut angka yang melahirkannya.
   Kalau pelatih ini salah, kamu harus bisa menunjuk barisnya.

   Dua tingkat kecerdasan:
     TANPA token — menebak tema dari bukti partai (kekalahan miniatur, akurasi,
                   tren rating puzzle) + kurikulum tier. Jujur bahwa itu tebakan.
     DENGAN token — membaca /api/puzzle/dashboard: performa anak PER TEMA.
                   Rekomendasi berhenti jadi tebakan.
   ═══════════════════════════════════════════════════════════════════════ */

/* Slug tema Lichess -> URL latihan langsung: lichess.org/training/{slug} */
const TEMA = {
  fork:"Garpu", pin:"Pin", skewer:"Skewer", discoveredAttack:"Serangan terbuka",
  doubleCheck:"Skak ganda", hangingPiece:"Bidak menggantung", trappedPiece:"Bidak terperangkap",
  deflection:"Pengalihan", attraction:"Pemancingan", clearance:"Pembukaan jalur",
  interference:"Penghadangan", capturingDefender:"Menyingkirkan penjaga",
  sacrifice:"Korban", quietMove:"Langkah sunyi", defensiveMove:"Langkah bertahan",
  intermezzo:"Langkah antara", xRayAttack:"Serangan sinar-X", zugzwang:"Zugzwang",
  backRankMate:"Mat baris belakang", smotheredMate:"Mat terkurung", hookMate:"Mat kail",
  anastasiaMate:"Mat Anastasia", arabianMate:"Mat Arab", bodenMate:"Mat Boden",
  mateIn1:"Mat 1 langkah", mateIn2:"Mat 2 langkah", mateIn3:"Mat 3 langkah",
  mate:"Serangan mat", crushing:"Menang telak", advantage:"Merebut keunggulan",
  advancedPawn:"Pion maju", promotion:"Promosi", exposedKing:"Raja terbuka",
  opening:"Fase pembukaan", middlegame:"Fase tengah", endgame:"Fase akhir",
  rookEndgame:"Endgame benteng", pawnEndgame:"Endgame pion", queenEndgame:"Endgame menteri",
  bishopEndgame:"Endgame gajah", knightEndgame:"Endgame kuda",
  short:"Taktik pendek", long:"Kalkulasi panjang", veryLong:"Kalkulasi sangat panjang",
  oneMove:"Satu langkah", healthyMix:"Campuran seimbang",
};
const temaUrl = t => "https://lichess.org/training/" + t;
const temaNama = t => tr(TEMA[t] || t);

/* Kurikulum tema per tier — dipakai kalau tidak ada token. */
const TEMA_TIER = {
  1: ["fork","pin","skewer","backRankMate","hangingPiece","mateIn1","mateIn2"],
  2: ["discoveredAttack","deflection","attraction","doubleCheck","smotheredMate","mateIn2","short"],
  3: ["quietMove","defensiveMove","interference","zugzwang","xRayAttack","long","rookEndgame"],
  4: ["veryLong","zugzwang","quietMove","endgame","rookEndgame","queenEndgame","defensiveMove"],
};

function kemarinKey(){
  const d = new Date(); d.setDate(d.getDate()-1);
  return dayKey(d);
}

/* Ringkasan KEMARIN — satu-satunya bahan yang dipakai pelatih. */
function kemarin(){
  const dk = kemarinKey(), T = targets();
  const list = normGames().filter(g => dayKey(g.t) === dk).sort((a,b)=>a.t-b.t);
  const acc = list.filter(g => g.acc != null);
  let cur = 0, tilt = 0;
  list.forEach(g => { if(g.res==="K"){ cur++; tilt = Math.max(tilt,cur); } else cur = 0; });

  const snapKmr = S.snaps[dk], snapKini = S.snaps[todayKey()];
  const rKmr = snapKmr ? snapKmr.puzRating : null;
  const rKini = snapKini ? snapKini.puzRating : null;

  return {
    dk,
    puzzle: puzzlesOn(dk),
    puzzleTarget: T.puzzle,
    puzzleRating: rKmr,
    deltaRating: (rKini != null && rKmr != null) ? rKini - rKmr : null,
    partai: list.length,
    byClass: list.reduce((o,g)=>{ o[g.speed]=(o[g.speed]||0)+1; return o; },{}),
    menang: list.filter(g=>g.res==="M").length,
    kalah: list.filter(g=>g.res==="K").length,
    akurasi: acc.length ? acc.reduce((a,b)=>a+b.acc,0)/acc.length : null,
    tilt,
    mini: list.filter(g=>g.mini),
    aktif: puzzlesOn(dk) > 0 || list.length > 0,
    list,
  };
}

/* Berapa puzzle per TEMA yang dikerjakan pada hari tertentu.
   Satu puzzle bisa punya banyak tema; ia dihitung untuk SEMUA temanya — itu benar,
   puzzle "pin + mat baris belakang" memang melatih keduanya. */
function temaHitung(dk){
  // SUMBER UTAMA: backend Apps Script (token puzzle:read di Script Properties).
  // Tema per hari ikut dalam snaps dari Sheet -> terverifikasi walau dasbor tak
  // dibuka hari itu, dan tanpa token di browser sama sekali.
  const bk = S.snaps && S.snaps[dk] && S.snaps[dk].tema;
  if(bk && typeof bk === "object") return bk;
  // CADANGAN: token di browser (kalau diisi di Pengaturan / konstanta LICHESS_TOKEN).
  const A = (S.data && S.data.lichess && S.data.lichess.pzAct) || null;
  if(!A) return null;                       // tak ada keduanya: tidak bisa diverifikasi
  const out = {};
  A.forEach(r => {
    if(!r || !r.date || dayKey(ms(r.date)) !== dk) return;
    ((r.puzzle && r.puzzle.themes) || []).forEach(t => out[t] = (out[t] || 0) + 1);
  });
  return out;
}
const temaTerverifikasi = () => !!(
  (S.data && S.data.lichess && S.data.lichess.pzAct) ||
  Object.keys(S.snaps || {}).some(k => S.snaps[k] && S.snaps[k].tema)
);

/* Tema terlemah dari puzzle dashboard Lichess (butuh token). */
function temaLemah(){
  const d = S.data && S.data.lichess && S.data.lichess.pzDash;
  if(!d || !d.themes || !d.themes.length) return null;
  return d.themes
    .filter(t => t.results && t.results.nb >= 5)        // < 5 percobaan = kebisingan
    .map(t => ({
      key: t.theme,
      nb: t.results.nb,
      perf: t.results.performance,
      menang: Math.round(100 * (t.results.firstWins || 0) / t.results.nb),
    }))
    .sort((a,b) => a.menang - b.menang);
}

/* ═══════════ TEMA HARI INI ═══════════
   Syarat: (1) berbeda tiap hari, (2) tidak mengulang tema kemarin,
   (3) sekali dipilih untuk hari ini, TIDAK berubah walau halaman di-refresh —
   target yang berganti sendiri di tengah hari bukan target, tapi lelucon. */
function pilihTema(){
  const dk = todayKey(), T = targets();
  const n = Math.max(0, T.temaJumlah || 0);
  if(!n) return [];

  // sudah dipilih hari ini? pakai itu. Jangan pernah mengocok ulang.
  if(S.temaHari && S.temaHari.dk === dk && (S.temaHari.list||[]).length === n)
    return S.temaHari.list;

  const kmrList = (S.temaKemarin && S.temaKemarin.dk === kemarinKey()) ? (S.temaKemarin.list||[]) : [];
  const lemah = temaLemah();
  let kolam;

  if(lemah && lemah.length >= 2){
    /* KEKELIRUAN YANG DIPERBAIKI: dulu kolam = 6 tema teratas dari daftar
       terurut, lalu dirotasi. Tapi kalau anak hanya punya 5 tema tercatat,
       rotasi bisa mendarat di tema TERKUATNYA (85% menang) — dan fokus harian
       yang berputar ke tema yang sudah dikuasai adalah waktu yang terbuang.

       Sekarang kolam dibatasi ke tema yang benar-benar lemah (<65% menang).
       Rotasi tetap ada, tapi hanya di dalam kolam itu. */
    const benarLemah = lemah.filter(x => x.menang < 65);
    kolam = (benarLemah.length >= n ? benarLemah : lemah.slice(0, Math.max(n, 3)))
      .slice(0, 5).map(x => x.key);
  } else {
    kolam = (TEMA_TIER[S.tier] || TEMA_TIER[1]).slice();
  }
  // buang tema kemarin supaya hari ini benar-benar beda
  const bersih = kolam.filter(t => !kmrList.includes(t));
  const pakai = bersih.length >= n ? bersih : kolam;

  const hariKe = Math.floor(new Date(dk).getTime() / 864e5);
  const pilih = [];
  for(let i = 0; pilih.length < n && i < pakai.length * 2; i++){
    const t = pakai[(hariKe + i) % pakai.length];
    if(!pilih.includes(t)) pilih.push(t);
  }

  S.temaKemarin = S.temaHari || null;
  S.temaHari = { dk, list: pilih };
  persist();
  return pilih;
}

/* ═══════════ MESIN PELATIH ═══════════ */
function pelatih(){
  const K = kemarin(), T = targets(), tier_ = tier();
  const diag = [];    // [tingkat, judul, alasan-dengan-angka]
  const usul = { ...T };
  const alasanTarget = [];
  let rek = [];       // rekomendasi puzzle

  /* ── 1. DIAGNOSIS ── */
  if(!K.aktif){
    diag.push(["warn", tr("Kemarin tidak ada aktivitas sama sekali"),
      tr("Tidak ada puzzle, tidak ada partai. Pelatih tidak bisa menilai apa pun dari hari kosong — jadi target hari ini tidak diubah.")]);
  }

  if(K.puzzle < T.puzzle && K.aktif){
    const pct = Math.round(100 * K.puzzle / Math.max(1,T.puzzle));
    diag.push([pct < 50 ? "no" : "warn",
      tr("Puzzle kemarin {a}/{b}", {a:K.puzzle, b:T.puzzle}),
      pct < 50
        ? tr("Meleset lebih dari separuh. Target diturunkan hari ini — target yang mustahil dicapai berhenti jadi target dan mulai jadi rasa gagal harian.")
        : tr("Meleset sedikit. Target dipertahankan.")]);
    if(pct < 50){ usul.puzzle = Math.max(10, Math.round(K.puzzle * 1.2 / 5) * 5);
      alasanTarget.push(tr("Puzzle diturunkan ke {a} karena kemarin hanya {b} dari {c}.", {a:usul.puzzle, b:K.puzzle, c:T.puzzle})); }
  } else if(K.puzzle >= T.puzzle && K.aktif){
    const naik = K.deltaRating;
    if(naik != null && naik > 0){
      usul.puzzle = Math.min(T.puzzle + 5, 60);
      diag.push(["ok", tr("Target puzzle tercapai dan rating naik {a}", {a:"+"+naik}),
        tr("Kemarin {a} puzzle, rating puzzle naik. Target dinaikkan tipis ke {b}. Kenaikan kecil dan bertahap — bukan lompatan.", {a:K.puzzle, b:usul.puzzle})]);
      alasanTarget.push(tr("Puzzle dinaikkan ke {a} karena target tercapai DAN rating naik.", {a:usul.puzzle}));
    } else if(naik != null && naik < -15){
      diag.push(["warn", tr("Target tercapai tapi rating puzzle turun {a}", {a:naik}),
        tr("Jumlah tercapai, tapi kualitasnya tidak. Ini gejala mengerjakan puzzle sambil buru-buru. Target TIDAK dinaikkan; hari ini fokus ke ketelitian, bukan jumlah.")]);
    } else {
      diag.push(["ok", tr("Target puzzle tercapai ({a})", {a:K.puzzle}),
        tr("Target dipertahankan. Konsistensi lebih berharga daripada lompatan.")]);
    }
  }

  if(K.tilt >= 3){
    usul.gameMax = Math.max(2, T.gameMax - 2);
    diag.push(["no", tr("Kemarin tilt: {a} kekalahan beruntun", {a:K.tilt}),
      tr("Batas partai hari ini diturunkan ke {a}. Setelah hari yang buruk, yang dibutuhkan bukan lebih banyak partai — tapi lebih sedikit partai dan satu analisis.", {a:usul.gameMax})]);
    alasanTarget.push(tr("Batas partai diturunkan ke {a} karena kemarin tilt.", {a:usul.gameMax}));
  }

  if(K.mini.length){
    const buka = [...new Set(K.mini.map(g=>g.opening).filter(Boolean))];
    diag.push(["no", tr("{a} kekalahan miniatur kemarin", {a:K.mini.length}),
      tr("Kalah di bawah {a} langkah{b}. Ini blunder pembukaan, bukan kekalahan strategis. Hari ini WAJIB: bedah partai ini bersama anak sebelum ia bermain lagi.",
        {a:MINI, b: buka.length ? " (" + buka.join(", ") + ")" : ""})]);
    usul.rapid = Math.max(1, Math.min(T.rapid, 1));
    alasanTarget.push(tr("Partai rapid diturunkan ke {a}: analisis dulu, main belakangan.", {a:usul.rapid}));
  }

  if(K.akurasi != null && K.akurasi < 70){
    diag.push(["warn", tr("Akurasi kemarin {a}%", {a:K.akurasi.toFixed(1)}),
      tr("Di bawah 70%. Hampir selalu berarti bermain terlalu cepat untuk kontrol waktunya — bukan kurang tahu, tapi kurang berpikir.")]);
  }

  if(K.byClass.bullet){
    diag.push(["no", tr("{a} partai bullet kemarin", {a:K.byClass.bullet}),
      tr("Bullet melatih refleks dan merusak kebiasaan kalkulasi. Ini yang paling langsung bertabrakan dengan target tier ini.")]);
  }

  if(!diag.length) diag.push(["ok", tr("Kemarin bersih"),
    tr("Tidak ada tanda bahaya. Target dipertahankan.")]);

  /* ── 2. REKOMENDASI PUZZLE ── */
  const lemah = temaLemah();
  let sumber;

  if(lemah && lemah.length){
    sumber = "dashboard";
    rek = lemah.slice(0, 3).map(t => ({
      key: t.key,
      alasan: tr("Menang hanya {a}% dari {b} puzzle tema ini (30 hari terakhir). Ini titik terlemahnya.",
        {a:t.menang, b:t.nb}),
      kuat: true,
    }));
    const kuatnya = lemah[lemah.length-1];
    if(kuatnya && kuatnya.menang >= 80)
      rek.push({ key:kuatnya.key, kuat:false,
        alasan: tr("Tema terkuatnya ({a}% dari {b}). Sisipkan sedikit supaya sesi tidak terasa hukuman.",
          {a:kuatnya.menang, b:kuatnya.nb}) });
  } else {
    sumber = "tebakan";
    const kandidat = [];
    if(K.mini.length) kandidat.push(["opening", tr("Kemarin kalah di bawah {a} langkah. Latih penglihatan taktik di fase pembukaan.", {a:MINI})]);
    if(K.akurasi != null && K.akurasi < 70) kandidat.push(["short", tr("Akurasi {a}% — latih taktik pendek untuk membiasakan melihat sebelum melangkah.", {a:K.akurasi.toFixed(1)})]);
    if(K.deltaRating != null && K.deltaRating < -15) kandidat.push(["healthyMix", tr("Rating puzzle turun {a}. Kembali ke campuran seimbang, jangan tema sulit dulu.", {a:K.deltaRating})]);
    if(K.deltaRating != null && K.deltaRating > 20) kandidat.push(["long", tr("Rating puzzle naik {a}. Naikkan kesulitan: kalkulasi panjang.", {a:"+"+K.deltaRating})]);
    // sisanya dari kurikulum tier, dirotasi harian supaya tidak membosankan
    const daftar = TEMA_TIER[S.tier] || TEMA_TIER[1];
    const hariKe = Math.floor(Date.now() / 864e5);
    for(let i=0; i<daftar.length && kandidat.length < 4; i++){
      const t = daftar[(hariKe + i) % daftar.length];
      if(!kandidat.some(x => x[0] === t))
        kandidat.push([t, tr("Bagian dari kurikulum {a}. (Tebakan — tanpa token Lichess, pelatih tidak tahu tema mana yang benar-benar lemah.)", {a:tier_.nama})]);
    }
    rek = kandidat.slice(0,4).map(([k,a]) => ({ key:k, alasan:a, kuat:true }));
  }

  return { K, diag, usul, alasanTarget, rek, sumber };
}

/* ═══════════ KOLOM PER PLATFORM ═══════════
   Satu kolom untuk tiap situs. Yang TIDAK dipisah, dan alasannya:
     - kepatuhan  : target harian dipenuhi lintas situs, bukan per situs
     - deret kalah: 4 kekalahan berturut-turut ADALAH 4 beruntun
     - batas volume: kalau per situs, pagar bisa dilewati dengan pindah situs
   Ketiganya tetap gabungan di kartu KPI dan peringatan. */

function siteDay(site, dk){
  const list = normGames().filter(g => g.site === site && dayKey(g.t) === dk);
  const by = {};
  list.forEach(g => by[g.speed] = (by[g.speed]||0)+1);
  const acc = list.filter(g => g.acc != null);
  return {
    n: list.length, by,
    m: list.filter(g=>g.res==="M").length,
    k: list.filter(g=>g.res==="K").length,
    r: list.filter(g=>g.res==="R").length,
    acc: acc.length ? acc.reduce((a,b)=>a+b.acc,0)/acc.length : null,
  };
}

/* ═══════════ RATING & TAKTIK: KEDUA SITUS BERDAMPINGAN ═══════════
   Rating antar-situs TIDAK setara. Rapid Lichess biasanya beberapa ratus poin
   berbeda antar-situs untuk pemain yang sama. Membandingkannya seolah satu
   skala adalah kesalahan yang akan membuat orang tua menyimpulkan hal yang salah.
   Karena itu keduanya ditampilkan terpisah, tidak pernah dijumlahkan atau dirata-rata. */
function renderRatings(){
  const el = $("#ratings"); if(!el) return;
  const L = (S.data && S.data.lichess && S.data.lichess.prof && S.data.lichess.prof.perfs) || {};
  const C = (S.data && S.data.chess && S.data.chess.stats) || {};

  const li = k => {
    const p = L[k];
    if(!p || p.games == null) return null;
    if(!p.games) return { v:"\u2014", s:"belum main" };
    return { v: p.rating + (p.prov ? "?" : ""), s: `${p.games} partai${p.prov ? " \u00b7 sementara" : ""}` };
  };
  const cc = k => {
    const p = C[k];
    if(!p || !p.last) return null;
    const r = p.record || {};
    return { v: p.last.rating, s: `${(r.win||0)}M / ${(r.draw||0)}R / ${(r.loss||0)}K` };
  };

  const baris = [];
  [["rapid","Rapid"],["blitz","Blitz"],["bullet","Bullet"],["classical","Klasik"]].forEach(([k,label])=>{
    const a = li(k), b = cc("chess_" + k);
    if(a) baris.push([label, a]);
  });

  // ── taktik / puzzle ──
  const lp = L.puzzle;
  const liPuz = lp && lp.games != null
    ? { v: lp.rating + (lp.prov ? "?" : ""), s: `${lp.games} puzzle \u00b7 terverifikasi harian` }
    : null;
  if(liPuz) baris.push(["Puzzle", liPuz]);

  const st = L.storm;
  const liStorm = st ? { v: st.score, s: `${st.runs} kali main (Puzzle Storm)` } : null;
  if(liStorm) baris.push(["Puzzle Storm", liStorm]);

  if(!baris.length){ el.innerHTML = `<div class="empty">${tr("Belum ada data rating dari kedua situs.")}</div>`; return; }

  const sel = x => x
    ? `<b style="font-family:var(--mono);font-size:15px">${x.v}</b><br><span style="font-family:var(--mono);font-size:9.5px;color:var(--soft)">${x.s}</span>`
    : `<span style="color:var(--rule)">\u2014</span>`;

  el.innerHTML = `<table>
    <tr><th></th><th style="color:var(--navy)">Lichess</th></tr>
    ${baris.map(([n,a])=>`<tr>
      <td style="font-family:var(--sans);font-size:13px;font-weight:600">${n}</td>
      <td>${sel(a)}</td></tr>`).join("")}
  </table>`;
}

/* Label pendek menggantikan kalimat panjang di daftar tugas.
   Kalimat aslinya tetap ada, di balik "kenapa?". */
function labelPendek(x){
  if(!x.auto) return x.tema ? tr("MANUAL \u00b7 butuh token") : tr("MANUAL \u00b7 luring");
  if(x.invert) return tr("PAGAR");
  if(x.tema)   return tr("OTOMATIS \u00b7 tema Lichess");
  return tr("OTOMATIS");
}

function renderTodos(){
  const dk = todayKey();
  const el = $("#todos"); if(!el) return;
  const q = buildQuests();
  if(!S.cfg.chess && !S.cfg.lichess && !S.cfg.gs){ el.innerHTML = `<div class="empty">${tr("Sambungkan akun dulu di Pengaturan.")}</div>`; return; }
  el.innerHTML = q.map((x,i) => {
    const pct = x.goal ? Math.min(100, Math.round(100 * (x.now/x.goal))) : 0;
    // Pagar: yang dilaporkan bukan progres, tapi apakah batasnya dilanggar.
    // "0/0" tidak berarti apa pun bagi anak; "AMAN" berarti sesuatu.
    const prog = !x.auto ? ""
      : x.invert ? (x.ok ? tr("AMAN") : `${x.now} \u203a ${x.goal}`)
      : `${x.now}/${x.goal}`;
    const warna = x.invert ? (x.ok ? "var(--ok)" : "var(--no)") : (x.ok ? "var(--ok)" : "var(--soft)");
    const tanda = x.invert ? (x.ok ? "\u2713" : "\u2717") : (x.ok ? "\u2713" : "");
    return `<div class="todo ${x.ok?"done":""} ${x.auto?"auto":""} ${x.invert?"pagar":""}"
        style="animation-delay:${.04*i}s">
      <span class="mark" role="checkbox" aria-checked="${x.ok}" aria-disabled="${x.auto || S.role==='anak'}"
        ${(x.auto || S.role==='anak')?"":`tabindex="0" data-toggle="${x.idx}"`}
        ${x.invert && !x.ok ? 'style="background:var(--no);border-color:var(--no);color:#fff"' : ""}>${tanda}</span>
      <span class="t">${x.tema
          ? `<a href="${temaUrl(x.tema)}" target="_blank" rel="noopener"
               style="color:var(--gold);text-decoration:none;border-bottom:1px solid var(--gold)">${x.t} \u2197</a>`
          : x.t}
        <small class="${x.auto?"src":""}">${labelPendek(x)}</small>
        ${x.auto && !x.invert ? `<span class="bar"><i data-w="${pct}%"></i></span>` : ""}
        ${x.src && x.src.length > 42 ? kenapa(x.src) : ""}</span>
      <span class="prog" style="color:${warna}">${prog}</span>
    </div>`;
  }).join("");
  $$("[data-toggle]").forEach(b => {
    const go = () => {

function renderAlerts(){
  const el = $("#alerts"); if(!el) return;
  const dk = todayKey(), T = targets();
  const g = gamesOn(dk), pz = puzzlesOn(dk), ls = losingStreakToday();
  const A = [];
  const jam = new Date().getHours();

  if(ls >= 3) A.push(["no",tr("TILT"),tr("Kalah {a} partai beruntun hari ini. Hentikan sesi. Bermain terus setelah tiga kekalahan hampir selalu memperburuk rating dan suasana hati.",{a:ls})]);
  if(g.byClass.bullet > T.bulletMax) A.push(["no","BULLET",tr("{a} partai bullet (batas {b}). Bullet melatih refleks, bukan kalkulasi.",{a:g.byClass.bullet,b:T.bulletMax})]);
  if(g.total > T.gameMax) A.push(["warn","VOLUME",tr("{a} partai hari ini, melewati batas {b}. Kuantitas tanpa analisis tidak menaikkan rating.",{a:g.total,b:T.gameMax})]);
  if(S.cfg.lichess && T.puzzle>0 && pz < T.puzzle && jam >= 19)
    A.push([pz===0?"no":"warn","PUZZLE",tr("Puzzle hari ini {a}/{b} dan sudah lewat jam 19.",{a:pz,b:T.puzzle})]);
  if(g.total===0 && pz===0) A.push(["warn",tr("SEPI"),tr("Tidak ada aktivitas terdeteksi hari ini.")]);

  const G = normGames().filter(x=>x.acc!=null).slice(0,10);
  if(G.length >= 5){
    const avg = G.reduce((a,b)=>a+b.acc,0)/G.length;
    A.push([avg<70?"warn":"ok",tr("AKURASI"),tr("Rata-rata 10 partai terakhir: {a}%.",{a:avg.toFixed(1)}) +
      (avg<70?" "+tr("Di bawah 70% biasanya berarti bermain terlalu cepat untuk kontrol waktunya."):"")]);
  }
  const mini = normGames().filter(x => x.mini);
  const miniHariIni = mini.filter(x => dayKey(x.t) === dk).length;
  if(miniHariIni)
    A.push(["no",tr("MINIATUR"), tr("{a} kekalahan di bawah {b} langkah hari ini. Ini bukan kekalahan strategis — ini blunder pembukaan atau jebakan. Bedah partai ini lebih dulu, sebelum apa pun.",{a:miniHariIni,b:MINI})]);
  else if(mini.length && S.role === "pelatih")
    A.push(["warn",tr("MINIATUR"), tr("{a} kekalahan miniatur di seluruh riwayat. Buka tab Partai, saring 'Kekalahan miniatur'.",{a:mini.length})]);

  if(!A.length) A.push(["ok",tr("AMAN"),tr("Tidak ada tanda bahaya hari ini.")]);
  /* Kalimat pertama terlihat. Sisanya di balik "kenapa?".
     Penjelasannya tidak hilang — ia berhenti menghalangi. */
  const pecah = (m) => {
    const i = m.indexOf(". ");
    if(i < 0 || i > 90) return [m, ""];
    return [m.slice(0, i+1), m.slice(i+2)];
  };
  el.innerHTML = A.map(([k,t,m],i)=>{
    const [depan, sisa] = pecah(m);
    return `<div class="alert-row ${k}" style="animation-delay:${.04*i}s">
      <b>${t}</b><span>${depan}${kenapa(sisa)}</span></div>`;
  }).join("");
}

function renderChart(id, series, sumbuPersen){
  const svg = $("#"+id); if(!svg) return;
  const H = 200, P = 36;
  const W = Math.max(300, Math.round(svg.getBoundingClientRect().width) || 700);
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
  if(!series.length){
    svg.innerHTML = `<text x="16" y="${H/2}" font-family="IBM Plex Mono" font-size="12" fill="var(--soft)">Belum ada data.</text>`;
    const lg = $("#legend"); if(lg) lg.innerHTML = ""; return;
  }
  const all = series.flatMap(s=>s.pts);
  const t0 = Math.min(...all.map(p=>p.t)), t1 = Math.max(...all.map(p=>p.t));
  let v0 = Math.min(...all.map(p=>p.v)), v1 = Math.max(...all.map(p=>p.v));
  const pad = Math.max(15, (v1-v0)*0.15); v0 -= pad; v1 += pad;
  if(sumbuPersen){ v0 = Math.max(0, v0); v1 = Math.min(100, v1); }
  const X = t => P + (W-P-10) * (t1===t0 ? .5 : (t-t0)/(t1-t0));
  const Y = v => H-24 - (H-24-12) * (v1===v0 ? .5 : (v-v0)/(v1-v0));
  let g = "";
  for(let i=0;i<4;i++){
    const v = v0 + (v1-v0)*i/3;
    g += `<line x1="${P}" y1="${Y(v).toFixed(1)}" x2="${W-10}" y2="${Y(v).toFixed(1)}" stroke="var(--rule)"/>
          <text x="2" y="${(Y(v)+3).toFixed(1)}" font-family="IBM Plex Mono" font-size="9.5" fill="var(--soft)">${Math.round(v)}${sumbuPersen?"%":""}</text>`;
  }
  series.forEach((s,si)=>{
    const pts = s.pts.slice().sort((a,b)=>a.t-b.t);
    const d = pts.map((p,i)=>`${i?"L":"M"}${X(p.t).toFixed(1)},${Y(p.v).toFixed(1)}`).join(" ");
    const len = 3000;
    g += `<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"
            stroke-dasharray="${len}" stroke-dashoffset="${len}">
            <animate attributeName="stroke-dashoffset" from="${len}" to="0" dur="1.1s" begin="${si*.15}s" fill="freeze"/>
          </path>`;
    const last = pts[pts.length-1];
    g += `<circle cx="${X(last.t).toFixed(1)}" cy="${Y(last.v).toFixed(1)}" r="4" fill="${s.color}"/>`;
  });
  g += `<text x="${P}" y="${H-6}" font-family="IBM Plex Mono" font-size="9.5" fill="var(--soft)">${new Date(t0).toLocaleDateString(LOCALE(),{day:"numeric",month:"short"})}</text>
        <text x="${W-10}" y="${H-6}" text-anchor="end" font-family="IBM Plex Mono" font-size="9.5" fill="var(--soft)">${new Date(t1).toLocaleDateString(LOCALE(),{day:"numeric",month:"short"})}</text>`;
  svg.innerHTML = g;
  const lg = $("#legend");
  if(lg) lg.innerHTML = series.map(s=>`<span><i style="background:${s.color}"></i>${s.name}</span>`).join("");
}

/* ═══════════ KUNCI TILT ═══════════
   Overlay hitung mundur di layar anak setelah 3 kekalahan beruntun.

   SATU HAL YANG SAYA UBAH dari usulan aslinya: overlay ini TIDAK boleh
   berpura-pura mengunci apa pun. Anak bisa membuka Lichess di tab sebelah
   dalam dua detik. Dasbor ini tidak punya kuasa atas papan catur.

   Kalau ia berlagak sebagai penjara, anak akan menemukan bahwa penjaranya
   bohong — dan sejak saat itu ia tidak akan mempercayai apa pun lagi di sini.
   Jadi ia jujur: ia menghalangi layar, menghitung mundur, dan mengatakan
   terus terang bahwa anak bisa mengabaikannya. Kekuatannya ada di gesekan
   dan penjelasan, bukan di paksaan. */
const KUNCI_MENIT = 15;
let jamKunci = null;

function tiltSampai(){
  const dk = todayKey();
  const g = normGames().filter(x => dayKey(x.t) === dk).sort((a,b)=>a.t-b.t);
  let cur = 0, akhir = null;
  g.forEach(x => {
    if(x.res === "K"){ cur++; if(cur >= 3) akhir = x.t; }
    else cur = 0;
  });
  return akhir ? akhir + KUNCI_MENIT*60000 : null;
}

function renderKunci(){
  const el = $("#lock");
  if(!el) return;
  clearInterval(jamKunci); jamKunci = null;

  const sampai = tiltSampai();
  const aktif = S.role === "anak" && sampai && Date.now() < sampai && !S.tiltLewat;
  if(!aktif){ el.innerHTML = ""; el.style.display = "none"; return; }

  el.style.display = "";
  const gambar = () => {
    const sisa = Math.max(0, sampai - Date.now());
    if(sisa <= 0){ clearInterval(jamKunci); el.innerHTML = ""; el.style.display="none"; render(); return; }
    const m = Math.floor(sisa/60000), d = Math.floor((sisa%60000)/1000);
    el.innerHTML = `<div class="lock"><div class="box">
      <h1>${tr("Berhenti dulu.")}</h1>
      <p>${tr("Kamu kalah tiga partai berturut-turut. Layar ini akan terbuka sendiri sebentar lagi.")}</p>
      <div class="clock">${String(m).padStart(2,"0")}:${String(d).padStart(2,"0")}</div>
      <p>${tr("Berdiri. Minum air. Lihat ke luar jendela. Jangan buka papan catur.")}</p>
      <div class="fine">${tr("Setelah tiga kekalahan beruntun, otak berhenti menghitung dan mulai membalas dendam. Ini terjadi pada semua orang, termasuk grandmaster. Yang membedakan pemain kuat bukan karena mereka tidak pernah tilt — tapi karena mereka berhenti.")}</div>
      <div class="fine">${tr("Layar ini tidak bisa menghentikanmu bermain. Kamu bisa membuka Lichess sekarang juga dan tidak ada yang mencegahmu. Ini bukan penjara — ini pengingat. Yang memutuskan tetap kamu.")}</div>
      <button id="bLewat">${tr("Saya mengerti, dan tetap ingin lanjut")}</button>
    </div></div>`;
    const b = $("#bLewat");
    if(b) b.onclick = () => {
      S.tiltLewat = true;
      const hk = todayKey();
      S.tiltSkip = S.tiltSkip || {};
      S.tiltSkip[hk] = (S.tiltSkip[hk] || 0) + 1;   // transparansi untuk ortu/pelatih
      persist();
      clearInterval(jamKunci);
      el.innerHTML = ""; el.style.display = "none";
    };
  };
  gambar();
  jamKunci = setInterval(gambar, 1000);
}

/* ═══════════ ORKESTRA ═══════════ */
let sudahKonfeti = "";
function render(){
  document.body.dataset.role = S.role;
  const bl = $("#bLang"); if(bl) bl.textContent = DB.lang === "en" ? "EN" : "ID";
  $$("[data-i18n]").forEach(el => { el.textContent = tr(el.dataset.i18n === "foot1"
    ? "Road To Grand Master \u00b7 data dari API publik Lichess. Tidak ada server. Semua tersimpan di perangkat ini."
    : el.dataset.i18n === "foot2"
    ? "Anak tahu bahwa aktivitasnya dipantau \u2014 itu syaratnya, bukan pilihannya."
    : el.dataset.i18n); });
  const tabs = TABS()[S.role];
  if(!tabs.some(t=>t[0]===S.tab) && !(S.tab==="atur" && S.role!=="anak")) S.tab = tabs[0][0];
  $("#nav").innerHTML = tabs.map(([id,label])=>
    `<button data-tab="${id}" class="${id===S.tab?"on":""}">${label}</button>`).join("");
  $$("#nav button").forEach(b => b.onclick = () => { S.tab = b.dataset.tab; persist(); render(); });
  const bAtur = $("#bAtur");
  if(bAtur){ bAtur.style.display = S.role === "anak" ? "none" : ""; bAtur.classList.toggle("on", S.tab === "atur"); }

  const V = {
    misi: viewMisi, progres: viewProgres,
    hari: S.role==="pelatih" ? viewHariPelatih : viewHariOrtu,
    pelatih: viewPelatih,
    minggu: viewMinggu, analisis: viewAnalisis, rencana: viewRencana,
    partai: viewPartai, patuh: viewKepatuhan, coach: viewCoach, atur: viewAtur,
  };
  $("#view").innerHTML = V[S.tab]();

  const umur = S.fetchedAt ? Date.now() - S.fetchedAt : null;
  const basi = umur != null && umur > 6*3600*1000;
  $("#sub").innerHTML = (S.cfg.name ? S.cfg.name.toUpperCase() + " \u00b7 " : "") +
    (S.fetchedAt
      ? (basi ? `<b style="color:var(--warn)">DATA ${Math.round(umur/3600000)} JAM LALU</b>` :
         tr("DATA") + " " + new Date(S.fetchedAt).toLocaleString(LOCALE(),{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}))
      : tr("BELUM ADA DATA"));
  const hint = $("#setupHint");
  if(hint) hint.classList.toggle("hide", !!(S.cfg.chess || S.cfg.lichess || S.cfg.gs));
  const qd = $("#questDate");
  if(qd) qd.textContent = new Date().toLocaleDateString(LOCALE(),{weekday:"long",day:"numeric",month:"long"});

  renderPilihAnak(); renderBagi();
  const bTp = $("#bTerapkan");
  if(bTp) bTp.onclick = async () => {
    S.targets = { ...pelatih().usul };
    await persist();
    S.tab = "hari"; render();
  };
  renderTodos(); renderKPIs(); renderAlerts(); renderNotes(); renderPlatforms(); renderRatings();
  renderStrip(); renderSummary(); renderGames(); renderPlan(); renderAtur(); wireKepatuhanShare();
  if($("#chart")) renderChart("chart", ratingSeries(), false);
  if($("#accChart")) renderChart("accChart",
    akurasiTren().length ? [{name:tr("Akurasi"), color:"#A8791F", pts:akurasiTren()}] : [], true);

  // rapor mingguan: angka menghitung naik
  if(S.tab === "minggu"){
    const W = last7();
    countUp($("#wPatuh"), Math.round(W.reduce((a,b)=>a+b.patuh,0)/7), "%");
    countUp($("#wAktif"), W.filter(w=>w.aktif).length);
    countUp($("#wStreak"), streakHari());
    countUp($("#wPz"), W.reduce((a,b)=>a+b.pz,0));
  }
  if(S.tab === "misi"){
    const q = buildQuests(), done = q.filter(x=>x.ok).length;
    const pct = q.length ? Math.round(100*done/q.length) : 0;
    countUp($("#misiPct"), pct, "%");
    const auto = q.filter(x=>x.auto);
    const kunci = todayKey() + ":" + auto.filter(x=>x.ok).length;
    if(auto.length && auto.every(x=>x.ok) && sudahKonfeti !== kunci){ sudahKonfeti = kunci; setTimeout(konfeti, 400); }
  }
  renderKunci();
  animateRings();
}

/* auto = ikuti setelan sistem. Sekali ditekan, pilihan pengguna menang. */
function terapkanTema(){
  const t = DB.tema === "auto"
    ? (matchMedia("(prefers-color-scheme: dark)").matches ? "gelap" : "terang")
    : DB.tema;
  document.body.dataset.tema = t;
  const b = $("#bTema");
  if(b) b.textContent = t === "gelap" ? "☾" : "☀";
  const m = document.querySelector('meta[name="theme-color"]');
  if(m) m.setAttribute("content", t === "gelap" ? "#0C1929" : "#EBEEF2");
}
const bL = $("#bLang");
if(bL) bL.onclick = async () => {
  DB.lang = DB.lang === "en" ? "id" : "en";
  document.documentElement.lang = DB.lang;
  await Store.save(DB);
  render();
};

const bT = $("#bTema");
if(bT) bT.onclick = async () => {
  DB.tema = document.body.dataset.tema === "gelap" ? "terang" : "gelap";
  terapkanTema();
  await Store.save(DB);
};

const bA = $("#bAtur");
if(bA) bA.onclick = () => {
  S.tab = S.tab === "atur" ? (TABS()[S.role][0] || ["hari"])[0] : "atur";
  persist(); render();
};
matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
  if(DB.tema === "auto") terapkanTema();
});

$$(".who button[data-role]").forEach(b => b.onclick = () => {
  S.role = b.dataset.role;
  $$(".who button[data-role]").forEach(x=>x.classList.toggle("on", x===b));
  persist(); render();
});
async function persist(){
  simpanAnak();
  DB.role = S.role; DB.tab = S.tab;
  await Store.save(DB);
}

const bR = $("#bRefresh");
if(bR) bR.onclick = async () => {
  bR.classList.add("spin2");
  try { await fetchAll(); } finally { bR.classList.remove("spin2"); }
};
/* BUG DI HP: membuka papan ketik memicu event `resize`. Versi lama memanggil
   render() penuh -> innerHTML diganti -> kolom yang sedang diketik kehilangan
   fokus DAN isinya. Itu penyebab utama rasa "tidak stabil" di HP.
   Sekarang: hanya grafik yang digambar ulang, dan tidak sama sekali kalau ada
   kolom yang sedang aktif. */
let _rz, _w = innerWidth;
addEventListener("resize", () => {
  const aktif = document.activeElement;
  if(aktif && /^(INPUT|TEXTAREA|SELECT)$/.test(aktif.tagName)) return;   // papan ketik terbuka
  if(Math.abs(innerWidth - _w) < 40) return;   // hanya tinggi yang berubah (bar URL menyusut)
  _w = innerWidth;
  clearTimeout(_rz);
  _rz = setTimeout(() => {
    if($("#chart")) renderChart("chart", ratingSeries(), false);
    if($("#accChart")) renderChart("accChart",
      akurasiTren().length ? [{name:tr("Akurasi"), color:"#A8791F", pts:akurasiTren()}] : [], true);
  }, 250);
});

function renderAll(){ render(); }   // dipanggil oleh fetchAll()

(async () => {
  const saved = await Store.load();

  if(saved && saved.anak){
    DB = saved;                                   // format baru
  } else if(saved && saved.cfg){
    // Format lama: satu anak. Pindahkan tanpa kehilangan apa pun.
    const a = anakKosong(saved.cfg.name || "Anak 1");
    MEDAN.forEach(k => { if(saved[k] !== undefined) a[k] = saved[k]; });
    a.nama = (saved.cfg.name || "").trim() || "Anak 1";
    DB = { v:2, anak:[a], aktif:a.id, role:saved.role || "ortu", tab:saved.tab || "hari" };
  }

  if(!DB.anak.length){
    const a = anakKosong("Varisha");
    a.cfg.chess = "VarishaArbas";
    a.cfg.lichess = "VarishaChess";
    DB.anak = [a]; DB.aktif = a.id;
  }
  if(!DB.anak.some(x => x.id === DB.aktif)) DB.aktif = DB.anak[0].id;

  S.role = DB.role || "ortu";
  S.tab  = DB.tab  || "hari";
  muatAnak();

  $$(".who button[data-role]").forEach(x=>x.classList.toggle("on", x.dataset.role===S.role));
  terapkanTema();
  document.documentElement.lang = DB.lang || "id";
  render();
  if((S.cfg.chess||S.cfg.lichess||S.cfg.gs||S.cfg.csv) && Date.now()-S.fetchedAt > 15*60000) fetchAll();
})();

/* Berganti anak = simpan yang lama, muat yang baru, gambar ulang, tarik kalau basi. */
async function gantiAnak(id){
  simpanAnak();
  DB.aktif = id;
  muatAnak();
  await Store.save(DB);
  render();
  if((S.cfg.chess||S.cfg.lichess||S.cfg.gs||S.cfg.csv) && Date.now()-S.fetchedAt > 15*60000) fetchAll();
}
async function tambahAnak(){
  const nama = prompt("Nama anak:");
  if(!nama || !nama.trim()) return;
  simpanAnak();
  const a = anakKosong(nama.trim());
  DB.anak.push(a); DB.aktif = a.id;
  muatAnak();
  await Store.save(DB);
  S.tab = "atur";
  render();
}
async function hapusAnak(id){
  const a = DB.anak.find(x => x.id === id); if(!a) return;
  if(DB.anak.length <= 1){ alert("Tidak bisa menghapus satu-satunya anak."); return; }
  if(!confirm(`Hapus "${a.nama}" beserta SELURUH riwayat, catatan, dan foto hariannya? Tidak bisa dibatalkan.`)) return;
  DB.anak = DB.anak.filter(x => x.id !== id);
  if(DB.aktif === id) DB.aktif = DB.anak[0].id;
  muatAnak();
  await Store.save(DB);
  render();
}

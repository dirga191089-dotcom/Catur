  if(L && L.prof){
    const p = L.prof.perfs || {};
    if(p.puzzle) rows.push(["Rating puzzle (Lichess)", `${p.puzzle.rating}${p.puzzle.prov?"?":""} \u00b7 ${p.puzzle.games} puzzle`]);
    if(p.rapid && p.rapid.games)  rows.push(["Rapid (Lichess)", `${p.rapid.rating}${p.rapid.prov?"?":""} \u00b7 ${p.rapid.games} partai`]);
    if(p.blitz && p.blitz.games)  rows.push(["Blitz (Lichess)", `${p.blitz.rating}${p.blitz.prov?"?":""} \u00b7 ${p.blitz.games} partai`]);
    if(p.storm && p.storm.runs)   rows.push(["Puzzle Storm (Lichess)", `${p.storm.score} \u00b7 ${p.storm.runs} kali`]);
  }
  const G = normGames();
  const cc = G.filter(g=>g.site==="Chess.com"), li = G.filter(g=>g.site==="Lichess");
  const hit = a => `${a.length} \u00b7 ${a.filter(x=>x.res==="M").length}M / ${a.filter(x=>x.res==="R").length}R / ${a.filter(x=>x.res==="K").length}K`;
  if(li.length) rows.push(["Partai (Lichess)", hit(li)]);
  if(cc.length) rows.push(["Partai (Chess.com)", hit(cc)]);
  if(C){
    const st = C.stats || {};
    if(st.chess_rapid && st.chess_rapid.last) rows.push(["Rapid (Chess.com)", st.chess_rapid.last.rating]);
    if(st.chess_blitz && st.chess_blitz.last) rows.push(["Blitz (Chess.com)", st.chess_blitz.last.rating]);
    if(st.tactics && st.tactics.highest)
      rows.push(["Taktik tertinggi (Chess.com)", st.tactics.highest.rating +
        (st.tactics.lowest ? " \u00b7 terendah " + st.tactics.lowest.rating : "")]);
    if(st.puzzle_rush && st.puzzle_rush.best)
      rows.push(["Puzzle Rush terbaik (Chess.com)", st.puzzle_rush.best.score]);
  }
  rows.push(["Runtun hari aktif", streakHari()]);
  el.innerHTML = rows.length
    ? `<table>${rows.map(([a,b])=>`<tr><td style="font-family:var(--sans);font-size:13px">${a}</td><td style="text-align:right;font-weight:700">${b}</td></tr>`).join("")}</table>`
    : `<div class="empty">${tr("Belum ada data.")}</div>`;
}

function renderGames(){
  const el = $("#games"); if(!el) return;
  $$("#filt button").forEach(b => b.onclick = () => { S.filter = b.dataset.f; persist(); render(); });
  const f = S.filter || "semua";
  const G = normGames().filter(g => f === "semua" || g.site === f);
  if(!G.length){ el.innerHTML = `<div class="empty">${f==="semua"?tr("Belum ada partai dari kedua situs."):tr("Belum ada partai di {a}.",{a:f})}</div>`; return; }
  // Rating Lichess dan Chess.com BUKAN skala yang sama. Menaruhnya di satu kolom
  // membuat 1462 dan 1180 terlihat sebanding — dan itu kesimpulan yang salah.
  const rows = G.slice(0,60).map(g=>{
    const cls = g.res==="M"?"w":g.res==="K"?"l":"d";
    const li = g.site === "Lichess";
    return `<tr>
      <td>${new Date(g.t).toLocaleDateString(LOCALE(),{day:"2-digit",month:"2-digit"})}</td>
      <td>${g.speed}</td>
      <td>${g.opp} <span style="color:var(--soft)">${g.oppRating||""}</span></td>
      <td class="${cls}">${g.res}</td>
      <td style="text-align:right;color:var(--carbon);font-weight:${li?700:400}">${li ? g.rating||"\u2014" : ""}</td>
      <td style="text-align:right;color:var(--teal);font-weight:${li?400:700}">${li ? "" : g.rating||"\u2014"}</td>
      <td>${g.acc!=null?g.acc.toFixed(1)+"%":"\u2014"}</td>
      <td><a href="${g.url}" target="_blank" rel="noopener" style="color:var(--accent)">${tr("buka")}</a></td></tr>`;
  }).join("");
  el.innerHTML = `<table>
    <tr><th>${tr("Tgl")}</th><th>${tr("Kontrol")}</th><th>${tr("Lawan")}</th><th>${tr("Hasil")}</th>
      <th style="text-align:right;color:var(--carbon)">${tr("Rating LI")}</th>
      <th style="text-align:right;color:var(--teal)">${tr("Rating CC")}</th>
      <th>${tr("Akurasi")}</th><th></th></tr>${rows}</table>`;
}

function renderPlan(){
  const sel = $("#tier"); if(!sel) return;
  sel.innerHTML = TIERS.map(t=>`<option value="${t.id}" ${t.id===S.tier?"selected":""}>${t.nama} \u00b7 ${t.rating}</option>`).join("");
  const t = tier();
  $("#tierInfo").innerHTML = `<div class="note"><b>${tr("Fokus latihan")}</b>${tr(t.fokus)}</div>
    <div class="note" style="animation-delay:.05s"><b>${tr("Metode evaluasi pelatih")}</b>${tr(t.evaluasi)}</div>`;
  const T = targets();
  $("#tPuzzle").value = T.puzzle; $("#tRush").value = T.rush||0; $("#tRushScore").value = T.rushScore||0;
  $("#tRapid").value = T.rapid; $("#tBulletMax").value = T.bulletMax; $("#tGameMax").value = T.gameMax;
  $("#tManual").value = manualTasks().join("\n");
  sel.onchange = async e => { S.tier = +e.target.value; S.targets = null; S.manual = null; await persist(); render(); };
  $("#bTargets").onclick = async () => {
    S.targets = { puzzle:+$("#tPuzzle").value||0, rush:+$("#tRush").value||0, rushScore:+$("#tRushScore").value||0,
      rapid:+$("#tRapid").value||0, bulletMax:+$("#tBulletMax").value||0, gameMax:+$("#tGameMax").value||0 };
    S.manual = $("#tManual").value.split("\n").map(x=>x.trim()).filter(Boolean);
    await persist(); render();
  };
}

function renderPilihAnak(){
  const sel = $("#pilihAnak"); if(!sel) return;
  sel.innerHTML = DB.anak.map(a =>
    `<option value="${a.id}" ${a.id===DB.aktif?"selected":""}>${a.nama}</option>`).join("");
  sel.onchange = e => gantiAnak(e.target.value);
}

function renderDaftarAnak(){
  const el = $("#daftarAnak"); if(!el) return;
  el.innerHTML = DB.anak.map(a => {
    const aktif = a.id === DB.aktif;
    const sumber = [a.cfg.chess && "CC", a.cfg.lichess && "LI"].filter(Boolean).join(" + ") || "belum tersambung";
    const hari = Object.keys(a.snaps || {}).length;
    return `<div class="r" style="display:flex;justify-content:space-between;align-items:center;gap:10px;
        padding:11px 12px;border-bottom:1px solid var(--rule);${aktif?"background:rgba(91,78,140,.07)":""}">
      <div style="min-width:0">
        <div style="font-weight:700;font-size:14px">${a.nama} ${aktif?`<span style="font-family:var(--mono);font-size:9px;color:var(--accent)">\u25c0 AKTIF</span>`:""}</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--soft)">${sumber} \u00b7 ${hari} hari tercatat</div>
      </div>
      <div style="display:flex;gap:6px;flex:0 0 auto">
        ${aktif?"":`<button class="btn" data-pilih="${a.id}" style="padding:7px 10px">Pilih</button>`}
        <button class="btn" data-hapus="${a.id}" style="padding:7px 10px;color:var(--no)">Hapus</button>
      </div>
    </div>`;
  }).join("");
  $$("[data-pilih]").forEach(b => b.onclick = () => gantiAnak(b.dataset.pilih));
  $$("[data-hapus]").forEach(b => b.onclick = () => hapusAnak(b.dataset.hapus));
  const t = $("#bTambahAnak"); if(t) t.onclick = tambahAnak;
  const n = $("#aturNama"); if(n) n.textContent = anakAktif() ? anakAktif().nama : "";
}

function renderAtur(){
  renderDaftarAnak();
  if(!$("#cName")) return;
  $("#cName").value = S.cfg.name; $("#cChess").value = S.cfg.chess;
  $("#cLichess").value = S.cfg.lichess; $("#cProxy").value = S.cfg.proxy;
  $("#cGs").value = S.cfg.gs || "";
  $("#cCsv").value = S.cfg.csv || "";
  $("#cTz").value = Intl.DateTimeFormat().resolvedOptions().timeZone;
  $("#bFetch").onclick = async () => {
    S.cfg.name = $("#cName").value.trim(); S.cfg.chess = $("#cChess").value.trim();
    S.cfg.lichess = $("#cLichess").value.trim(); S.cfg.proxy = $("#cProxy").value.trim();
    S.cfg.gs = $("#cGs").value.trim(); S.cfg.csv = $("#cCsv").value.trim();
    await persist(); await fetchAll();
  };
  $("#bExport").onclick = () => {
    const b = new Blob([JSON.stringify(S,null,1)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(b); a.download = `rtgm-${todayKey()}.json`; a.click();
  };
  $("#bReset").onclick = async () => {
    if(!confirm("Hapus SEMUA anak beserta seluruh pengaturan, catatan, dan riwayatnya? Tidak bisa dibatalkan.")) return;
    await Store.clear(); location.reload();
  };
  $("#bTest").onclick = () => {
    S.cfg.lichess = $("#cLichess").value.trim();
    S.cfg.chess = $("#cChess").value.trim();
    S.cfg.gs = $("#cGs").value.trim(); S.cfg.csv = $("#cCsv").value.trim();
    S.cfg.proxy = $("#cProxy").value.trim();
    persist(); ujiKoneksi();
  };
  logShow();
}

/* ═══════════ ORKESTRA ═══════════ */
let sudahKonfeti = "";
function render(){
  document.body.dataset.role = S.role;
  const bl = $("#bLang"); if(bl) bl.textContent = DB.lang === "en" ? "EN" : "ID";
  $$("[data-i18n]").forEach(el => { el.textContent = tr(el.dataset.i18n === "foot1"
    ? "Road To Grand Master \u00b7 data dari API publik Chess.com & Lichess. Tidak ada server. Semua tersimpan di perangkat ini."
    : el.dataset.i18n === "foot2"
    ? "Anak tahu bahwa aktivitasnya dipantau \u2014 itu syaratnya, bukan pilihannya."
    : el.dataset.i18n); });
  const tabs = TABS()[S.role];
  if(!tabs.some(t=>t[0]===S.tab)) S.tab = tabs[0][0];
  $("#nav").innerHTML = tabs.map(([id,label])=>
    `<button data-tab="${id}" class="${id===S.tab?"on":""}">${label}</button>`).join("");
  $$("#nav button").forEach(b => b.onclick = () => { S.tab = b.dataset.tab; persist(); render(); });

  const V = {
    misi: viewMisi, progres: viewProgres,
    hari: S.role==="pelatih" ? viewHariPelatih : viewHariOrtu,
    minggu: viewMinggu, analisis: viewAnalisis, rencana: viewRencana,
    partai: viewPartai, atur: viewAtur,
  };
  $("#view").innerHTML = V[S.tab]();

  const umur = S.fetchedAt ? Date.now() - S.fetchedAt : null;
  const basi = umur != null && umur > 6*3600*1000;
  $("#sub").innerHTML = (S.cfg.name ? S.cfg.name.toUpperCase() + " \u00b7 " : "") +
    (S.fetchedAt
      ? (basi ? `<b style="color:var(--warn)">DATA ${Math.round(umur/3600000)} JAM LALU</b>` :
         tr("DATA") + " " + new Date(S.fetchedAt).toLocaleString(LOCALE(),{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}))
      : tr("BELUM ADA DATA"));
  const hint = $("#setupHint");
  if(hint) hint.classList.toggle("hide", !!(S.cfg.chess || S.cfg.lichess || S.cfg.gs));
  const qd = $("#questDate");
  if(qd) qd.textContent = new Date().toLocaleDateString(LOCALE(),{weekday:"long",day:"numeric",month:"long"});

  renderPilihAnak(); renderBagi();
  renderTodos(); renderKPIs(); renderAlerts(); renderNotes(); renderPlatforms(); renderRatings();
  renderStrip(); renderSummary(); renderGames(); renderPlan(); renderAtur();
  if($("#chart")) renderChart("chart", ratingSeries(), false);
  if($("#accChart")) renderChart("accChart",
    akurasiTren().length ? [{name:"Akurasi", color:"#1E8C7F", pts:akurasiTren()}] : [], true);

  // rapor mingguan: angka menghitung naik
  if(S.tab === "minggu"){
    const W = last7();
    countUp($("#wPatuh"), Math.round(W.reduce((a,b)=>a+b.patuh,0)/7), "%");
    countUp($("#wAktif"), W.filter(w=>w.aktif).length);
    countUp($("#wStreak"), streakHari());
    countUp($("#wPz"), W.reduce((a,b)=>a+b.pz,0));
  }
  if(S.tab === "misi"){
    const q = buildQuests(), done = q.filter(x=>x.ok).length;
    const pct = q.length ? Math.round(100*done/q.length) : 0;
    countUp($("#misiPct"), pct, "%");
    const auto = q.filter(x=>x.auto);
    const kunci = todayKey() + ":" + auto.filter(x=>x.ok).length;
    if(auto.length && auto.every(x=>x.ok) && sudahKonfeti !== kunci){ sudahKonfeti = kunci; setTimeout(konfeti, 400); }
  }
  animateRings();
}

/* auto = ikuti setelan sistem. Sekali ditekan, pilihan pengguna menang. */
function terapkanTema(){
  const t = DB.tema === "auto"
    ? (matchMedia("(prefers-color-scheme: dark)").matches ? "gelap" : "terang")
    : DB.tema;
  document.body.dataset.tema = t;
  const b = $("#bTema");
  if(b) b.textContent = t === "gelap" ? "\u25d1" : "\u25d0";
  const m = document.querySelector('meta[name="theme-color"]');
  if(m) m.setAttribute("content", t === "gelap" ? "#171B24" : "#E6E7DF");
}
const bL = $("#bLang");
if(bL) bL.onclick = async () => {
  DB.lang = DB.lang === "en" ? "id" : "en";
  document.documentElement.lang = DB.lang;
  await Store.save(DB);
  render();
};

const bT = $("#bTema");
if(bT) bT.onclick = async () => {
  DB.tema = document.body.dataset.tema === "gelap" ? "terang" : "gelap";
  terapkanTema();
  await Store.save(DB);
};
matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
  if(DB.tema === "auto") terapkanTema();
});

$$(".who button[data-role]").forEach(b => b.onclick = () => {
  S.role = b.dataset.role;
  $$(".who button[data-role]").forEach(x=>x.classList.toggle("on", x===b));
  persist(); render();
});
async function persist(){
  simpanAnak();
  DB.role = S.role; DB.tab = S.tab;
  await Store.save(DB);
}

const bR = $("#bRefresh");
if(bR) bR.onclick = async () => {
  bR.classList.add("spin2");
  try { await fetchAll(); } finally { bR.classList.remove("spin2"); }
};
/* BUG DI HP: membuka papan ketik memicu event `resize`. Versi lama memanggil
   render() penuh -> innerHTML diganti -> kolom yang sedang diketik kehilangan
   fokus DAN isinya. Itu penyebab utama rasa "tidak stabil" di HP.
   Sekarang: hanya grafik yang digambar ulang, dan tidak sama sekali kalau ada
   kolom yang sedang aktif. */
let _rz, _w = innerWidth;
addEventListener("resize", () => {
  const aktif = document.activeElement;
  if(aktif && /^(INPUT|TEXTAREA|SELECT)$/.test(aktif.tagName)) return;   // papan ketik terbuka
  if(Math.abs(innerWidth - _w) < 40) return;   // hanya tinggi yang berubah (bar URL menyusut)
  _w = innerWidth;
  clearTimeout(_rz);
  _rz = setTimeout(() => {
    if($("#chart")) renderChart("chart", ratingSeries(), false);
    if($("#accChart")) renderChart("accChart",
      akurasiTren().length ? [{name:"Akurasi", color:"#1E8C7F", pts:akurasiTren()}] : [], true);
  }, 250);
});

function renderAll(){ render(); }   // dipanggil oleh fetchAll()

(async () => {
  const saved = await Store.load();

  if(saved && saved.anak){
    DB = saved;                                   // format baru
  } else if(saved && saved.cfg){
    // Format lama: satu anak. Pindahkan tanpa kehilangan apa pun.
    const a = anakKosong(saved.cfg.name || "Anak 1");
    MEDAN.forEach(k => { if(saved[k] !== undefined) a[k] = saved[k]; });
    a.nama = (saved.cfg.name || "").trim() || "Anak 1";
    DB = { v:2, anak:[a], aktif:a.id, role:saved.role || "ortu", tab:saved.tab || "hari" };
  }

  if(!DB.anak.length){
    const a = anakKosong("Varisha");
    a.cfg.chess = "VarishaArbas";
    a.cfg.lichess = "VarishaChess";
    DB.anak = [a]; DB.aktif = a.id;
  }
  if(!DB.anak.some(x => x.id === DB.aktif)) DB.aktif = DB.anak[0].id;

  S.role = DB.role || "ortu";
  S.tab  = DB.tab  || "hari";
  muatAnak();

  $$(".who button[data-role]").forEach(x=>x.classList.toggle("on", x.dataset.role===S.role));
  terapkanTema();
  document.documentElement.lang = DB.lang || "id";
  render();
  if((S.cfg.chess||S.cfg.lichess||S.cfg.gs||S.cfg.csv) && Date.now()-S.fetchedAt > 15*60000) fetchAll();
})();

/* Berganti anak = simpan yang lama, muat yang baru, gambar ulang, tarik kalau basi. */
async function gantiAnak(id){
  simpanAnak();
  DB.aktif = id;
  muatAnak();
  await Store.save(DB);
  render();
  if((S.cfg.chess||S.cfg.lichess||S.cfg.gs||S.cfg.csv) && Date.now()-S.fetchedAt > 15*60000) fetchAll();
}
async function tambahAnak(){
  const nama = prompt("Nama anak:");
  if(!nama || !nama.trim()) return;
  simpanAnak();
  const a = anakKosong(nama.trim());
  DB.anak.push(a); DB.aktif = a.id;
  muatAnak();
  await Store.save(DB);
  S.tab = "atur";
  render();
}
async function hapusAnak(id){
  const a = DB.anak.find(x => x.id === id); if(!a) return;
  if(DB.anak.length <= 1){ alert("Tidak bisa menghapus satu-satunya anak."); return; }
  if(!confirm(`Hapus "${a.nama}" beserta SELURUH riwayat, catatan, dan foto hariannya? Tidak bisa dibatalkan.`)) return;
  DB.anak = DB.anak.filter(x => x.id !== id);
  if(DB.aktif === id) DB.aktif = DB.anak[0].id;
  muatAnak();
  await Store.save(DB);
  render();
}
</script>
